    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Preflight physical proof feasibility before touching Settings or host apps."
    inputs:
      - "scripts/ios-physical-harness.py"
      - "docs/ios-physical-automation-runbook.md"
      - "docs/acceptance-evidence.md"
    constraints:
      - "Read-only except sanitized notes/receipts under this goal if needed."
      - "Do not open private app content."
      - "Do not print provider keys, transcript bodies, raw WDA source, contacts, phone numbers, or screenshots with private content."
    expected_output:
      - "Device/WDA/tooling classification."
      - "Whether physical proof can proceed safely."
      - "Exact blocker with owner/action if not safe."
      - "Recommended next task."
    receipt:
      result: done
      outcome: external_blocker
      summary: "Physical preflight failed closed before touching Settings or host apps: iPhone-preview is present and tooling/redaction self-test are healthy, but WDA is unreachable at http://127.0.0.1:8100."
      evidence:
        - "docs/goals/ios-route-onboarding-physical-proof/notes/T001-preflight.json"
      classification: "wda_unreachable"
      safe_to_touch_host_apps: false
      privacy:
        openedHostApps: false
        printedRawWdaSource: false
        printedScreenshots: false
        printedTranscriptBodies: false
      next_action: "Start or repair WDA, then rerun strict preflight before touching host apps."
      next_task: "T008"

