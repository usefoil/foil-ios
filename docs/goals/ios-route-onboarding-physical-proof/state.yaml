version: 2

goal:
  title: "Foil iOS Route Onboarding Physical Proof"
  slug: "ios-route-onboarding-physical-proof"
  kind: existing_plan
  tranche: "Gather or exactly block physical proof for route-first onboarding completion gates after PR #40."
  status: done
  oracle:
    signal: "Current-build physical evidence proves or exactly blocks Full Access, keyboard health, provider route, App Group state, and one exact-once sterile insertion row."
    cadence: "before any claim that issue #39 acceptance evidence is physically closed"
    final_proof: "Sanitized receipts for every gate, plus a final Judge audit mapping evidence to issue #39 and docs/acceptance-evidence.md."
  intake:
    original_request: "continue the GoalBuddy conveyor after PR #40"
    interpreted_outcome: "Create the next measured child board for the residual physical proof gap left by route-first onboarding PR #40."
    input_shape: existing_plan
    audience: "Foil owner preparing route-first onboarding for real iPhone use"
    authority: approved
    proof_type: artifact
    completion_proof: "Sanitized physical receipts or exact blocker receipts for all route-first onboarding completion gates."
    likely_misfire: "Using simulator/unit proof to claim Full Access, keyboard health, or host-app insertion works on a physical iPhone."
    blind_spots_considered:
      - "A stale installed build can show old onboarding behavior."
      - "Full Access can appear configured but the keyboard may not check in."
      - "Provider key presence must be proven without exposing the key."
      - "App Group state can remain stale after a failed host-app attempt."
      - "Host apps can open to private content; proof must stop before insertion."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: queued
    url: "http://goalbuddy.localhost:41737/ios-route-onboarding-physical-proof/"
    command: "npx goalbuddy board docs/goals/ios-route-onboarding-physical-proof"

active_task: null

source_pr:
  repo: "usefoil/foil-ios"
  issue: 39
  pr: 40
  merged_commit: "80bd6018323f4ef9659e94b3fb6a09e9e51bcacf"

tasks:
