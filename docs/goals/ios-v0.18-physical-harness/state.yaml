        - "live-fetch-source receipt records printedRawSource false and byte/hash metadata only."
        - "live-delete-session receipt records deleted true."
        - "app-group-reset receipt records phase idle and hasTranscript false after the stage proof."
        - "pgrep cleanup check found no running WDA/xcodebuild/devicectl diagnostic process."
        - "raw-content scan found no physical transcript phrase, wrapper phrase, TranscriptCollectionView, observed WDA timestamp text, raw XML markers, or value attributes in committed v0.18 docs; the only MobileSMS hit is the intentional privacy warning."
        - "secret scan found no credential patterns in touched files."
        - "git diff --check passed."
      commands:
        - cmd: "python3 -m py_compile scripts/ios-physical-wda-evidence.py scripts/ios-physical-harness.py"
          status: pass
        - cmd: "scripts/ios-physical-harness.py --help"
          status: pass
        - cmd: "scripts/ios-physical-harness.py status"
          status: pass
        - cmd: "scripts/ios-physical-harness.py wda-command"
          status: pass
        - cmd: "scripts/ios-physical-harness.py self-test"
          status: pass
        - cmd: "scripts/ios-physical-harness.py receipt ..."
          status: pass
        - cmd: "scripts/ios-physical-harness.py stage-transcript --transcript-file ..."
          status: pass
        - cmd: "scripts/ios-physical-harness.py reset-transcript"
          status: pass
        - cmd: "scripts/ios-physical-harness.py session --wda-url http://192.168.1.40:8100"
          status: pass
        - cmd: "scripts/ios-physical-harness.py fetch-source --wda-url http://192.168.1.40:8100 ..."
          status: pass
        - cmd: "scripts/ios-physical-harness.py delete-session --wda-url http://192.168.1.40:8100 ..."
          status: pass
        - cmd: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.18-physical-harness/state.yaml"
          status: pass
        - cmd: "git diff --check"
          status: pass
        - cmd: "targeted raw-content and secret scans"
          status: pass
      residual_risk:
        - "Future target-app boards still need to choose sterile screens and expectations before committing target-specific sanitized WDA receipts."
