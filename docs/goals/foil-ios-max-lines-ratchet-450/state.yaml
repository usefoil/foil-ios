    audience: "Foil iOS maintainers using hard repo hygiene gates and merge queue protection"
    authority: requested
    proof_type: artifact
    completion_proof: "A merged PR proves the hard 450-line gate on `main` with no allowlist and no violations."
    likely_misfire: "Lowering docs or constants without enforcing the gate, adding an allowlist to dodge the refactor, or changing SwiftUI app-shell behavior while only checking line counts."
