# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "iOS UX v0.6 Product Loop"
  slug: "ios-ux-v0.6-product-loop"
  kind: existing_plan
  tranche: "Make the iOS record-return-insert loop feel like a product."
  status: done
  oracle:
    signal: "Tests and screenshots prove the app and keyboard guide testers through record in Foil -> create transcript -> return to keyboard -> insert/retry/reset."
    cadence: "after Worker and final audit"
    final_proof: "Red/green tests, simulator build/test, UX screenshots or physical smoke, secret scan, and PR merge receipt."
  intake:
    original_request: "Do this."
    interpreted_outcome: "Implement the proposed iOS UX v0.6 product-loop tranche."
    input_shape: existing_plan
    audience: "Foil owner/developer and early iPhone TestFlight testers"
    authority: approved
    proof_type: demo
    completion_proof: "The prototype branch has clearer product-loop UI and proof that the loop still builds/tests."
    likely_misfire: "Changing styling without clarifying where users record, where they return, and how no-speech/failure recovery works."
    blind_spots_considered:
      - "Keyboard extensions cannot record directly; the app must be explicit about the handoff."
      - "Too much setup/diagnostic text can obscure the primary loop."
      - "No-speech and failed states must be recoverable from both app and keyboard."
      - "Screenshots may expose private phone content and must be sterile/sanitized."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: queued
    url: "http://goalbuddy.localhost:41737/ios-ux-v0-6-product-loop/"
    command: "npx goalbuddy board docs/goals/ios-ux-v0.6-product-loop"

active_task: null

tasks:
  - id: T001
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Use TDD to define product-loop presentation states, then wire the app and keyboard UI to the clearer loop."
    inputs:
      - "FoiliOS/FoilIOSApp/ContentView.swift"
      - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
      - "FoiliOS/Shared/**"
      - "FoiliOS/FoilIOSTests/**"
    constraints:
      - "Failing test first for presentation mapping."
      - "Keep diagnostics available but secondary."
      - "Do not expose private transcript text in diagnostics."
    expected_output:
      - "Tested presentation model for ready/recording/saved/complete/failed states."
      - "Containing app and keyboard copy guide record-return-insert-retry/reset."
    receipt:
      result: done
      task_id: T001
      summary: "Added a tested shared product-loop presenter and wired it into the containing app and keyboard so the primary flow reads as record in Foil, return to keyboard, insert latest, or recover."
      changed_files:
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
      red:
        command: "XcodeBuildMCP test_sim -only-testing:FoilIOSTests/FoilDictationLoopPresentationTests"
        result: "Failed with missing FoilDictationLoopPresenter and related product-loop action symbols."
      green:
        - "Focused FoilDictationLoopPresentationTests passed 5/5."
        - "Full FoilIOSTests passed 9/9."
        - "FoilIOS simulator build succeeded with no warnings/errors."
      evidence:
        - "App ready state now tests title Record in Foil, primary action record, and detail containing Return to your keyboard."
        - "App complete state now tests title Ready for keyboard and detail containing Return to the text field and Insert latest."
        - "App failure state with a saved recording tests title Try again and retry transcript action."
        - "Keyboard idle state now tests Ready to dictate, No transcript yet, Dictate in Foil, and copy explaining record in the app."
        - "Keyboard failure state now tests Try again in Foil, Record again in Foil, and Open Foil recovery copy."
        - "Simulator runtime snapshot found Record in Foil and the detail Record here. Return to your keyboard when the transcript is ready."
      artifacts:
        - "docs/goals/ios-ux-v0.6-product-loop/notes/visual/v06-simulator-record-in-foil.jpg"

