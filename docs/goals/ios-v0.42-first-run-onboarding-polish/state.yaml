version: 2
goal:
  title: "Foil iOS v0.42 First-Run Onboarding Polish"
  slug: "ios-v0.42-first-run-onboarding-polish"
  kind: specific
  tranche: "Closed-beta onboarding and setup surface polish."
  status: done
  oracle:
    signal: "A tester can complete or recover setup from the app UI, with physical iPhone proof."
    cadence: "after implementation and before PR merge"
    final_proof: "Receipts for first-run, partial, blocked, and complete states plus overclaim scan."
  intake:
    completion_proof: "Merged PR with simulator and physical iPhone receipts for first-run, partial, blocked, and setup-complete onboarding states."
rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_completion_without_judge_or_pm_audit: true
agents:
  scout: installed
  worker: installed
  judge: installed
active_task: null
tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "Map current onboarding/setup surfaces and identify the smallest polish slice."
    acceptance_criteria:
      - "Receipt lists current states, missing tester decisions, and exact files to edit."
    receipt:
      result: done
      summary: "Current onboarding already includes closed-beta setup, target guidance, provider editor, keyboard health recovery, and overclaim tests. The smallest useful polish slice is a state-specific readiness summary so first-run, partial, blocked, and complete states answer what to do next without reading every row."
      evidence:
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
        - "docs/ios-closed-beta-tester-handoff.md"
      missing_tester_decisions:
        - "The UI does not yet present one synthesized setup readiness state."
        - "Partial setup and blocked-keyboard states rely on separate rows instead of a single next action."
      exact_files_to_edit:
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
  - id: T002
    type: worker
    assignee: Worker
    status: done
    objective: "Implement onboarding/setup polish and update tester copy if needed."
    allowed_files:
      - "FoiliOS/FoilIOSApp/ContentView.swift"
      - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
      - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
      - "docs/goals/ios-v0.42-first-run-onboarding-polish/state.yaml"
      - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T002-worker-receipt.md"
    verify:
      - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17'"
      - "git diff --check"
      - "Copy scan for broad iPhone, Mail, Messages delivery, secure-field, and public App Store overclaims."
    stop_if:
      - "The polish requires new credentials or private provider-key content."
      - "The UI copy would claim unproven host-app support."
      - "Physical iPhone install is needed; leave that for the Judge proof gate."
    acceptance_criteria:
      - "UI distinguishes provider, microphone, keyboard installed, Full Access, target guidance, and recovery."
    receipt:
      result: done
      note: "notes/T002-worker-receipt.md"
      changed_files:
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
      commands:
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17'"
          status: pass
        - cmd: "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO"
          status: pass
        - cmd: "git diff --check"
          status: pass
      summary: "Added and verified a state-specific setup readiness summary for first-run, partial, blocked-keyboard, stale-keyboard, ready-to-insert, and setup-complete onboarding states."
  - id: T003
    type: judge
    assignee: Judge
    status: done
    objective: "Verify onboarding proof and overclaim boundaries."
    acceptance_criteria:
      - "Simulator and physical receipts rule out confusing first-run or unsafe beta claims."
    receipt:
      result: done
      previous_result: external_blocker
      decision: superseded_by_T006
      note: "notes/T003-judge-physical-blocker.md"
      summary: "Historical blocker superseded by T006 and T999. Local/simulator proof stayed green, WDA later recovered, physical onboarding-ready receipts were collected, and PR #27 merged on 2026-06-19."
      proven:
        - "Simulator tests and semantic UI snapshots cover first-run, partial keyboard-not-verified, and ready-to-insert states."
        - "Copy scan found only existing disclaimers/tests for unsafe beta claims."
      missing:
        - "None for v0.42 onboarding readiness after T006."
      superseded_by:
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T006-onboarding-ready-physical-receipt.md"
        - "https://github.com/usefoil/foil-ios/pull/27"
  - id: T004
    type: pm
    assignee: PM
    status: done
    objective: "Collect physical route-choice onboarding receipts after WDA recovery."
    acceptance_criteria:
      - "Receipts prove route choices are visible and setup-complete is not claimed while physical gates are unmet."
      - "If setup-complete is still unavailable, receipts name the exact physical blockers without private content."
    receipt:
      result: done
      previous_result: external_blocker
      decision: superseded_by_T006
      summary: "Historical partial physical receipt superseded by T006. The T004 run correctly proved route-first visibility and no-overclaim boundaries while setup-complete gates were still missing; T006 later proved final onboarding-ready after microphone, keyboard health, Full Access, and App Group reset gates passed."
      evidence:
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T004-physical-receipt.md"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T004-first-run-mac-default.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T004-api-route-not-ready.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T004-advanced-collapsed.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T004-after-keyboard-health-not-ready.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T004-after-app-reset-not-ready.json"
      missing:
        - "None for v0.42 onboarding readiness after T006."
      superseded_by:
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T006-onboarding-ready-physical-receipt.md"
  - id: T005
    type: pm
    assignee: PM
    status: done
    objective: "Rerun physical onboarding-ready proof after the preview phone was unlocked."
    acceptance_criteria:
      - "Strict preflight passes before any host-app touch."
      - "If preflight fails, receipt names the exact blocker without raw WDA logs or private phone content."
    receipt:
      result: done
      previous_result: external_blocker
      decision: superseded_by_T006
      note: "notes/T005-wda-automation-mode-blocker.md"
      summary: "Historical WDA blocker superseded by T006. WDA later recovered on the direct device URL, strict preflight passed, and final onboarding-ready physical receipts were collected before PR #27 merged."
      evidence:
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T005-wda-automation-mode-blocker.md"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T005-wda-automation-mode-summary.json"
      proven:
        - "The physical device is visible and paired."
        - "The harness did not touch host apps after WDA failed."
        - "Raw WDA logs, screenshots, transcripts, and xcresult diagnostics were not committed."
      missing:
        - "None for v0.42 onboarding readiness after T006."
      superseded_by:
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T006-onboarding-ready-physical-receipt.md"
  - id: T006
    type: pm
    assignee: PM
    status: done
    objective: "Collect onboarding-ready physical proof after WDA recovered."
    acceptance_criteria:
      - "Receipts prove route choices remain visible and onboarding-ready appears only after all physical gates pass."
      - "Receipts keep raw WDA source, screenshots, provider keys, private phone content, and transcript bodies out of commits."
    receipt:
      result: done
      note: "notes/T006-onboarding-ready-physical-receipt.md"
      summary: "WDA recovered and current PR #27 physical receipts now prove the route-first onboarding no-overclaim boundary and final onboarding-ready state. Initial install stayed not-ready while keyboard health was stale; sterile Safari/keyboard cycling refreshed Foil Keyboard with Full Access warning absent; app-owned Reset shared state cleared the final App Group gate; final receipt has route choices visible, onboarding-ready present, onboarding-not-ready absent, keyboard checked in, Full Access ready, and App Group idle/no transcript."
      evidence:
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T006-onboarding-ready-physical-receipt.md"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-summary.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-onboarding-ready-initial.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-safari-normal-focused-keyboard.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-safari-foil-keyboard-after-cycle.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-onboarding-ready-after-app-reset.json"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-app-group-after-app-reset.json"
      proven:
        - "Current PR #27 build installed and launched on iPhone-preview."
        - "WDA direct-device preflight is healthy."
        - "Route choices for Mac, iPhone API key, and Advanced remain visible."
        - "Onboarding does not overclaim ready while keyboard health or App Group reset is stale."
        - "After keyboard refresh and app-owned reset, onboarding-ready is present and onboarding-not-ready is absent."
        - "App Group is idle/no transcript in the final ready receipt."
      missing:
        - "No PR #27 onboarding-ready blocker remains."
      next_owner: "pm"
      next_action: "Monitor fresh CI and merge PR #27 only if checks are green and mergeability remains clean."
  - id: T999
    type: judge
    assignee: Judge
    status: done
    objective: "Audit v0.42 onboarding readiness after PR #27 merge."
    acceptance_criteria:
      - "Audit confirms the prior physical blocker is superseded by T006 receipts."
      - "Audit confirms PR #27 merged with fresh green checks."
      - "Audit keeps broader recording/transcription and arbitrary host-app behavior out of scope."
    receipt:
      result: done
      task_id: T999
      decision: complete
      full_outcome_complete: true
      summary: "Final audit accepts v0.42 as complete after PR #27 merged on 2026-06-19. T006 physical receipts prove route-first onboarding reaches ready only after route, microphone, keyboard health, Full Access, and App Group gates pass; broader recording/transcription and host-app claims remain delegated to later boards."
      evidence:
        - "https://github.com/usefoil/foil-ios/pull/27"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/T006-onboarding-ready-physical-receipt.md"
        - "docs/goals/ios-v0.42-first-run-onboarding-polish/notes/physical/T006-summary.json"
