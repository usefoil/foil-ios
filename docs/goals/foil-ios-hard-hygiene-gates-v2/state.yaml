version: 2

goal:
  title: "Foil iOS Hard Hygiene Gates v2"
  slug: "foil-ios-hard-hygiene-gates-v2"
  kind: specific
  tranche: "Make hygiene gates explicit, hard, and merge-queue-aligned."
  status: active
  oracle:
    signal: "A merge-queued PR lands with explicit hard hygiene gates, documented max-lines policy, verified local checks, and required-check evidence that matches branch protection."
    cadence: "after Scout evidence, after Judge selection, after Worker verification, after PR checks, and at final audit"
    final_proof: "Local verification, PR-level GitHub checks, merge-group evidence, and any branch-protection context evidence available through GitHub APIs or documented operator receipts."
  intake:
    original_request: "continue"
    interpreted_outcome: "Prepare and then execute a hygiene hardening tranche now that Foil iOS CI is stable through the merge queue."
    input_shape: specific
    audience: "Foil iOS maintainers using GitHub branch protection and merge queue"
    authority: requested
    proof_type: artifact
    completion_proof: "A merged PR proves hard hygiene gates and documents the branch-protection/required-context contract."
    likely_misfire: "Adding soft documentation or a non-required script while oversized files or stale required contexts can still pass."
    blind_spots_considered:
      - "Branch protection may require external settings evidence beyond repo files."
      - "Current Swift file sizes may make an immediate low cap impractical without unrelated refactors."
      - "A max-lines gate can be hard at the current ceiling while staged reductions are tracked separately."
      - "Hosted CI remains simulator-only and must not claim physical-device proof."
    existing_plan_facts:
      - "PR #65 stabilized hosted simulator queue runs."
      - "PR #66 closed the hosted simulator stability board."
      - "PR #64 relanded receipt-only CI observability through the fixed merge queue."
      - "Existing hygiene scripts include `scripts/source-line-ratchet.py` and `scripts/source-whitespace-check.py`."
      - "The user explicitly wants a hard max-lines-per-file rule enforced eventually."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

