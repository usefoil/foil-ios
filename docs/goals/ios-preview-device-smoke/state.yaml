# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Foil iOS Preview Device Smoke"
  slug: "ios-preview-device-smoke"
  kind: existing_plan
  tranche: "Prove or narrowly block the physical iPhone-preview install, keyboard enablement, recording/transcription, and host-app insertion path for the existing iOS prototype."
  status: done
  oracle:
    signal: "A physical-device smoke transcript proves or blocks install/signing, keyboard enablement, containing-app recording/transcription, and text insertion through the custom keyboard on iPhone-preview."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipts with device identifiers, build/install commands, screenshots or logs, redacted transcription proof, insertion-matrix results, issue/PR links if created, and a final audit verdict."
  intake:
    original_request: "Make a detailed GoalBuddy prep plan, maybe a conveyor of boards, and start the iOS preview-iPhone work."
    interpreted_outcome: "Resume the Foil iOS prototype and prove the basic custom-keyboard dictation loop on the unlocked preview iPhone."
    input_shape: existing_plan
    audience: "Foil owner/developer"
    authority: approved
    proof_type: demo
    completion_proof: "iPhone-preview has the app installed and receipts prove keyboard enablement, record/transcribe, and host-app insertion, or record exact physical-device blockers."
    likely_misfire: "Mistaking simulator proof or an installed containing app for a working iPhone custom-keyboard dictation loop."
    blind_spots_considered:
      - "Real-device signing and App Group provisioning can fail even when simulator builds pass."
      - "Custom keyboard extensions cannot be relied on for direct microphone capture."
      - "Open Access and App Group behavior may differ on device."
      - "The keyboard may need the same reset/cycle behavior seen in Whisperflow before it appears."
      - "Secure fields and some apps reject custom keyboards."
      - "URL handoff from keyboard to containing app may not preserve enough lifecycle/background time."
      - "The local Groq/Grok key must be used without printing or committing the secret."
      - "Private texts, contacts, recordings, and screenshots must stay out of committed artifacts."
    existing_plan_facts:
      - "Continue from codex/ios-keyboard-prototype."
      - "Use iPhone-preview, which is online/open/unlocked according to the user."
      - "Use local Groq/Grok key only for testing."
      - "Use GoalBuddy receipts and acceptance evidence."
      - "Create a branch for this tranche."
      - "Create/fix/merge PRs into the prototype branch when code changes are ready."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/ios-preview-device-smoke/"
    command: "npx goalbuddy board docs/goals/ios-preview-device-smoke"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current branch state, iOS project health, available simulator/device targets, signing/App Group readiness, test-key availability, and the shortest physical-device smoke path."
    inputs:
      - "docs/goals/ios-keyboard-prototype/goal.md"
      - "docs/goals/ios-keyboard-prototype/state.yaml"
      - "FoiliOS/project.yml"
      - "FoiliOS/FoilIOS.xcodeproj"
      - "FoiliOS/FoilIOSApp"
      - "FoiliOS/FoilKeyboard"
      - "FoiliOS/Shared"
      - "docs/acceptance-evidence.md"
      - "xcrun devicectl list devices"
      - "xcrun xctrace list devices"
      - "xcodebuild project and signing output"
      - "Local secret locations by name only; never print secret values."
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not print, persist, or commit API key values."
      - "Prefer concrete command output, file paths, and device IDs over generic iOS advice."
      - "Record whether iPhone-preview is available through both CoreDevice/devicectl and Xcode build destinations."
    expected_output:
      - "Current branch/head and dirty-state summary."
      - "Buildable project/scheme status."
      - "Preview-iPhone availability and exact destination identifier."
      - "Signing/App Group readiness or likely blocker."
      - "Secret-safe test-key availability."
      - "Recommended first Worker slice with allowed_files, verify commands, and stop_if."
    receipt:
      result: done
      task_id: T001
      summary: "Scout mapped the second-tranche branch, existing iOS prototype, device visibility, signing state, entitlements, and test-key availability. The preview iPhone is visible to xcodebuild as a real iOS destination, but the first physical-device build fails narrowly because both the app and keyboard extension lack a DEVELOPMENT_TEAM setting."
      evidence:
        - "Branch: codex/ios-preview-device-smoke at 6eb1cf100bd4d5252791bc37a0e7ca055a167e73, rooted from codex/ios-keyboard-prototype."
        - "FoiliOS/FoilIOS.xcodeproj lists targets FoilIOS and FoilKeyboard, schemes FoilIOS and FoilKeyboard."
        - "xcrun devicectl list devices shows iPhone-preview available paired with CoreDevice id 5320F5AD-2A71-50AC-94FE-207B544B6247."
        - "xcrun xctrace list devices still lists hardware UDID 00008030-001A0C980A33C02E as iPhone-preview offline, which conflicts with devicectl."
        - "xcodebuild -showdestinations for FoilIOS lists iPhone-preview as platform iOS arch arm64 id 00008030-001A0C980A33C02E."
        - "Plain device build to id=00008030-001A0C980A33C02E fails with Signing for FoilKeyboard/FoilIOS requires a development team."
        - "Local code signing identities include Apple Development: Jeremy Watt (3CDYUL285D)."
        - "FoilIOS and FoilKeyboard entitlements both request group.com.neonwatty.FoilIOS."
        - "FoilKeyboard Info.plist has RequestsOpenAccess=false."
        - "Keychain item com.neonwatty.Foil/groq-api-key exists; GROQ_API_KEY and GROK_API_KEY are not set in environment."
        - "Issue #216 is open and already contains the simulator insertion update."
      commands:
        - cmd: "git status --short --branch && git rev-parse HEAD && git log --oneline --decorate -n 8"
          status: pass
        - cmd: "xcrun devicectl list devices"
          status: pass
        - cmd: "xcrun xctrace list devices"
          status: pass_with_conflict
        - cmd: "xcodebuild -list -project FoiliOS/FoilIOS.xcodeproj"
          status: pass
        - cmd: "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -showdestinations"
          status: pass
        - cmd: "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -showBuildSettings -destination 'generic/platform=iOS' | rg signing/settings"
          status: pass
        - cmd: "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' build"
          status: failed_expected
        - cmd: "security find-generic-password -a groq-api-key -s com.neonwatty.Foil"
          status: pass_redacted
        - cmd: "plutil -p FoiliOS/FoilIOSApp/Generated/FoilIOS.entitlements; plutil -p FoiliOS/FoilKeyboard/Generated/FoilKeyboard.entitlements"
          status: pass
      recommended_first_worker:
        objective: "Add the minimal XcodeGen signing settings for local physical-device builds, regenerate the project, and retry build/install on iPhone-preview."
        allowed_files:
          - "FoiliOS/project.yml"
          - "FoiliOS/FoilIOS.xcodeproj/**"
          - "docs/goals/ios-preview-device-smoke/state.yaml"
        verify:
          - "cd FoiliOS && xcodegen generate --spec project.yml"
          - "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' build"
          - "xcrun devicectl device install app --device 5320F5AD-2A71-50AC-94FE-207B544B6247 <built .app path>"
          - "Launch app on iPhone-preview with devicectl or Xcode if available."
          - "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
        stop_if:
          - "Apple Developer portal provisioning or App Group registration is required and cannot be done locally."
          - "The device disappears or locks."
          - "Need files outside the allowed project/signing scope."
      residual_risk:
        - "Adding DEVELOPMENT_TEAM may expose a second blocker: App Group group.com.neonwatty.FoilIOS may not exist in the team's provisioning profile."
        - "xctrace offline state may still break screenshot/log capture even if xcodebuild can build for the device."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T001 and choose the largest safe first Worker slice for physical-device build/sign/install."
    inputs:
      - "T001 receipt"
      - "Current git status"
      - "Current xcodebuild or devicectl blockers"
    constraints:
      - "Do not implement."
      - "Reject broad UI polish; this tranche is about physical-device proof."
      - "Choose a Worker slice that can become a PR into codex/ios-keyboard-prototype if code changes are needed."
      - "If signing/provisioning is the blocker, decide whether to spawn ios-device-signing-provisioning as a child board."
    expected_output:
      - "Decision: approved, blocked, or needs narrower scout."
      - "Exact Worker objective."
      - "PR branch/base recommendation if code changes are needed."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
      - "Child-board recommendation if needed."
    receipt:
      result: done
      task_id: T002
      decision: approved
      full_outcome_complete: false
      rationale: "Approve the largest safe first Worker slice: add a local physical-device development team setting through XcodeGen, regenerate the iOS project, and retry build/install on iPhone-preview. The current failure is narrow and evidenced by xcodebuild: both FoilIOS and FoilKeyboard require a development team. Keep this in the iOS prototype project only; do not touch macOS project or app code unless the build exposes a new blocker."
      selected_worker: T003
      allowed_files:
        - "FoiliOS/project.yml"
        - "FoiliOS/FoilIOS.xcodeproj/**"
        - "docs/goals/ios-preview-device-smoke/state.yaml"
      verify:
        - "cd FoiliOS && xcodegen generate --spec project.yml"
        - "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' build"
        - "Resolve built app path from DerivedData and install with xcrun devicectl device install app --device 5320F5AD-2A71-50AC-94FE-207B544B6247 <app>"
        - "Launch com.neonwatty.FoilIOS on iPhone-preview with devicectl if the install succeeds."
        - "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
      stop_if:
        - "Apple Developer portal provisioning or App Group registration is required and cannot be done locally."
        - "The device disappears or locks."
        - "Need files outside FoiliOS project-generation/signing files or the GoalBuddy board."
        - "A secret value would need to be printed, committed, or stored in source."
      child_board_decision: "Do not spawn ios-device-signing-provisioning yet; the first failure is a single missing DEVELOPMENT_TEAM setting."
      evidence:
        - "T001 receipt shows xcodebuild destination id 00008030-001A0C980A33C02E for iPhone-preview."
        - "T001 receipt shows local Apple Development identity Jeremy Watt (3CDYUL285D)."
        - "T001 receipt shows the failing build emits only missing development-team signing errors before compile."

  - id: T003
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: high
    objective: "Build, sign, install, and launch the current Foil iOS prototype on iPhone-preview, making only the smallest project/signing fixes selected by Judge."
    allowed_files:
      - "FoiliOS/project.yml"
      - "FoiliOS/FoilIOS.xcodeproj/**"
      - "docs/goals/ios-preview-device-smoke/state.yaml"
    verify:
      - "cd FoiliOS && xcodegen generate --spec project.yml"
      - "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' build"
      - "Resolve built app path from DerivedData and install with xcrun devicectl device install app --device 5320F5AD-2A71-50AC-94FE-207B544B6247 <app>"
      - "Launch com.neonwatty.FoilIOS on iPhone-preview with devicectl if install succeeds."
      - "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
    stop_if:
      - "Need files outside allowed_files."
      - "Signing requires Apple Developer portal changes that cannot be made locally."
      - "iPhone-preview disappears, locks, or requires interactive action that cannot be completed."
      - "Verification fails twice with the same root cause."
      - "A secret value would need to be printed, committed, or stored in source."
    subgoal_candidate:
      slug: "ios-device-signing-provisioning"
      create_if: "Real-device App Group signing/provisioning needs a multi-step plan beyond this single Worker slice."
    receipt:
      result: blocked
      task_id: T003
      changed_files:
        - "FoiliOS/project.yml"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
      summary: "Added minimal automatic development signing settings for local physical-device builds through XcodeGen and regenerated the project. This resolved the missing DEVELOPMENT_TEAM error, but the device build remains blocked because Xcode has no account/provisioning profiles available for com.neonwatty.FoilIOS or com.neonwatty.FoilIOS.Keyboard."
      commands:
        - cmd: "cd FoiliOS && xcodegen generate --spec project.yml"
          status: pass
        - cmd: "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' build"
          status: failed_progressed
        - cmd: "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' -allowProvisioningUpdates build"
          status: failed_blocked
        - cmd: "find ~/Library/MobileDevice/Provisioning Profiles -name '*.mobileprovision'"
          status: pass_no_profiles_dir
        - cmd: "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
          status: pass
        - cmd: "rg secret/token-shaped patterns over FoiliOS and docs/goals/ios-preview-device-smoke"
          status: pass
      evidence:
        - "First post-team build error: no profiles for com.neonwatty.FoilIOS and com.neonwatty.FoilIOS.Keyboard; pass -allowProvisioningUpdates."
        - "allowProvisioningUpdates build error: No Accounts: Add a new account in Accounts settings."
        - "allowProvisioningUpdates build error: no iOS App Development provisioning profiles matching the app or keyboard bundle IDs."
        - "No local provisioning profile directory exists at ~/Library/MobileDevice/Provisioning Profiles."
      blocker:
        - "Xcode needs an Apple ID/team account signed in and able to create/download development profiles for com.neonwatty.FoilIOS, com.neonwatty.FoilIOS.Keyboard, and App Group group.com.neonwatty.FoilIOS."
      residual_risk:
        - "After account/profile setup, App Group capability registration may still fail and require Developer portal changes."
        - "xctrace still lists iPhone-preview offline even though xcodebuild lists it as a destination; screenshots/log capture may need devicectl or manual device recording."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Enable Foil Keyboard on iPhone-preview and prove the keyboard can be selected in a privacy-safe host text field."
    allowed_files:
