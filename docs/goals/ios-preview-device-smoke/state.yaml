      - "docs/goals/ios-preview-device-smoke/notes/**"
      - "FoiliOS/FoilKeyboard/**"
      - "FoiliOS/Shared/**"
    verify:
      - "At least one Apple host app text field receives inserted text through Foil Keyboard."
      - "Attempt Notes or Reminders first, then Safari search/address and Messages only if privacy-safe."
      - "Record pass/fail/blocker for secure fields or apps that reject custom keyboards."
      - "Screenshot/video/log evidence avoids private content."
      - "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
    stop_if:
      - "Keyboard selection fails after T004 succeeded; return to Judge."
      - "A target app would expose private content."
      - "Need implementation files beyond allowed_files."
    subgoal_candidate:
      slug: "ios-insertion-target-matrix"
      create_if: "The insertion matrix expands beyond the first smoke row and needs dedicated repeated testing."
