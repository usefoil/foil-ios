          status: pass
        - cmd: "plutil -p FoiliOS/FoilKeyboard/Generated/Info.plist | rg RequestsOpenAccess"
          status: pass
        - cmd: "xcodebuild -project FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' -allowProvisioningUpdates build"
          status: pass
        - cmd: "xcrun devicectl device install app --device 5320F5AD-2A71-50AC-94FE-207B544B6247 '<DerivedData>/Debug-iphoneos/Foil iOS.app'"
          status: pass
        - cmd: "xcrun devicectl device copy to --domain-type appGroupDataContainer --domain-identifier group.com.neonwatty.FoilIOS --source /tmp/foil-ios-seed-dir/Caches --destination Library --remove-existing-content true"
          status: pass
        - cmd: "xcrun devicectl device copy from --domain-type appGroupDataContainer --domain-identifier group.com.neonwatty.FoilIOS --source Library/foil-keyboard-snapshot.json"
          status: pass
        - cmd: "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
          status: pass
        - cmd: "rg secret/token-shaped patterns over FoiliOS and docs/goals/ios-preview-device-smoke"
          status: pass
      evidence:
        - "Device process list showed MobileNotes and /Foil iOS.app/PlugIns/Foil Keyboard.appex/Foil Keyboard active."
        - "Operator report: physical Notes insertion worked from the visible Insert latest button."
        - "App Group file Library/foil-keyboard-snapshot.json existed with transcript Foil keyboard shell before/after insertion."
      residual_risk:
        - "I could not directly screenshot/tap the physical phone with available tools; visual proof is operator-attested plus process/file evidence."
        - "Keyboard reset did not clear the file-backed snapshot after insertion; repeat insertion may remain possible until fixed."
        - "The containing app's foilios://complete path did not create shared state on device; direct App Group seeding was used for this proof."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Prove or block containing-app microphone recording and Groq/Grok-compatible transcription on iPhone-preview without leaking secrets."
    allowed_files:
      - "docs/goals/ios-preview-device-smoke/state.yaml"
      - "docs/goals/ios-preview-device-smoke/notes/**"
      - "FoiliOS/FoilIOSApp/**"
      - "FoiliOS/Shared/**"
      - "FoiliOS/project.yml"
      - "FoiliOS/FoilIOS.xcodeproj/**"
    verify:
      - "Microphone permission prompt/permission state observed on iPhone-preview."
      - "Recording start/stop produces a real audio artifact or app-visible saved recording state."
      - "Secret-safe key injection path documented without printing the key."
      - "Transcription returns app-visible text or exact provider/network/device blocker."
      - "Secret scan over touched FoiliOS and goal files."
      - "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
    stop_if:
      - "Microphone permission cannot be granted interactively."
      - "The only available recording content would be private/sensitive."
      - "No test key can be used safely."
      - "Network transcription fails twice with the same root cause."
      - "Need background modes or architecture changes beyond the selected Worker scope; return to Judge."
    subgoal_candidate:
      slug: "ios-voice-handoff-device"
      create_if: "Device microphone/background handoff requires architecture work beyond the smoke implementation."
    receipt:
      result: done
      task_id: T005
      changed_files:
        - "FoiliOS/FoilIOSApp/AudioCaptureController.swift"
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "docs/goals/ios-preview-device-smoke/state.yaml"
      summary: "Containing-app microphone recording and Groq-compatible transcription are proven on iPhone-preview. The first real-device recording attempt exposed OSStatus -50 with .record/.spokenAudio; the fix switched AVAudioSession to .record/.measurement, guarded AVAudioRecorder.record(), made the content scrollable for the preview phone's large text setting, rebuilt/installed on the physical device, recorded a real .m4a, and completed a Groq transcription round trip using a key injected from Keychain without printing it."
      commands:
        - cmd: "pymobiledevice3 developer wda list-items --rsd fd5f:7ded:e5f3::1 64418 --port 8100 --with-rect"
          status: pass_initial_failure_captured
        - cmd: "cd FoiliOS && xcodegen generate --spec project.yml"
          status: pass
        - cmd: "xcodebuild -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' -derivedDataPath /tmp/foil-ios-derived -allowProvisioningUpdates build"
          status: pass
        - cmd: "xcrun devicectl device install app --device 5320F5AD-2A71-50AC-94FE-207B544B6247 '/tmp/foil-ios-derived/Build/Products/Debug-iphoneos/Foil iOS.app'"
          status: pass
        - cmd: "DEVICECTL_CHILD_FOIL_IOS_GROQ_API_KEY='<redacted from Keychain>' xcrun devicectl device process launch --device 5320F5AD-2A71-50AC-94FE-207B544B6247 --terminate-existing --activate com.neonwatty.FoilIOS --timeout 20"
          status: pass_redacted
        - cmd: "pymobiledevice3 developer wda tap --using 'accessibility id' 'start-recording-button'"
          status: pass
        - cmd: "pymobiledevice3 developer wda tap --using 'accessibility id' 'stop-recording-button'"
          status: pass
        - cmd: "pymobiledevice3 developer wda tap --using 'accessibility id' 'transcribe-latest-button'"
          status: pass
        - cmd: "git diff --check -- FoiliOS docs/goals/ios-preview-device-smoke"
          status: pass
        - cmd: "rg secret/token-shaped patterns over FoiliOS and docs/goals/ios-preview-device-smoke"
          status: pass_code_refs_only
      evidence:
        - "Microphone permission prompt was observed on iPhone-preview and allowed via WDA during the first T005 attempt."
        - "Pre-fix WDA tree showed exact failure label: Recording failed: The operation couldn't be completed. (OSStatus error -50.)."
        - "Post-fix WDA tree after tapping Record showed Recording, disabled Record, enabled Stop, and app-visible file foil-ios-2026-06-04T16-56-10.665Z.m4a."
        - "Screenshot captured at /tmp/foil-device-screens/foil-recording-fixed.png."
        - "Post-stop WDA tree showed Recording saved, Recording saved for transcription, the same .m4a filename, and enabled Transcribe."
        - "Post-transcribe WDA tree showed Groq transcript ready, Transcription complete, app-visible transcript '.', and the same .m4a filename."
        - "Screenshot captured at /tmp/foil-device-screens/foil-transcription-complete.png."
        - "Installed app and keyboard entitlements both include group.com.neonwatty.FoilIOS."
        - "Secret-safe launch used local Keychain item com.neonwatty.Foil/groq-api-key and printed only devicectl launch success."
      residual_risk:
        - "The recorded test audio was mostly silence and Groq returned '.', so this proves provider/device plumbing rather than useful dictation quality."
        - "The preview phone's large text setting makes the smoke UI cramped; ScrollView makes controls reachable, but a production iPhone UI needs a tighter layout."
        - "Next slice should verify that Foil Keyboard inserts the newly produced Groq transcript, not only the earlier fake transcript."

