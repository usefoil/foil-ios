        - "docs/goals/ios-preview-device-smoke/state.yaml"
      summary: "Physical keyboard enablement and insertion smoke succeeded in Notes after making the keyboard UI obvious, requesting Open Access, and switching the shared bridge to a file-backed App Group snapshot. The operator reported that Insert latest worked in Notes."
