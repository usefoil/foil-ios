goal:
  title: "Foil iOS Max Lines Ratchet to 400"
  slug: "foil-ios-max-lines-ratchet-400"
  kind: specific
  tranche: "Lower the hard max-lines gate from 450 to 400 by safely refactoring the current blockers."
  status: active
  oracle:
    signal: "A merge-queued PR lands with `scripts/source-line-ratchet.py --json` reporting `max_lines` 400, empty allowlist, no violations, and required simulator-safe CI contexts passing."
    cadence: "after Scout evidence, after Judge selection, after Worker verification, after PR checks, after merge-group evidence, and at final audit"
    final_proof: "Local verification, PR-level checks, merge-group result, and `origin/main` containing the stricter 400-line gate without allowlist or violations."
  intake:
    original_request: "ok do this"
    interpreted_outcome: "Create and execute Board 3: safely ratchet Foil iOS's hard source max-lines rule from 450 down to 400."
    input_shape: specific
    audience: "Foil iOS maintainers using hard repo hygiene gates and merge queue protection"
    authority: requested
    proof_type: artifact
    completion_proof: "A merged PR proves the hard 400-line gate on `main` with no allowlist and no violations."
    likely_misfire: "Lowering docs or constants without enforcing the gate, adding an allowlist to dodge the refactor, or changing SwiftUI app-shell/shared keyboard bridge behavior while only checking line counts."
    blind_spots_considered:
      - "`FoiliOS/Shared/FoilKeyboardBridge.swift` and `FoiliOS/FoilIOSApp/ContentView.swift` are the expected blockers and both are behavior-sensitive."
      - "The bridge touches shared App Group state used by the app and keyboard extension."
      - "`ContentView.swift` remains the app shell even after the 450-line recovery extraction."
      - "The CI proof remains simulator-safe only; physical iPhone/TestFlight/WDA proof stays separate."
    existing_plan_facts:
      - "Board 2 landed a 450-line hard gate with no allowlist."
      - "`scripts/source-line-ratchet.py --json` on the merged tree reports `max_lines` 450, empty allowlist, and no violations."
      - "The current largest counted files are `FoiliOS/Shared/FoilKeyboardBridge.swift` at 445 and `FoiliOS/FoilIOSApp/ContentView.swift` at 443."

