# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS TestFlight Feedback Readiness v0.7"
  slug: "ios-testflight-feedback-readiness-v0.7"
  kind: specific
  tranche: "Prepare the next honest TestFlight feedback loop after v0.7 proof boards."
  status: done
  oracle:
    signal: "A tester can read the handoff, install/use the right build, understand the record-return-insert loop, recover from common failures, and send useful feedback."
    cadence: "after physical/quality/matrix boards"
    final_proof: "Release notes or issue update, build decision, feedback checklist, proof/blocker summary, secret scan, and PR/merge receipt."
  intake:
    original_request: "Next several iOS GoalBuddy boards."
    interpreted_outcome: "End the v0.7 conveyor with a TestFlight feedback handoff."
    input_shape: specific
    audience: "Foil owner/developer and early iPhone TestFlight testers"
    authority: approved
    proof_type: artifact
    completion_proof: "Feedback handoff reflects the actual proof state and latest build."
    likely_misfire: "Uploading/announcing a build that still lacks the physical or useful-dictation proof users need."
    blind_spots_considered:
      - "Testers need clear reset/retry instructions for keyboard extension weirdness."
      - "The app may require swipe-away/swipe-back keyboard reset behavior."
      - "Build numbers and TestFlight processing/export-compliance states must be exact."
      - "Feedback should ask for target app, field type, phrase length, and recovery outcome without collecting private text."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-testflight-feedback-readiness-v0-7/"
    command: "npx goalbuddy board docs/goals/ios-testflight-feedback-readiness-v0.7"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Collect the proof/blocker state from the v0.7 child boards and current TestFlight/App Store Connect build state."
    inputs:
      - "docs/goals/ios-build7-physical-smoke/state.yaml"
      - "docs/goals/ios-useful-dictation-quality-proof/state.yaml"
      - "docs/goals/ios-target-app-insertion-matrix-v0.7/state.yaml"
      - "App Store Connect/TestFlight status if needed"
    constraints:
      - "Read-only."
      - "Do not print ASC keys or JWTs."
    expected_output:
      - "Latest build and proof status."
      - "Tester-facing claims that are safe to make."
      - "Claims that must be avoided."
    receipt:
      result: done
      task_id: T001
      summary: "Collected v0.7 proof/blocker state and current TestFlight/App Store Connect state. Source and iPhone-preview install are 0.1.0 build 7. App Store Connect reports builds 1-7 valid/not expired with non-exempt encryption false. Foil Internal Testers has builds 1-7 attached, including build 7, and one tester in installed state."
      proof_state:
        build7_physical_smoke: "done"
        useful_dictation_quality: "done"
        target_app_matrix: "partial_with_messages_blocker"
      source_metadata:
        marketing_version: "0.1.0"
        build: "7"
        files:
          - "FoiliOS/project.yml"
          - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
      device_metadata:
        device: "iPhone-preview"
        bundle_id: "com.neonwatty.FoilIOS"
        installed_version: "0.1.0"
        installed_build: "7"
      app_store_connect:
        query_method: "Generated short-lived JWT locally without printing token or private key; queried App Store Connect REST API."
        latest_build:
          id: "de6ab6e4-3b52-4e71-8d04-1df569e7aa84"
          build: "7"
          uploadedDate: "2026-06-05T14:32:10-07:00"
          processingState: "VALID"
          expired: false
          usesNonExemptEncryption: false
        valid_builds_attached_to_foil_internal_testers:
          - "7"
          - "6"
          - "5"
          - "4"
          - "3"
          - "2"
          - "1"
        beta_group:
          name: "Foil Internal Testers"
          id: "bcca568d-167d-44cb-b952-a410e9c9e10f"
          feedbackEnabled: true
          isInternalGroup: true
          tester_state: "INSTALLED"
      safe_claims:
        - "Build 7 is the current internal feedback target."
        - "Physical iPhone-preview proof covers launch, useful dictation, Safari fixture insertion, and secure-field rejection."
        - "Full Access and keyboard refresh friction are known parts of the prototype."
      unsafe_claims:
        - "Do not claim Messages support."
        - "Do not claim arbitrary-app support."
        - "Do not claim secure-field support."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Draft/update the tester handoff: what to install, how to enable keyboard/full access, how to record/return/insert, how to reset, and what feedback to send."
    inputs:
      - "T001 receipt"
      - "Issue #216 or current canonical iOS issue"
    constraints:
      - "Short concrete tester instructions."
      - "No private data requests."
      - "No unsupported claims."
    expected_output:
      - "Issue/update or docs handoff."
      - "Feedback checklist."
    receipt:
      result: done
      task_id: T002
      summary: "Created a concise internal TestFlight feedback handoff with install/setup steps, proven scope, known gaps, recovery steps, feedback checklist, and privacy boundaries."
      artifact: "docs/ios-testflight-feedback-v0.7.md"
      includes:
        - "Build 7 target and current proof state."
        - "Keyboard setup and Allow Full Access instructions."
        - "Record/return/insert tester flow."
        - "Recovery steps for keyboard refresh, disabled insert, Full Access off, stale state, and retry."
        - "Feedback checklist that avoids private transcript text and Messages screenshots."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Decide and, if justified, prepare/upload the next TestFlight build with exact export-compliance and beta-group proof."
    inputs:
      - "T001/T002 receipts"
      - "Current build metadata"
    constraints:
      - "Do not upload if no code/product change or proof state justifies a new build."
      - "If uploading, bump build number once and verify IPA metadata."
    expected_output:
      - "Build decision."
      - "Upload/attach proof or no-upload rationale."
    receipt:
      result: no_upload_needed
      task_id: T003
      summary: "Did not upload a new build from this board because App Store Connect already has build 7 valid, not expired, export-compliance cleared, and attached to Foil Internal Testers. The board changed only feedback docs/receipts, not iOS product code."
      decision: "Use existing build 7 for internal feedback."
      evidence:
        - "App Store Connect REST build list returned build 7 processingState VALID, expired false, usesNonExemptEncryption false."
        - "Foil Internal Testers build relationship includes build 7."
        - "Foil Internal Testers tester query returned one tester in INSTALLED state."
        - "No product code or build metadata changed in this board."
      next_upload_condition:
        - "Upload a new build only after iOS product code changes or after a release decision that intentionally supersedes build 7."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit the TestFlight feedback handoff against actual proof and blockers."
    inputs:
      - "All task receipts"
      - "handoff artifact"
      - "build status"
    constraints:
      - "Reject stale build numbers."
      - "Reject hidden blockers."
    expected_output:
      - "complete | blocked"
      - "safe tester claims"
      - "next post-v0.7 board recommendation"
    receipt:
      result: done
      task_id: T999
      summary: "Audited the TestFlight feedback handoff against the actual proof and blocker state. The handoff is safe for internal feedback because it names build 7, preserves Full Access/keyboard refresh friction, blocks Messages claims, and asks for privacy-safe feedback only."
      strongest_failure_mode:
        claim: "The handoff might tell testers Foil works broadly on iPhone even though Messages and arbitrary app coverage are not proven."
        ruled_out_by:
          - "docs/ios-testflight-feedback-v0.7.md explicitly says Messages is not tested and arbitrary-app support is an unsafe claim."
          - "The matrix board T999 receipt labels Notes/Reminders as prior proof only and Messages as blocked."
          - "Feedback prompts ask for target app/field type and recovery outcome, not private transcript contents."
      safe_tester_claims:
        - "Build 7 is the internal feedback target."
        - "The core app-to-keyboard dictation loop is ready for internal feedback."
        - "Full Access and keyboard switching/reset friction are expected prototype risks."
      next_post_v0_7_board_recommendation:
        - "Either create a sterile Messages fixture/thread board, or start a polish board for reducing keyboard refresh and Full Access onboarding friction."
