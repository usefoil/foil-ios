          status: pass
        - cmd: "WDA screenshot/source for TestFlight build 6 card and confirmation dialog"
          status: pass
        - cmd: "WDA point-coordinate tap on confirmation Install"
          status: pass

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run repeated physical-device real dictation cycles in Notes and collect screenshots/state snapshots."
    inputs:
      - "Installed build 6 on iPhone-preview"
      - "Notes app with sterile test note"
      - "Local Groq key configured on device"
    constraints:
      - "At least three consecutive cycles are required for a reliability claim."
      - "Record phrase mismatches as residual risk, not as hidden success."
      - "Screenshots must avoid private content."
    expected_output:
      - "3+ real record/transcribe/keyboard insert/reset cycles with artifacts."
    receipt:
      result: done
      task_id: T005
      summary: "Ran repeated physical-device real dictation cycles on TestFlight build 6. One initial weak recording was rejected; three subsequent fresh Groq transcripts inserted through Foil Keyboard into Notes and reset canonical App Group state to idle/Ready."
      device:
        name: "iPhone-preview"
        coredevice_id: "5320F5AD-2A71-50AC-94FE-207B544B6247"
        installed_build: "0.1.0 (6)"
      rejected_attempts:
        - attempt: "cycle1-initial"
          phrase: "violet cactus one"
          transcript: "."
          reason: "Rejected as weak proof because transcript was only punctuation and did not contain the sterile phrase."
          artifacts:
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle1-complete-snapshot.json"
      counted_cycles:
        - cycle: 1
          phrase: "violet cactus number one, repeated three times"
          transcript: "Violet cactus number one violet cactus number one violet cactus number one"
          insertion_evidence: "Notes source after insert contained the transcript; canonical App Group snapshot reset to phase idle/message Ready/no transcript."
          artifacts:
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle1-retry-complete-snapshot.json"
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle1-after-insert-snapshot.json"
            - "docs/goals/ios-real-dictation-v0.4/notes/visual/cycle1-before-insert.png"
            - "docs/goals/ios-real-dictation-v0.4/notes/visual/cycle1-after-insert.png"
        - cycle: 2
          phrase: "silver compass number two, repeated three times"
          transcript: "What are you working out there? Silver compass number 2, silver compass number 2, silver compass number 2."
          insertion_evidence: "Notes source after insert contained the new Silver compass transcript after the prior Violet cactus text; canonical App Group snapshot reset to phase idle/message Ready/no transcript."
          artifacts:
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle2-complete-snapshot.json"
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle2-after-insert-snapshot.json"
            - "docs/goals/ios-real-dictation-v0.4/notes/visual/cycle2-before-insert.png"
            - "docs/goals/ios-real-dictation-v0.4/notes/visual/cycle2-after-insert.png"
        - cycle: 3
          phrase: "green lantern number three, repeated three times"
          transcript: "Green Lantern Number 3"
          insertion_evidence: "Notes source after insert contained Green Lantern Number 3 after the prior two transcripts; canonical App Group snapshot reset to phase idle/message Ready/no transcript."
          artifacts:
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle3-complete-snapshot.json"
            - "docs/goals/ios-real-dictation-v0.4/notes/cycle3-after-insert-snapshot.json"
            - "docs/goals/ios-real-dictation-v0.4/notes/visual/cycle3-before-insert.png"
            - "docs/goals/ios-real-dictation-v0.4/notes/visual/cycle3-after-insert.png"
      evidence:
        - "Before cycles, Foil app source showed Ready to dictate, Groq key configured, and Full Access on."
        - "Before cycles, canonical App Group snapshot copied from device showed phase idle/message Ready/no transcript."
        - "Each counted cycle used the App Group command mailbox to reset, startRecording, stopRecording, and transcribeLatest while Foil iOS was foregrounded."
        - "Each counted cycle produced a distinct Groq transcript before insertion, ruling down stale transcript reuse."
        - "Each counted cycle then launched Notes, showed Transcript Ready / Insert latest enabled in Foil Keyboard, tapped Insert latest, and copied the canonical snapshot back as idle/Ready."
      residual_risk:
        - "Mac speaker-to-phone microphone audio still has quality variability: one initial attempt produced only punctuation, cycle 2 captured a small extra environmental phrase, and cycle 3 collapsed the repeated phrase to one occurrence."
        - "This proves repeated foreground app recording plus keyboard insertion, not direct keyboard microphone capture or background recording."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: medium
    objective: "Final audit: try to disprove the v0.4 reliability claim, update receipts, and prepare PR/merge handoff."
    inputs:
      - "All task receipts"
      - "git diff"
    constraints:
      - "Do not mark done if physical proof is incomplete."
    expected_output:
      - "Final receipt with claim, strongest failure modes, evidence, residual risks, PR link, and merge result."
    receipt:
      result: done
      task_id: T999
      summary: "Final audit passed. The v0.4 claim is limited to TestFlight build 6 plus three repeated foreground-app real-dictation cycles inserting through Foil Keyboard into Notes with canonical App Group reset after each insert."
      claim: "Foil iOS 0.1.0 build 6 is uploaded, beta-ready, installed on iPhone-preview, and can repeatedly record in the containing app, transcribe through Groq, insert via Foil Keyboard into Notes, and reset shared state."
      strongest_failure_modes:
        - failure: "The phone could still be running build 5 while build 6 exists only in App Store Connect."
          ruled_out_by: "Before update devicectl reported bundle version 5; after tapping TestFlight's build 6 replacement confirmation at point coordinates, devicectl poll 2 reported Foil iOS 0.1.0 bundle version 6 and TestFlight showed 0.1.0 (6) Open."
        - failure: "The repeated proof could reuse stale transcript state instead of recording fresh audio."
          ruled_out_by: "Three counted cycles have distinct complete snapshots before insert: Violet cactus number one, Silver compass number 2, and Green Lantern Number 3. Each cycle's after-insert snapshot copied from the canonical App Group file showed phase idle/message Ready/no transcript."
        - failure: "The keyboard could show ready text but fail to mutate the host app or clear canonical state."
          ruled_out_by: "Notes accessibility source after cycle 1 contained the Violet cactus transcript; after cycle 2 contained the new Silver compass transcript after the prior text; after cycle 3 contained Green Lantern Number 3 after the prior two transcripts. Each post-insert snapshot reset to idle/Ready."
        - failure: "Build/upload proof could pass locally but fail App Store Connect/TestFlight readiness."
          ruled_out_by: "altool validation/upload/build-status succeeded; ASC API reported buildBetaDetail internal IN_BETA_TESTING / external READY_FOR_BETA_SUBMISSION; beta group relationship verification returned contains_build_6 true."
        - failure: "Credentials or private key material could leak into committed proof."
          ruled_out_by: "Targeted secret scan over touched files found no Groq/OpenAI key, JWT bearer token, or private-key block patterns."
      verification:
        - "git diff --check: pass."
        - "Targeted secret scan: pass/no matches."
        - "XcodeBuildMCP FoilIOSTests on iPhone 17 simulator: pass, 2/2 tests."
        - "XcodeBuildMCP FoilIOS simulator build: pass, no warnings/errors."
        - "IPA metadata: app and keyboard version 0.1.0 build 6."
        - "Physical iPhone-preview: devicectl reports Foil iOS 0.1.0 bundle version 6."
      residual_risk:
        - "Live speaker-to-phone microphone audio remains noisy: one rejected attempt produced only punctuation, cycle 2 included a small environmental phrase, and cycle 3 returned one phrase instead of all three repetitions."
        - "This does not prove direct keyboard microphone capture, secure-field insertion, background recording, or arbitrary target-app compatibility."
      full_outcome_complete: true
