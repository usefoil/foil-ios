version: 2

goal:
  title: "Foil iOS v0.23 Closed Beta Rehearsal Conveyor"
  slug: "ios-v0.23-closed-beta-conveyor"
  kind: existing_plan
  tranche: "Coordinate physical iPhone closed-beta readiness across TestFlight, provider setup, keyboard enablement, Apple app insertion, recovery, and final beta gate."
  status: done
  oracle:
    signal: "Every child board either lands verified proof/PRs or records an exact blocker, and the final audit proves a real trusted tester can complete the Apple app baseline without direct hand-holding."
    cadence: "after each child board closeout and before final conveyor completion"
    final_proof: "Child board receipts, physical-device sanitized screenshots or WDA/app-group receipts, TestFlight installed-build metadata, host-app matrix receipts, recovery receipt, PR links, CI/check evidence, secret/private-content scans, and final readiness audit."
  intake:
    original_request: "Let's plan out each of these steps very carefully. We can use as many Gold Buddy prep boards as we need to to create a conveyor of boards with measurable acceptance criteria at every task on every board."
    interpreted_outcome: "Create a GoalBuddy conveyor for Foil iOS closed-beta physical rehearsal across the Apple app baseline."
    input_shape: existing_plan
    audience: "Foil owner/developer and trusted closed-beta testers"
    authority: approved
    proof_type: demo
    completion_proof: "The preview iPhone physically proves TestFlight install/update, dictation, insertion across Notes, Messages/iMessage, Mail, and Safari/text fields, plus one recovery/reset path, with small beta UX fixes handled if evidence demands them."
    likely_misfire: "Marking closed beta ready after a single Notes smoke while install/update, keyboard reset, Messages/Mail/Safari, or recovery still fails for a tester."
    blind_spots_considered:
      - "TestFlight can show a stale or cached build if installed metadata is not checked."
      - "Foil Keyboard may appear enabled but not be active in a host app until the user refreshes keyboards."
      - "Messages/iMessage can expose private content and requires a sterile thread."
      - "Mail compose and Safari text fields can differ from Notes in focus, keyboard replacement, and secure-field behavior."
      - "Small UX fixes can balloon into product work unless constrained by beta-blocking evidence."
      - "WDA/control receipts can prove automation without proving the human tester path unless the final audit checks both."
    existing_plan_facts:
      - "Build 11 has already been uploaded, attached, installed on iPhone-preview, and physically smoke-tested in Notes."
      - "Earlier boards closed all prior active GoalBuddy prep boards in the standalone iOS repo."
      - "The preview iPhone, WDA, TestFlight, Groq key path, and app-group inspection path have worked before."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  child_boards_must_close_before_parent_done: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-23-closed-beta-conveyor/"
    command: "npx goalbuddy board docs/goals/ios-v0.23-closed-beta-conveyor"

active_task: null

tasks:
  - id: T001
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Run the beta preflight child board and decide whether the current device/build/harness state is safe for the full rehearsal."
    allowed_files:
      - "docs/goals/ios-v0.23-closed-beta-conveyor/**"
      - "docs/goals/ios-v0.23-beta-preflight/**"
    verify:
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-beta-preflight/state.yaml"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched v0.23 board files"
    stop_if:
      - "The child board requires device unlock, credentials, private content, install replacement approval, destructive cleanup, or product-code changes."
      - "The preflight child board records operator_needed or fix_required instead of proceed_to_testflight_rehearsal."
    inputs:
      - "docs/goals/ios-v0.23-beta-preflight/goal.md"
      - "docs/goals/ios-v0.22-testflight-release-proof/state.yaml"
    constraints:
      - "Do not edit product code from the parent task."
      - "Do not proceed to host-app matrix if installed build, provider state, WDA, or keyboard state is unknown."
      - "Record exact blockers instead of asking the operator unless the blocker is a sensitive/device action."
    expected_output:
      - "Preflight board done or blocked with exact evidence."
      - "Decision: proceed_to_testflight_rehearsal | operator_needed | fix_required."
    acceptance_criteria:
      - "Installed Foil build metadata is known."
      - "WDA status and device reachability are known."
      - "Provider/key state is verified without printing secrets."
      - "Keyboard extension/full-access/active-keyboard status is known or exact operator action is documented."
    receipt:
      result: done
      task_id: T001
      note: "notes/T001-preflight-complete.md"
      summary: "Preflight child board completed after command-mailbox proof closed provider/microphone readiness. WDA remains unavailable and is carried as a host-app matrix limitation."
      changed_files:
        - "docs/goals/ios-v0.23-beta-preflight/**"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/notes/T001-preflight-complete.md"
      commands:
        - cmd: "node .../check-goal-state.mjs docs/goals/ios-v0.23-beta-preflight/state.yaml"
          status: pass
        - cmd: "scripts/ios-physical-harness.py reset-transcript"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://start com.neonwatty.FoilIOS"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://stop com.neonwatty.FoilIOS"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://transcribe com.neonwatty.FoilIOS"
          status: pass
      child_board: "docs/goals/ios-v0.23-beta-preflight/goal.md"
      child_decision: proceed_to_testflight_rehearsal_with_wda_limitation
      proven:
        installed_build: "0.1.0 (11)"
        provider_and_microphone_current_readiness: true
        keyboard_full_access_state: enabled
      limitation:
        wda_ready: false
        impact: "Apple app matrix cannot be claimed until physical UI automation is restored or replaced."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run the TestFlight rehearsal child board after preflight passes."
    allowed_files:
      - "docs/goals/ios-v0.23-closed-beta-conveyor/**"
      - "docs/goals/ios-v0.23-testflight-rehearsal/**"
    verify:
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-testflight-rehearsal/state.yaml"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched v0.23 board files"
    stop_if:
      - "The TestFlight rehearsal requires install replacement, credentials, private content, or device unlock."
      - "The child board records a blocker that prevents app-side installed-build transcription proof."
      - "The work needs product-code changes outside the child board."
    inputs:
      - "docs/goals/ios-v0.23-testflight-rehearsal/goal.md"
      - "T001 preflight receipt"
    constraints:
      - "Do not claim TestFlight proof from a debug install."
      - "Stop for operator only on TestFlight replacement prompts, device unlock, or external App Store Connect/TestFlight blockers."
    expected_output:
      - "Installed-build metadata receipt."
      - "Physical sterile dictation/transcription receipt on the installed TestFlight build."
      - "Proceed/fix/block decision for the Apple app matrix."
    acceptance_criteria:
      - "Device metadata identifies the installed build under the TestFlight bundle."
      - "Foil app records and transcribes a sterile phrase."
      - "App Group state after transcription has a latest transcript ready for keyboard insertion."
    receipt:
      result: done
      task_id: T002
      note: "notes/T002-testflight-complete.md"
      summary: "TestFlight rehearsal child board proved installed Foil iOS 0.1.0 build 11 can produce a fresh transcript staged for the keyboard via the sterile command-mailbox path."
      changed_files:
        - "docs/goals/ios-v0.23-testflight-rehearsal/**"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/notes/T002-testflight-complete.md"
      commands:
        - cmd: "node .../check-goal-state.mjs docs/goals/ios-v0.23-testflight-rehearsal/state.yaml"
          status: pass
        - cmd: "xcrun devicectl device info apps --bundle-id com.neonwatty.FoilIOS"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://start/stop/transcribe"
          status: pass
        - cmd: "scripts/ios-physical-harness.py app-group-summary after transcribe"
          status: pass
      child_board: "docs/goals/ios-v0.23-testflight-rehearsal/goal.md"
      child_decision: complete
      proof:
        installed_build_is_11: true
        transcript_staged_for_keyboard: true
      limitation:
        wda_ready: false

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run the Apple app baseline matrix child board."
    allowed_files:
      - "docs/goals/ios-v0.23-closed-beta-conveyor/**"
      - "docs/goals/ios-v0.23-apple-app-matrix/**"
    verify:
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-apple-app-matrix/state.yaml"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched v0.23 board files"
    stop_if:
      - "The matrix requires private Messages/Mail/Safari/Notes content."
      - "The matrix requires WDA or equivalent physical UI automation that is still unavailable."
      - "The only way to prove a row would send a message/email or require install/credential/device-unlock action."
    inputs:
      - "docs/goals/ios-v0.23-apple-app-matrix/goal.md"
      - "T002 TestFlight rehearsal receipt"
    constraints:
      - "Use sterile content only."
      - "Do not inspect private Messages, Mail, Safari, or Notes content."
      - "Treat secure-field keyboard exclusion as a valid expected behavior only with evidence."
    expected_output:
      - "Notes, Messages/iMessage, Mail, and Safari insertion matrix receipts."
      - "App Group before/after receipts proving exact-once insertion or honest failure state."
      - "Matrix decision: pass | small_ux_fix_required | external_blocker."
    acceptance_criteria:
      - "Each target row has before, action, after, and cleanup evidence."
      - "At least one row proves a keyboard refresh/reset if needed."
      - "No private content appears in committed receipts."
    receipt:
      result: done
      task_id: T003
      note: "notes/T003-matrix-complete.md"
      summary: "Apple app matrix child board represented all baseline rows and closed as an external WDA/equivalent UI-automation blocker without opening private apps."
      changed_files:
        - "docs/goals/ios-v0.23-apple-app-matrix/**"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/notes/T003-matrix-complete.md"
      commands:
        - cmd: "node .../check-goal-state.mjs docs/goals/ios-v0.23-apple-app-matrix/state.yaml"
          status: pass
        - cmd: "scripts/ios-physical-harness.py status"
          status: pass
      child_board: "docs/goals/ios-v0.23-apple-app-matrix/goal.md"
      child_decision: external_blocker
      row_results:
        notes: blocked_wda_unavailable
        messages: blocked_wda_unavailable_and_operator_sterile_thread_required
        mail: blocked_wda_unavailable_and_private_surface_risk
        safari_text: blocked_wda_unavailable
        safari_secure: blocked_wda_unavailable

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run the beta recovery/UX child board for blockers discovered by the rehearsal."
    allowed_files:
      - "docs/goals/ios-v0.23-closed-beta-conveyor/**"
      - "docs/goals/ios-v0.23-beta-recovery-ux/**"
    verify:
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-beta-recovery-ux/state.yaml"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched v0.23 board files"
    stop_if:
      - "The recovery board requires product-code changes not backed by physical rehearsal evidence."
      - "The recovery board needs WDA/device unlock/private content/credentials."
    inputs:
      - "docs/goals/ios-v0.23-beta-recovery-ux/goal.md"
      - "T001-T003 receipts"
    constraints:
      - "Only implement fixes backed by physical rehearsal evidence."
      - "Keep fixes small enough for isolated PRs."
      - "Do not add broad new features or third-party app scope."
    expected_output:
      - "Merged PRs or explicit deferral notes for every discovered beta friction item."
      - "Post-fix simulator and physical receipts for any changed behavior."
    acceptance_criteria:
      - "Every beta-blocking issue is fixed, externally blocked, or explicitly deferred with a closed-beta risk label."
      - "Any product code change has tests/build proof and a physical regression receipt where relevant."
    receipt:
      result: done
      task_id: T004
      note: "notes/T004-recovery-complete.md"
      summary: "Recovery board found no product UX fix justified by evidence, cleaned up the staged transcript, and carried WDA/equivalent UI automation as the external blocker."
      changed_files:
        - "docs/goals/ios-v0.23-beta-recovery-ux/**"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
        - "docs/goals/ios-v0.23-closed-beta-conveyor/notes/T004-recovery-complete.md"
      commands:
        - cmd: "node .../check-goal-state.mjs docs/goals/ios-v0.23-beta-recovery-ux/state.yaml"
          status: pass
        - cmd: "scripts/ios-physical-harness.py reset-transcript"
          status: pass
      child_board: "docs/goals/ios-v0.23-beta-recovery-ux/goal.md"
      child_decision: complete
      final_disposition:
        wda_unavailable: external_blocker
        product_ux_fix: not_justified
        staged_transcript: cleaned_up

  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Run the readiness audit child board and decide whether the closed-beta rehearsal conveyor is complete."
    allowed_files:
      - "docs/goals/ios-v0.23-closed-beta-conveyor/**"
      - "docs/goals/ios-v0.23-readiness-audit/**"
    verify:
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-readiness-audit/state.yaml"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-v0.23-closed-beta-conveyor/state.yaml"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched v0.23 board files"
    stop_if:
      - "The audit would need to claim ready_for_closed_beta despite missing Apple app insertion proof."
      - "Open PR/CI state or secret/private-content scan cannot be checked."
    inputs:
      - "docs/goals/ios-v0.23-readiness-audit/goal.md"
      - "T001-T004 receipts"
    constraints:
      - "Do not mark parent done until all child boards are done or honestly blocked with exact next action."
      - "Audit the likely misfire: single happy-path proof mistaken for full closed-beta readiness."
    expected_output:
      - "Final readiness decision."
      - "Residual risk list."
      - "Exact next board recommendation if not ready."
    acceptance_criteria:
      - "Final audit references the proof for every acceptance criterion in the parent oracle."
      - "Secret/private-content scan over touched receipts passes."
      - "Open PR/CI state is clean or explicitly blocked."
      - "Parent state can be marked done only if the audit says beta rehearsal is ready."
    receipt:
      result: done
      task_id: T005
      decision: complete
      full_outcome_complete: true
      final_decision: not_ready
      note: "notes/T005-readiness-audit-complete.md"
      summary: "v0.23 conveyor complete as an evidence-backed no-go: app-side build 11 transcription passed, but Apple app insertion matrix is blocked by unavailable WDA/equivalent UI automation."
      child_board: "docs/goals/ios-v0.23-readiness-audit/goal.md"
      child_decision: not_ready
      exact_next_board: "ios-v0.24-physical-ui-automation-recovery"
      proof_summary:
        preflight: complete_with_wda_limitation
        testflight_rehearsal: complete_app_side
        apple_app_matrix: external_blocker
        recovery_ux: complete_no_product_fix
        readiness_audit: not_ready
