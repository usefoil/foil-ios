version: 2

goal:
  title: "Foil iOS v0.23 TestFlight Rehearsal"
  slug: "ios-v0.23-testflight-rehearsal"
  kind: existing_plan
  tranche: "Install/update the closed-beta TestFlight build and produce a fresh sterile transcript on the preview iPhone."
  status: done
  oracle:
    signal: "The preview iPhone runs the intended TestFlight build and the Foil app produces a fresh sterile transcript ready for keyboard insertion."
    cadence: "after install/update, after record, after transcribe, and before host-app handoff"
    final_proof: "TestFlight/build metadata receipt, physical record/transcribe receipts, App Group before/after receipts, and secret/private-content scan."
  intake:
    original_request: "Physical iPhone beta rehearsal with Apple app baseline."
    interpreted_outcome: "Prove the installed TestFlight build can create the transcript the keyboard matrix will insert."
    input_shape: existing_plan
    audience: "Foil owner/developer and trusted beta testers"
    authority: approved
    proof_type: demo
    completion_proof: "Installed-build metadata and sterile transcript-ready App Group receipt are present."
    likely_misfire: "Recording against a debug build or reusing stale App Group transcript state."
    blind_spots_considered:
      - "TestFlight replacement prompts require operator approval."
      - "Automatic updates can make build identity ambiguous without installed metadata."
      - "A transcript can be stale unless App Group is reset before rehearsal."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-23-testflight-rehearsal/"
    command: "npx goalbuddy board docs/goals/ios-v0.23-testflight-rehearsal"

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate preflight evidence and approve the largest safe TestFlight rehearsal slice."
    inputs:
      - "docs/goals/ios-v0.23-beta-preflight/state.yaml"
      - "Current build/version metadata"
    constraints:
      - "Reject debug-build proof."
      - "Require App Group reset before a fresh transcript is produced."
      - "Do not upload a new build unless existing installed/TestFlight build is unsuitable and credentials are safely available."
    expected_output:
      - "Approved Worker slice with allowed_files, verify commands, stop_if conditions, and sterile phrase."
    acceptance_criteria:
      - "Worker objective names the exact intended installed build or says install/update first."
      - "Allowed files are limited to board receipts unless a build-fix release is explicitly required."
      - "Stop conditions include device unlock, install replacement prompt, credential prompt, stale build, and private-content exposure."
    receipt:
      result: done
      task_id: T001
      decision: command_mailbox_rehearsal_approved
      full_outcome_complete: false
      note: "notes/T001-judge.md"
      summary: "Approve CoreDevice payload-url rehearsal against installed Foil iOS 0.1.0 build 11. WDA remains unavailable and this board will not claim host-app insertion."
      worker_task: T002

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Install/update the TestFlight build if needed, reset App Group state, record/transcribe a sterile phrase, and leave latest transcript staged."
    allowed_files:
      - "docs/goals/ios-v0.23-testflight-rehearsal/**"
    verify:
      - "devicectl installed app metadata for com.neonwatty.FoilIOS"
      - "App Group reset/before receipt"
      - "CoreDevice payload-url start/stop/transcribe command receipts"
      - "App Group after-transcribe receipt with sterile transcript staged"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched files"
    stop_if:
      - "The phone needs unlock or install/replacement approval."
      - "The installed build cannot be identified."
      - "A new build upload/install is needed."
      - "Transcript content is not sterile."
    expected_output:
      - "notes/T002-testflight-rehearsal.md"
      - "notes/receipts/build-installed.json"
      - "notes/receipts/app-group-before.json"
      - "notes/receipts/foil-record-start.json"
      - "notes/receipts/foil-after-transcribe.json"
      - "notes/receipts/app-group-after-transcribe.json"
    acceptance_criteria:
      - "Installed app metadata matches the intended TestFlight build."
      - "The App Group was reset before recording."
      - "The sterile phrase appears in sanitized transcript evidence or a deterministic token-count/phrase-count receipt."
      - "App Group phase indicates transcript-ready state for the keyboard."
    receipt:
      result: done
      task_id: T002
      note: "notes/T002-testflight-rehearsal.md"
      summary: "Installed Foil iOS 0.1.0 build 11 reset to idle, recorded a sterile phrase, transcribed successfully, and left a fresh complete transcript staged for the keyboard."
      changed_files:
        - "docs/goals/ios-v0.23-testflight-rehearsal/notes/T002-testflight-rehearsal.md"
        - "docs/goals/ios-v0.23-testflight-rehearsal/notes/receipts/build-installed.json"
        - "docs/goals/ios-v0.23-testflight-rehearsal/notes/receipts/command-mailbox-rehearsal.json"
        - "docs/goals/ios-v0.23-testflight-rehearsal/state.yaml"
      commands:
        - cmd: "xcrun devicectl device info apps --bundle-id com.neonwatty.FoilIOS"
          status: pass
        - cmd: "scripts/ios-physical-harness.py reset-transcript"
          status: pass
        - cmd: "scripts/ios-physical-harness.py app-group-summary before"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://start com.neonwatty.FoilIOS"
          status: pass
        - cmd: "macOS say sterile phrase"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://stop com.neonwatty.FoilIOS"
          status: pass
        - cmd: "xcrun devicectl device process launch --payload-url foilios://transcribe com.neonwatty.FoilIOS"
          status: pass
        - cmd: "scripts/ios-physical-harness.py app-group-summary after transcribe"
          status: pass
      receipts:
        - "notes/receipts/build-installed.json"
        - "notes/receipts/command-mailbox-rehearsal.json"
      proof:
        installed_build_is_11: true
        started_idle_no_transcript: true
        after_transcribe_phase: complete
        after_transcribe_has_transcript: true
        transcript_length: 87
        left_transcript_staged_for_keyboard: true
        wda_ready: false

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit that the rehearsal produced a fresh transcript on the installed TestFlight build."
    inputs:
      - "T001-T002 receipts"
    constraints:
      - "Do not accept stale transcript state."
      - "Do not accept debug-installed metadata as beta proof."
    expected_output:
      - "notes/T999-final-audit.md"
      - "handoff_to: docs/goals/ios-v0.23-apple-app-matrix/goal.md"
    acceptance_criteria:
      - "Audit cites installed-build metadata, App Group reset, record/transcribe evidence, and transcript-ready state."
      - "Strongest failure mode is ruled out with direct evidence."
      - "GoalBuddy state checker passes."
    receipt:
      result: done
      task_id: T999
      decision: complete
      full_outcome_complete: true
      note: "notes/T999-final-audit.md"
      summary: "The TestFlight rehearsal is complete for app-side proof: installed build 11 produced a fresh transcript staged for keyboard insertion. WDA remains unavailable for host-app matrix proof."
      handoff_to: "docs/goals/ios-v0.23-apple-app-matrix/goal.md"
      strongest_realistic_failure_mode:
        claim: "The transcript could be stale or from the wrong build."
        evidence_that_rules_it_out:
          - "Installed metadata receipt reports com.neonwatty.FoilIOS 0.1.0 bundle version 11."
          - "Command-mailbox receipt starts from idle/no transcript."
          - "Command-mailbox receipt records complete/hasTranscript true after fresh start/stop/transcribe."
