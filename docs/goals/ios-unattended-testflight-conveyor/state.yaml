        - "git status --short --branch and git log --oneline -5 showed codex/ios-testflight-onboarding-recovery at 6afbba2 with only the new conveyor board and pre-existing unrelated untracked files."
        - "gh pr view 229 reported base codex/ios-keyboard-prototype, head codex/ios-testflight-onboarding-recovery, draft true, state OPEN, mergeStateStatus CLEAN."
        - "xcrun devicectl list devices showed iPhone-preview and iPhone-prod connected."
        - "curl --max-time 2 http://127.0.0.1:8100/status failed to connect, so WDA is not currently listening locally."
        - "PlistBuddy reported FoilIOSApp CFBundleShortVersionString 1.0 and CFBundleVersion 1; rg/project.yml showed MARKETING_VERSION 0.1.0 and CURRENT_PROJECT_VERSION 1."
        - "find FoiliOS for ExportOptions*.plist, *.xcarchive, and *.ipa returned no artifacts."
      branch:
        current: "codex/ios-testflight-onboarding-recovery"
        head: "6afbba2"
        upstream: "origin/codex/ios-testflight-onboarding-recovery"
        dirty_state:
          - "Untracked docs/goals/ios-unattended-testflight-conveyor/ from this prep."
          - "Pre-existing untracked FoiliOS/FoilIOS.xcodeproj/project.xcworkspace/xcuserdata/."
          - "Pre-existing untracked FoiliOS/FoilIOS.xcodeproj/xcuserdata/."
          - "Pre-existing unrelated docs/superpowers/plans/2026-06-03-foil-marketing-landing-page.md."
