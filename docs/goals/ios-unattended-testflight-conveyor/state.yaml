      - "Prefer the largest reversible slice that can end in a PR and proof."
      - "Reject Messages testing unless a safe fixture exists or can be created without private content."
      - "Reject TestFlight upload claims without archive/export/App Store Connect proof."
    expected_output:
      - "decision: proceed | blocked | split"
      - "chosen_slice"
      - "allowed_files"
      - "verify commands"
      - "stop_if"
      - "next active Worker task or follow-on board."
