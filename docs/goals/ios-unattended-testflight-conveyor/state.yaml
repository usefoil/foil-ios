        project_current_project_version: "1"
        generated_app_short_version: "1.0"
        generated_app_bundle_version: "1"
        keyboard_requests_open_access: true
        export_artifacts_found: false
      ranked_next_slices:
        - rank: 1
          name: "Land PR #229 into codex/ios-keyboard-prototype or explicitly keep it draft"
          reason: "The previous board is complete and the PR is merge-clean; future branches should not stack indefinitely on an unmerged recovery branch unless a Judge names why."
          proof_needed:
            - "GoalBuddy board #229 final audit receipt."
            - "PR target/base check."
            - "Secret scan/diff check already recorded or refreshed."
            - "gh pr merge or exact blocker."
        - rank: 2
          name: "TestFlight archive/version metadata readiness"
          reason: "Direct Scout evidence shows generated CFBundleShortVersionString 1.0 diverges from MARKETING_VERSION 0.1.0, and no archive/export artifact is present."
          proof_needed:
            - "Inspect and fix project.yml/generated plist values if needed."
            - "xcodegen regeneration if applicable."
            - "Device or generic iOS archive command."
            - "Export/metadata proof or exact Apple-account blocker."
        - rank: 3
          name: "Physical automation recovery/runbook"
          reason: "Devices are connected but WDA is down; repeated future physical matrices need a safer repeatable recovery script or doc."
          proof_needed:
            - "WDA restore command works or fails with exact log."
            - "No raw private accessibility trees committed."
            - "Runbook or script smoke."
        - rank: 4
          name: "Messages target-app fixture"
          reason: "Still the only target-app matrix gap, but not safe while the user is away unless an existing dedicated test thread can be proven without private content."
