# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Foil iOS Unattended TestFlight Conveyor"
  slug: "ios-unattended-testflight-conveyor"
  kind: specific
  tranche: "Run several controlled GoalBuddy cycles for the next Foil iOS TestFlight slices while the user is away."
  status: done
  oracle:
    signal: "Each conveyor slice ends with a scoped branch/PR, proof receipts, simulator and physical iPhone evidence where applicable, no committed secrets/private content, and a final audit that names residual risk."
    cadence: "after each Scout/Judge/Worker package and at each PR boundary"
    final_proof: "A queue of completed or blocked follow-on boards/PRs with issue/PR links, board receipts, test commands, physical-device evidence, secret scan, and exact blockers."
  intake:
    original_request: "I want to walk away and work on another project - can i leave several more rounds of goalbuddy prep planning, investigation, testing, pr-ing, etc., to you for a few hours?"
    interpreted_outcome: "Autonomously continue the Foil iOS effort through multiple GoalBuddy-planned investigation, testing, implementation, and PR cycles."
    input_shape: specific
    audience: "Foil owner/developer and early TestFlight iPhone testers"
    authority: approved
    proof_type: demo
    completion_proof: "Several prioritized iOS follow-on slices are completed or truthfully blocked with durable GoalBuddy receipts, PRs/issues, and verification evidence."
    likely_misfire: "Spending hours on planning or cosmetic churn while the actual TestFlight blockers, physical target-app matrix, PR handoff, and release proof remain unresolved."
    blind_spots_considered:
      - "The phone may lock, disconnect, or lose WDA/tunnel reachability."
      - "Messages needs a safe test fixture; private threads are not acceptable evidence."
      - "Archive/TestFlight work may require Apple account state unavailable to Codex."
      - "Live provider tests must not leak keys or transcript bodies."
      - "PRs must target the iOS integration branch, not main."
      - "Generated Xcode project changes and Xcode user-data churn must be separated."
      - "GoalBuddy prep and execution boundaries must remain explicit."
    existing_plan_facts:
      - "PR #229 completed the previous iOS TestFlight onboarding/failure-recovery board."
      - "The preview iPhone has previously been controlled through WDA/tunnel after setup."
      - "Physical proof already exists for Safari, Notes, Reminders, secure-field rejection, live transcription, live insertion, and missing-key recovery."
      - "Messages remains the main target-app matrix gap."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-unattended-testflight-conveyor/"
    command: "npx goalbuddy board docs/goals/ios-unattended-testflight-conveyor"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Map the current iOS branch/PR/board/device state and identify the next safest high-value slice for unattended work."
    inputs:
      - "Current git branch/status/log and open PRs."
      - "docs/goals/ios-testflight-onboarding-failure-recovery/state.yaml"
      - "docs/acceptance-evidence.md"
      - "FoiliOS project files and generated signing/version metadata."
      - "Physical iPhone/WDA/tunnel availability if reachable."
    constraints:
      - "Read-only."
      - "Do not print or copy API key values."
      - "Do not preserve raw accessibility trees from private apps."
      - "Prefer exact branch names, PR numbers, commands, device IDs, and blockers."
    expected_output:
      - "Current branch/head/upstream and dirty-state summary."
      - "PR #229 state and whether a new branch should start from it or from codex/ios-keyboard-prototype."
      - "Physical-device automation state."
      - "Ranked next slices with proof needed and stop conditions."
      - "Recommended next active Judge or Worker task."
