# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS Notes Keyboard Insertion Smoke"
  slug: "ios-v0.9-notes-keyboard-insertion-smoke"
  kind: specific
  tranche: "Physically verify build-8 Foil Keyboard insertion into a sterile Notes note."
  status: done
  oracle:
    signal: "A preview-iPhone test proves build 8 can move a safe transcript from Foil app state through Foil Keyboard into Notes, or records the exact blocker."
    cadence: "after test-surface setup, transcript creation, keyboard insertion, recovery check, and final audit"
    final_proof: "Device build metadata, sterile Notes setup proof, transcript availability proof, Notes insertion proof, recovery/reset proof or blocker, and secret/private-content audit."
  intake:
    original_request: "ok make a detailed plan with goalbuddy prep to do this"
    interpreted_outcome: "Create a detailed GoalBuddy plan for the next physical iOS keyboard insertion test."
    input_shape: specific
    audience: "Foil owner/developer"
    authority: approved_for_planning
    proof_type: demo
    completion_proof: "Physical iPhone-preview evidence that Foil Keyboard inserts the latest safe transcript into Notes."
    likely_misfire: "Testing only the Foil app setup surface again without proving the keyboard can insert text into an external text field."
    blind_spots_considered:
      - "Notes may show private content unless a sterile note is deliberately created first."
      - "iOS keyboard switching can be flaky and may require cycling away/back to Foil Keyboard."
      - "The keyboard may show Insert latest while shared state is stale or already consumed."
      - "Recording/transcription can fail independently of keyboard insertion."
      - "WDA may need to be restarted, and physical-phone prompts may require human approval."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-9-notes-keyboard-insertion-smoke/"
    command: "npx goalbuddy board docs/goals/ios-v0.9-notes-keyboard-insertion-smoke"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Establish the sterile physical test surface and current device/app state."
    inputs:
      - "iPhone-preview"
      - "Foil iOS build 8 currently installed through TestFlight"
      - "Apple Notes"
    constraints:
      - "Do not inspect existing private notes."
      - "Use a new blank note or an explicitly sterile note only."
      - "Restart WDA only if it is not reachable."
    expected_output:
      - "Proof that Foil iOS installed bundleVersion is 8."
      - "Proof that Notes is on a sterile blank note/test note."
      - "Current WDA/devicectl availability and any prompt/unlock blockers."
    receipt:
      result: done
      task_id: T001
      summary: "Established physical-device state and a sterile Notes test surface without printing existing private note content."
      evidence:
        - "devicectl reported Foil iOS version=0.1.0 bundleVersion=8 on iPhone-preview."
        - "WDA was not initially reachable and was restarted successfully at http://192.168.1.40:8100."
        - "Notes launched on iPhone-preview; existing content was not quoted or recorded."
        - "Tapped Notes New note control to create a fresh note."
        - "Filtered WDA source for the fresh note showed a blank Notes editor with a visible Note text view and Foil Keyboard controls."
        - "Foil Keyboard was visible in the blank note with status Transcript ready and Insert latest available."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Create a deterministic safe transcript in Foil app state."
    inputs:
      - "T001 receipt"
      - "Foil app"
    constraints:
      - "Use safe test words only, with no personal/private content."
      - "Prefer record -> transcribe if audio capture/provider path is ready."
      - "If real audio is blocked, record the blocker and use an app-supported deterministic fake/test transcript only if already available."
    expected_output:
      - "Foil app shows a latest transcript ready for keyboard insertion."
      - "Exact transcript text is safe, short, and recorded in the receipt."
    receipt:
      result: done
      task_id: T002
      summary: "Created a deterministic safe transcript using Foil's app-supported diagnostics path."
      safe_transcript: "Foil keyboard shell"
      evidence:
        - "Source constant FoilIOSConstants.fakeTranscript is 'Foil keyboard shell'."
        - "Foil app diagnostics exposes complete-fake-transcript-button."
        - "Tapped the Complete diagnostic button on iPhone-preview."
        - "Filtered WDA source after tapping Complete showed Fake transcript ready, Transcript pending, and Transcript is ready for the keyboard."
      note: "Real audio was not required for this smoke because the task permits an already-available deterministic fake/test transcript when real audio is not the focus of the keyboard insertion proof."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Switch to Notes, select Foil Keyboard, and insert the latest transcript."
    inputs:
      - "T001/T002 receipts"
      - "Sterile Notes note"
    constraints:
      - "No Messages testing."
      - "Do not rely on visual optimism; verify the Notes text field content after insertion."
      - "If Foil Keyboard is unavailable, cycle keyboards once and record exact state."
    expected_output:
      - "Physical proof that tapping Insert latest inserts the expected safe transcript into Notes."
      - "Keyboard UI state before and after insertion."
    receipt:
      result: done
      task_id: T003
      summary: "Inserted the deterministic safe transcript into a sterile Apple Notes note using Foil Keyboard on iPhone-preview."
      expected_transcript: "Foil keyboard shell"
      evidence:
        - "Before insertion, filtered WDA source for the fresh Notes editor showed Note text view, Foil Keyboard root, Transcript ready, and Insert latest enabled."
        - "Tapped the visible Insert latest row in the Foil Keyboard area."
        - "After insertion, filtered WDA source showed the Notes XCUIElementTypeTextView value as 'Foil keyboard shell'."
        - "After insertion, Foil Keyboard source changed to No transcript yet with Insert latest disabled and Dictate in Foil available."
      privacy: "Only the sterile note value 'Foil keyboard shell' was quoted; existing private Notes content was not printed or recorded."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Exercise the recovery/reset path for stale or consumed shared state."
    inputs:
      - "T003 receipt"
      - "Foil app recovery panel"
      - "Foil Keyboard"
    constraints:
      - "Do not destroy any private app data."
      - "Use only Foil's shared-state reset/recovery controls."
      - "Stop and record exact blocker if iOS requires human settings/auth action."
    expected_output:
      - "Recovery checklist behavior is verified against the actual keyboard insertion flow, or a precise blocker is recorded."
    receipt:
      result: done
      task_id: T004
      summary: "Verified consumed-state and reset recovery behavior after the real Notes insertion."
      evidence:
        - "After the Notes insertion, launching Foil showed Full Access on, ready for dictation."
        - "Foil shared-state row showed Ready, no transcript."
        - "Tapped Foil app Reset shared state."
        - "Foil app reported Storage reset: file ok, defaults written, verified Ready no transcript."
        - "Returning to Notes showed the sterile note still contained 'Foil keyboard shell'."
        - "Foil Keyboard showed Ready to dictate, No transcript yet disabled, Clear disabled, and Dictate in Foil available."
      conclusion: "The inserted transcript was consumed and reset did not resurrect stale text."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Patch any narrow, low-risk issue discovered during the smoke test."
    inputs:
      - "T003/T004 receipts"
      - "Source files implicated by the observed issue"
    constraints:
      - "Only implement if the failure is local, understood, and low-risk."
      - "Use a new PR slice for code changes."
      - "Do not broaden scope into redesign."
    expected_output:
      - "Either a small fix PR with tests/proof, or a no-code receipt explaining why the next step is product/design/manual."
    receipt:
      result: done
      task_id: T005
      summary: "No product patch was needed from this smoke."
      evidence:
        - "Build 8 inserted the expected transcript into Notes."
        - "Keyboard state transitioned to No transcript yet after insertion."
        - "App reset kept shared state at Ready, no transcript."
      decision: "No code changes beyond board receipts."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: decide whether the Notes keyboard insertion smoke is genuinely proven."
    inputs:
      - "All receipts"
      - "Device/app metadata"
      - "Notes insertion evidence"
      - "Any PR evidence"
    constraints:
      - "Reject completion if no physical Notes insertion was observed."
      - "Reject completion if the proof includes private content."
      - "Reject completion if build metadata does not show build 8."
    expected_output:
      - "complete | blocked with exact next action"
    receipt:
      result: complete
      task_id: T999
      summary: "Final audit accepted the physical Notes keyboard insertion smoke for Foil iOS build 8."
      strongest_failure_mode: "The test could appear successful while using stale shared state, inserting into a non-sterile/private note, leaving the keyboard ready to reinsert the same transcript, or running against build 7."
      evidence:
        - "devicectl device app listing reported Foil iOS version=0.1.0 bundleVersion=8."
        - "A fresh Notes note was created via the Notes New note control; only the sterile test note value was quoted."
        - "Foil diagnostics seeded the deterministic safe transcript 'Foil keyboard shell'."
        - "Before insertion, Foil Keyboard in Notes showed Transcript ready and Insert latest enabled."
        - "After tapping Insert latest, Notes text view value was exactly 'Foil keyboard shell'."
        - "After insertion, Foil Keyboard showed No transcript yet disabled, proving the transcript was consumed."
        - "Foil app reset reported verified Ready no transcript, and returning to Notes still showed No transcript yet disabled."
        - "No Messages or third-party target app content was inspected or used."
        - "No code patch was required."
        - "YAML parse passed for docs/goals/ios-v0.9-notes-keyboard-insertion-smoke/state.yaml."
        - "npx goalbuddy board docs/goals/ios-v0.9-notes-keyboard-insertion-smoke registered the board with the local hub."
        - "git diff --check passed."
        - "Secret scan over the build-8 FoiliOS tree and this goal board found no App Store key ids, issuer ids, JWTs, private key blocks, Groq/OpenAI-style API keys, or bearer tokens."
      pr: "https://github.com/mean-weasel/foil/pull/257"
