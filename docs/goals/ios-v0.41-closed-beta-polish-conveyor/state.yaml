version: 2

goal:
  title: "Foil iOS v0.41 Closed Beta Polish Conveyor"
  slug: "ios-v0.41-closed-beta-polish-conveyor"
  kind: existing_plan
  tranche: "Large end-to-end closed-beta polish conveyor after build 12 readiness."
  status: active
  oracle:
    signal: "Every closed-beta polish child board is merged or exactly blocked, and the final audit gives an evidence-backed invite/hold decision."
    cadence: "after each child board and before every beta-readiness claim"
    final_proof: "v0.53 final audit maps onboarding, setup, usage, host apps, automation, simulator sanity, evidence hygiene, TestFlight, and feedback intake to receipts and scoped beta claims."
  intake:
    original_request: "plan out a large conveyor of end-to-end Goalbuddy prep boards ... set up and run autonomously as a conveyor"
    interpreted_outcome: "Prepare an autonomous GoalBuddy parent board that runs closed-beta polish child boards for Foil iOS."
    input_shape: existing_plan
    audience: "Foil owner preparing closed beta testers for the iOS preview"
    authority: approved
    proof_type: artifact
    completion_proof: "Merged child-board PRs plus final readiness audit, or exact blockers with no unsafe beta claim."
    likely_misfire: "Shipping onboarding polish while still leaving testers confused about keyboard setup, Full Access, safe targets, or what behavior is actually proven."
    blind_spots_considered:
      - "Closed beta may fail because setup feels unclear even if the core app works."
      - "Provider key and microphone failures can masquerade as keyboard failures."
      - "Physical automation can look healthy while WDA captures private app surfaces."
      - "Safari proof can be overgeneralized to Notes, Messages, Mail, secure fields, or arbitrary apps."
      - "Tester feedback may be too unstructured to identify closed-beta blockers."
      - "Earlier builds proved more real-audio/Notes/Messages behavior than build 12; closed beta needs current-build or candidate-build receipts."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  create_pr_per_child_board: true
  merge_green_prs_before_next_board: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: queued
    url: "http://goalbuddy.localhost:41737/ios-v0-41-closed-beta-polish-conveyor/"
    command: "npx goalbuddy board docs/goals/ios-v0.41-closed-beta-polish-conveyor"

active_task: T004

tasks:
  - id: T001
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: high
    objective: "Run the first-run onboarding polish child board."
    child_board: "docs/goals/ios-v0.42-first-run-onboarding-polish/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.42-first-run-onboarding-polish/**"
      - "docs/ios-closed-beta-tester-handoff.md"
      - "README.md"
    verify:
      - "Follow docs/goals/ios-v0.42-first-run-onboarding-polish/goal.md."
      - "Prove first-run, returning-user, blocked-keyboard, and setup-complete states by simulator plus physical iPhone smoke."
      - "Open PR, monitor CI, fix failures/conflicts, merge when green, then fast-forward local main."
    stop_if:
      - "Physical iPhone is locked or unavailable for onboarding proof."
      - "Provider key or private account content would be exposed."
    acceptance_criteria:
      - "A tester can understand what to do first, what is done, what remains, and which targets are safe without reading external docs."
      - "No copy implies broad iPhone app support, Mail support, Messages delivery, or secure-field support."
    receipt:
      result: external_blocker
      summary: "v0.42 implementation PR #27 is open as a draft with local/simulator proof, but the child board is exactly blocked before merge because iPhone-preview is unavailable, WDA is not reachable, and installing the branch requires operator approval."
      evidence:
        - "https://github.com/mean-weasel/foil-ios/pull/27"
        - "docs/goals/ios-v0.41-closed-beta-polish-conveyor/notes/T001-v0.42-blocker.md"
      next_owner: "operator"
      next_action: "Make iPhone-preview available/unlocked, approve installing PR #27's development build, and restore WDA/equivalent physical UI automation."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run the provider configuration health child board."
    child_board: "docs/goals/ios-v0.43-provider-configuration-health/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.43-provider-configuration-health/**"
      - "docs/ios-closed-beta-tester-handoff.md"
    verify:
      - "Follow docs/goals/ios-v0.43-provider-configuration-health/goal.md."
      - "Use sanitized provider-key states and live transcription smoke only when credentials are locally available."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "A provider key or account secret must be displayed, committed, or guessed."
      - "Live API failure cannot be distinguished from configuration failure."
    acceptance_criteria:
      - "Provider configured, missing, invalid, network-failed, and recovery states are visible, actionable, and tested without leaking secrets."
    receipt:
      result: done
      summary: "v0.43 adds provider-specific recovery presentation and deterministic tests for configured, missing-key, invalid-key, network, provider-response, transcription-quality, and recovered-success states without live keys or secret-bearing receipts."
      evidence:
        - "docs/goals/ios-v0.43-provider-configuration-health/notes/T002-worker-receipt.md"
        - "docs/goals/ios-v0.43-provider-configuration-health/notes/T003-judge-audit.md"
        - "FoiliOS/FoilIOSTests/FoilProviderFailurePresentationTests.swift"
      verification:
        - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17'"
        - "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO"
        - "git diff --check"
        - "Secret/copy scans for provider keys, Authorization, Bearer, and provider-body sentinels."

  - id: T003
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: high
    objective: "Run the keyboard setup, Full Access, and recovery child board."
    child_board: "docs/goals/ios-v0.44-keyboard-setup-full-access-recovery/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.44-keyboard-setup-full-access-recovery/**"
      - "docs/ios-physical-automation-runbook.md"
      - "docs/ios-closed-beta-tester-handoff.md"
    verify:
      - "Follow docs/goals/ios-v0.44-keyboard-setup-full-access-recovery/goal.md."
      - "Physically prove Add Keyboard, Allow Full Access, keyboard cycling/refocus, stale keyboard recovery, and disabled Insert Latest states."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "Settings automation requires private screenshots or unlock action."
      - "Full Access cannot be toggled without user action."
    acceptance_criteria:
      - "A tester can recover from the common keyboard-extension failure modes using in-app guidance and verified handoff steps."
    receipt:
      result: external_blocker
      summary: "v0.44 draft PR #29 has local copy/test polish, but physical setup and Full Access proof is blocked because WDA is not reachable and restoring it may require operator device actions."
      evidence:
        - "https://github.com/mean-weasel/foil-ios/pull/29"
        - "docs/goals/ios-v0.41-closed-beta-polish-conveyor/notes/T003-v0.44-blocker.md"
      next_owner: "operator"
      next_action: "Approve or perform WDA/TestFlight/device actions required to make physical UI automation reachable, then rerun v0.44 proof."

  - id: T004
    type: worker
    assignee: Worker
    status: active
    reasoning_hint: high
    objective: "Run the recording and transcription quality-loop child board."
    child_board: "docs/goals/ios-v0.45-recording-transcription-quality-loop/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.45-recording-transcription-quality-loop/**"
    verify:
      - "Follow docs/goals/ios-v0.45-recording-transcription-quality-loop/goal.md."
      - "Prove microphone permission, recording start/stop/cancel, transcription success, retry, timeout/error, and reset states."
      - "On the current TestFlight build or the next candidate build, run three consecutive safe real-audio record -> transcribe -> Insert Latest -> App Group idle cycles unless a credential/device blocker is recorded."
      - "Use safe spoken phrases and sanitized receipts only."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "Live audio testing would expose private speech or provider credentials."
      - "Physical microphone permission requires user intervention."
    acceptance_criteria:
      - "The app makes transcription status legible and recoverable, with evidence for three repeated safe real-audio cycles plus realistic failure paths."

  - id: T005
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Run the Insert Latest usage UX child board."
    child_board: "docs/goals/ios-v0.46-insert-latest-usage-ux/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.46-insert-latest-usage-ux/**"
      - "docs/ios-keyboard-host-app-matrix.md"
    verify:
      - "Follow docs/goals/ios-v0.46-insert-latest-usage-ux/goal.md."
      - "Prove exactly-once insert, disabled-after-insert, no-transcript, stale-transcript, reset, and app-to-keyboard return states."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "A host app surface contains private content."
      - "App Group state cannot be inspected without leaking transcript text."
    acceptance_criteria:
      - "Insert Latest feels predictable and cannot silently double-insert or expose stale text in the tested safe paths."

  - id: T006
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Run the host-app sterile matrix expansion child board."
    child_board: "docs/goals/ios-v0.47-host-app-sterile-matrix-expansion/goal.md"
    allowed_files:
      - "docs/goals/ios-v0.47-host-app-sterile-matrix-expansion/**"
      - "docs/ios-keyboard-host-app-matrix.md"
      - "FoiliOS/**"
    verify:
      - "Follow docs/goals/ios-v0.47-host-app-sterile-matrix-expansion/goal.md."
      - "Expand or rerun sterile rows for Safari normal/secure, Notes blank note, Messages fake/dedicated draft, Reminders or another safe Apple text surface, and Mail only if issue #12 is resolved."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "Notes or Messages cannot be made sterile without private content."
      - "Mail remains blocked by issue #12."
      - "Any row would require sending a message/email."
    acceptance_criteria:
      - "The host-app matrix clearly separates pass, expected rejection, deferred, and privacy-blocked rows with build-specific receipts."

  - id: T007
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: medium
    objective: "Run the physical automation hardening child board."
    child_board: "docs/goals/ios-v0.48-physical-automation-hardening/goal.md"
    allowed_files:
      - "docs/goals/ios-v0.48-physical-automation-hardening/**"
      - "docs/ios-physical-automation-runbook.md"
      - "scripts/**"
      - "tools/**"
    verify:
      - "Follow docs/goals/ios-v0.48-physical-automation-hardening/goal.md."
      - "Prove WDA/device preflight, tunnel detection, TestFlight launch, app launch, host-app fixture launch, artifact redaction, and teardown."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "Tooling would install unsigned/untrusted software or require credentials."
      - "Automation captures private screen contents."
    acceptance_criteria:
      - "A future autonomous run can tell whether physical UI automation is healthy before touching private host apps."

  - id: T008
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: medium
    objective: "Run the beta feedback intake loop child board."
    child_board: "docs/goals/ios-v0.49-beta-feedback-intake-loop/goal.md"
    allowed_files:
      - "docs/goals/ios-v0.49-beta-feedback-intake-loop/**"
      - "docs/ios-closed-beta-tester-handoff.md"
      - "README.md"
      - ".github/ISSUE_TEMPLATE/**"
    verify:
      - "Follow docs/goals/ios-v0.49-beta-feedback-intake-loop/goal.md."
      - "Create or polish privacy-safe feedback templates, triage labels, tester prompts, and receipt format."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "Feedback path would request private transcripts, screenshots, contacts, messages, emails, or credentials."
    acceptance_criteria:
      - "Closed beta testers have a low-friction, privacy-safe way to report setup, recording, insertion, and recovery outcomes."

  - id: T009
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: medium
    objective: "Run the simulator sanity regression child board."
    child_board: "docs/goals/ios-v0.50-simulator-sanity-regression/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.50-simulator-sanity-regression/**"
    verify:
      - "Follow docs/goals/ios-v0.50-simulator-sanity-regression/goal.md."
      - "Run simulator build/tests and UI state sanity for onboarding, provider, keyboard-state fixtures, and app/extension compile health."
      - "Label simulator receipts as non-physical and do not use them to replace host-app keyboard proof."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "Simulator proof would be used to claim physical keyboard-extension behavior."
    acceptance_criteria:
      - "Simulator coverage catches regressions quickly while preserving physical-device proof boundaries."

  - id: T010
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Run the evidence hygiene audit child board."
    child_board: "docs/goals/ios-v0.51-evidence-hygiene-audit/goal.md"
    allowed_files:
      - "docs/goals/ios-v0.51-evidence-hygiene-audit/**"
      - "docs/**"
      - "README.md"
    verify:
      - "Follow docs/goals/ios-v0.51-evidence-hygiene-audit/goal.md."
      - "Scan committed receipts/docs for raw WDA source, screenshots/movies of private surfaces, transcript bodies outside sterile fixtures, provider/App Store secrets, stale build claims, and unsafe beta claims."
      - "PR, CI, merge, fast-forward if docs or tooling changed."
    stop_if:
      - "Any secret, private content, raw WDA source, or unsafe screenshot is found in tracked artifacts."
      - "Any copy converts blocked Notes/Messages/Mail rows into beta claims."
    acceptance_criteria:
      - "Evidence is safe to keep in-repo and strong enough to support or block beta claims."

  - id: T011
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Run the TestFlight beta launch rehearsal child board."
    child_board: "docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/goal.md"
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/**"
      - "docs/ios-testflight-upload-runbook.md"
      - "docs/ios-closed-beta-tester-handoff.md"
    verify:
      - "Follow docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/goal.md."
      - "Archive/upload the next build only after release notes, copy, and internal group scope are correct."
      - "Install/update on preview iPhone through TestFlight and rerun a minimal post-update smoke."
      - "PR, CI, merge, fast-forward."
    stop_if:
      - "App Store Connect, signing, export compliance, or TestFlight state needs private human action."
      - "The build would ship with unverified or overbroad beta copy."
    acceptance_criteria:
      - "The candidate closed-beta TestFlight build is uploaded, internally available, installed on preview iPhone, and smoke-tested with scoped release notes."

  - id: T012
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Run the final closed-beta readiness audit child board."
    child_board: "docs/goals/ios-v0.53-closed-beta-final-readiness-audit/goal.md"
    allowed_files:
      - "docs/goals/ios-v0.53-closed-beta-final-readiness-audit/**"
      - "docs/**"
      - "README.md"
      - "/Users/neonwatty/Desktop/foil/site/**"
      - "/Users/neonwatty/Desktop/foil/docs/**"
    verify:
      - "Follow docs/goals/ios-v0.53-closed-beta-final-readiness-audit/goal.md."
      - "Confirm every child board is merged or exactly blocked."
      - "Scan iOS repo and Foil landing/SEO docs for stale build numbers and unsafe iOS claims."
      - "PR, CI, merge, fast-forward if docs changed."
    stop_if:
      - "Any child board is incomplete without an accepted blocker."
      - "Any public or tester-facing copy overclaims unsupported behavior."
    acceptance_criteria:
      - "Final audit gives invite/hold recommendation and a tester scope that matches only proven behavior."
