          status: pass
        - cmd: "xcrun devicectl device info apps --device 5320F5AD-2A71-50AC-94FE-207B544B6247"
          status: pass
        - cmd: "xcrun devicectl device info processes --device 5320F5AD-2A71-50AC-94FE-207B544B6247"
