      - "chosen install/update path"
      - "allowed_files for Worker"
      - "verify commands or UI observations"
      - "stop_if conditions"
    receipt:
      result: done
      task_id: T002
      decision: proceed
      full_outcome_complete: false
      chosen_path: "Restore WDA, inspect TestFlight on the physical phone, and use a non-destructive Install or Update path for Foil build 0.1.0 (2) if TestFlight offers one."
      rationale:
        - "T001 proves the current installed Foil app is build 1, so the distributed build 2 proof gap is real."
        - "T001 also proves TestFlight is installed/running and the phone is connected, so UI-driven TestFlight inspection is the next safe step."
        - "Deletion is not approved by this board because it can reset keyboard, microphone, App Group, and provider state; if TestFlight requires deletion, stop and ask the user."
        - "WDA restoration changes only the automation harness and is necessary to inspect/tap TestFlight without relying on private manual screenshots."
      allowed_files:
        - "docs/goals/ios-testflight-distributed-mailbox-proof/state.yaml"
        - "docs/goals/ios-testflight-distributed-mailbox-proof/notes/**"
      verify:
        - "Start WDA on iPhone-preview and confirm /status responds."
        - "Inspect TestFlight UI for Foil Dictation/Foil iOS build 0.1.0 (2)."
        - "Tap only non-destructive Install, Update, Open, Continue, or accept-test prompts for Foil."
        - "Re-check xcrun devicectl device info apps for com.neonwatty.FoilIOS build number."
        - "Launch com.neonwatty.FoilIOS after installation/update."
        - "git diff --check -- docs/goals/ios-testflight-distributed-mailbox-proof"
      stop_if:
        - "TestFlight requires deleting the existing Foil app."
        - "Build 0.1.0 (2) is not visible to the tester."
        - "The phone locks, disconnects, or requires Apple ID/account action."
        - "WDA fails to start twice with the same root cause."
        - "A raw private accessibility tree or screenshot would need to be committed."

