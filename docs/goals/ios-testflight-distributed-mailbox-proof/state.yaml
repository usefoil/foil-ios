      - "Play sterile Mac speaker audio and confirm macOS route is not AirPods."
      - "Write command action=stopRecording and observe recording saved/processing state."
      - "Write command action=transcribeLatest and observe phase=complete with non-empty sterile transcript."
      - "Use Foil Keyboard in Notes to tap Insert latest and confirm the Notes text field contains the sterile transcript."
      - "Confirm shared state resets to idle/empty transcript after insertion."
      - "git diff --check -- docs/goals/ios-testflight-distributed-mailbox-proof"
    stop_if:
      - "The app is not proven to be TestFlight-managed build 2."
      - "Audio capture returns silence twice after route verification."
      - "Groq/provider key is missing or would need to be printed."
      - "Host-app insertion would expose private content."
    receipt:
      result: done
      task_id: T004
      summary: "Ran the live mailbox/audio/transcription/keyboard insertion smoke against the TestFlight-managed build 0.1.0 (2). The first audio take produced a weak transcript, so the route/volume were reverified and a second louder take produced the intended sterile transcript, which Foil Keyboard inserted into Notes and then reset shared state."
      changed_files:
        - "docs/goals/ios-testflight-distributed-mailbox-proof/state.yaml"
        - "docs/goals/ios-testflight-distributed-mailbox-proof/notes/visual/testflight-build2-notes-insert-reset.png"
      evidence:
        - "xcrun devicectl device process launch launched com.neonwatty.FoilIOS after TestFlight install, and devicectl app metadata still reported version 0.1.0 bundle version 2."
        - "Writing command action=startRecording to App Group Library/foil-ios-command.json changed the snapshot to phase listening with message Recording in Foil. Stop when finished."
        - "First recording/transcribe attempt completed but returned a weak transcript, redacted as length 12 / sha256 3ee480e502940011, so it was treated as weak proof rather than success."
        - "macOS output and system routes were verified as MacBook Pro Speakers, output volume was set to 100, and AirPods were not connected."
        - "Second recording used the phrase: Foil TestFlight build two second audio proof. Orange lantern river."
        - "Second command action=stopRecording changed the snapshot to phase processing with message Recording saved. Tap Transcribe in Foil."
        - "Second command action=transcribeLatest changed the snapshot to phase complete with transcript `Foil test flight build 2 second audio prove Orange Lantern River`."
        - "Notes was launched, WDA switched from system keyboard to Foil Keyboard, and Foil Keyboard showed Transcript Ready plus enabled foil-keyboard-insert-latest."
        - "After tapping foil-keyboard-insert-latest, the Notes TextView contained the TestFlight transcript appended to the sterile test note."
        - "Foil Keyboard reset to Ready with disabled Insert latest (no transcript) and Clear latest (ready)."
        - "The App Group snapshot copied back after insertion showed phase idle and message Ready."
        - "Screenshot: notes/visual/testflight-build2-notes-insert-reset.png"
      commands:
        - cmd: "xcrun devicectl device process launch --device 5320F5AD-2A71-50AC-94FE-207B544B6247 com.neonwatty.FoilIOS --terminate-existing"
          status: pass
        - cmd: "xcrun devicectl device info apps --device 5320F5AD-2A71-50AC-94FE-207B544B6247 | rg Foil"
          status: pass
        - cmd: "xcrun devicectl device copy to appGroupDataContainer group.com.neonwatty.FoilIOS Library/foil-ios-command.json action=startRecording"
          status: pass
        - cmd: "say -v Samantha ... sterile phrase through MacBook Pro Speakers"
          status: pass
        - cmd: "xcrun devicectl device copy to appGroupDataContainer group.com.neonwatty.FoilIOS Library/foil-ios-command.json action=stopRecording"
          status: pass
        - cmd: "xcrun devicectl device copy to appGroupDataContainer group.com.neonwatty.FoilIOS Library/foil-ios-command.json action=transcribeLatest"
          status: pass
        - cmd: "SwitchAudioSource output/system checks and osascript volume output volume 100"
          status: pass
