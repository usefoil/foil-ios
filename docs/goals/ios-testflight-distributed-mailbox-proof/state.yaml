  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the distributed TestFlight mailbox proof tranche is complete."
    inputs:
      - "All task receipts."
      - "Current git status and PR state."
      - "Device/TestFlight/live smoke evidence."
    constraints:
      - "Read-only except for writing the final audit receipt."
      - "Do not mark complete if the phone only ran a Debug-installed build."
      - "Name the strongest realistic remaining failure mode."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      task_id: T999
      decision: complete
      full_outcome_complete: true
      summary: "The distributed TestFlight mailbox proof tranche is complete. The phone was initially running Foil iOS 0.1.0 build 1, build 2 was made available and installed through TestFlight, devicectl verified bundle version 2, and the live mailbox/audio/transcription/keyboard insertion loop passed on that installed build."
      strongest_realistic_failure_mode:
        claim: "The proof could still be accidentally using the previous Debug-installed app instead of the TestFlight-managed build 2."
        evidence_that_rules_it_out:
          - "T001 devicectl metadata showed the starting install was Foil iOS 0.1.0 bundle version 1."
          - "T003 App Store Connect API showed build 2 was initially not in the internal group and not beta-ready, then changed to IN_BETA_TESTING and attached to Foil Internal Testers."
          - "T003 WDA/TestFlight evidence selected 0.1.0 (2) from Previous Builds and accepted TestFlight install confirmations."
          - "T003 devicectl metadata repeatedly reported Foil iOS 0.1.0 bundle version 2 after install."
          - "T004 launched com.neonwatty.FoilIOS after that install and ran mailbox commands against the App Group used by the installed app."
      additional_failure_modes:
        - claim: "The audio/transcription proof could be a false positive caused by silence or AirPods routing."
          evidence_that_rules_it_out:
            - "T004 recorded the first weak transcript as failed/weak proof; raw body redacted as length 12 / sha256 3ee480e502940011."
            - "T004 reverified MacBook Pro Speakers as output/system route, set volume to 100, and reran with a longer sterile phrase."
            - "The second transcript captured the intended phrase as `Foil test flight build 2 second audio prove Orange Lantern River`."
        - claim: "The transcript could exist in shared state but not insert through the custom keyboard."
          evidence_that_rules_it_out:
            - "WDA observed Foil Keyboard Transcript Ready and enabled foil-keyboard-insert-latest."
            - "After tapping Insert latest, Notes TextView contained the TestFlight transcript."
            - "Foil Keyboard reset to Ready with disabled Insert latest (no transcript), and the copied App Group snapshot showed phase idle and message Ready."
      residual_risk:
        - "TestFlight called build 2 an older build and disabled automatic updates for this app during the proof. Future TestFlight update behavior should be checked when a newer build is uploaded."
        - "This board proves Notes insertion; broader app insertion matrix remains covered by earlier boards and future target-specific smokes."
