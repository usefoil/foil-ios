# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Foil iOS TestFlight Distributed Mailbox Proof"
  slug: "ios-testflight-distributed-mailbox-proof"
  kind: existing_plan
  tranche: "Prove TestFlight build 0.1.0 (2) on iPhone-preview with the live mailbox/audio/keyboard insertion loop."
  status: done
  oracle:
    signal: "iPhone-preview runs the TestFlight-managed Foil iOS build 0.1.0 (2), and the same mailbox start/stop/transcribe plus Foil Keyboard insertion loop passes or is narrowly blocked with proof."
    cadence: "after each Scout/Judge/Worker package and at final audit"
    final_proof: "Receipts with TestFlight install/version evidence, device identifiers, command mailbox snapshots, live audio transcript proof, Notes insertion proof, reset proof, secret scan, PR link, and final audit verdict."
  intake:
    original_request: "Plan this out with GoalBuddy Prep and then start implementing."
    interpreted_outcome: "Close the remaining iOS proof gap by validating the distributed TestFlight build, not just the Debug-installed build."
    input_shape: existing_plan
    audience: "Foil owner/developer"
    authority: approved
    proof_type: demo
    completion_proof: "The preview iPhone has TestFlight-managed build 0.1.0 (2) installed and the physical live mailbox/audio/keyboard insertion smoke passes or records an exact blocker."
    likely_misfire: "Claiming TestFlight success while the phone is still running the Debug-installed build."
    blind_spots_considered:
      - "TestFlight may not yet expose build 2 or may require manual tester action."
      - "The Debug-installed app may block TestFlight install/update unless deleted."
      - "Deleting the app may reset keyboard, microphone, App Group, or provider state."
      - "WDA/tunnel may be down or unable to inspect the physical phone."
      - "Audio can silently route to AirPods and produce a false transcription failure."
      - "Notes or accessibility output can include private content if not controlled."
      - "App Store Connect API key material must not be printed or committed."
    existing_plan_facts:
      - "PR #238 added the command mailbox and merged it into codex/ios-keyboard-prototype."
      - "PR #238 uploaded TestFlight build 0.1.0 (2) and App Store Connect reported build-status VALID."
      - "The Debug-installed physical loop passed after switching macOS audio to MacBook Pro Speakers."
      - "The next proof must install/update the TestFlight-managed build on iPhone-preview."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-testflight-distributed-mailbox-proof/"
    command: "npx goalbuddy board docs/goals/ios-testflight-distributed-mailbox-proof"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current branch, phone, TestFlight, installed-app, WDA, keyboard, Notes, App Group, and audio-route state without changing installs."
    inputs:
      - "Current git status/log and PR #238 merge state."
      - "docs/goals/ios-preview-device-smoke/notes/T012-live-command-mailbox-smoke.md"
      - "xcrun devicectl device info and installed app metadata for iPhone-preview."
      - "WDA/tunnel reachability if available."
      - "TestFlight app UI only if privacy-safe and already accessible."
      - "macOS audio output/system route."
    constraints:
      - "Read-only."
      - "Do not delete or reinstall Foil."
      - "Do not print secrets, private accessibility trees, or private Notes content."
      - "Prefer exact identifiers, versions, build numbers, process states, and command outputs."
      - "If app install source cannot be observed directly, record the limitation and the strongest indirect evidence."
    expected_output:
      - "Branch/head/upstream and dirty-state summary."
      - "iPhone-preview connected/unlocked/WDA state."
      - "Installed Foil app version/build/source if observable."
      - "TestFlight build 2 availability if observable without destructive action."
      - "Current keyboard/Notes/App Group state relevant to the next smoke."
      - "Current macOS audio route and whether AirPods are connected."
      - "Recommended T002 decision with stop conditions."
    receipt:
      result: done
      task_id: T001
      summary: "Mapped the current TestFlight proof state without changing the Foil install. The preview phone is connected, booted, wired, unlocked enough for devicectl operations, and running TestFlight, Foil iOS, Foil Keyboard, and Notes. WDA is not listening. The installed Foil app is version 0.1.0 build 1, so the phone is not yet proven to be running the uploaded TestFlight build 0.1.0 (2). The App Group snapshot is idle/ready, and macOS audio output/system are MacBook Pro Speakers with AirPods disconnected."
      evidence:
