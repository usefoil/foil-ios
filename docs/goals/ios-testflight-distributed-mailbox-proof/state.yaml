        - "xcrun devicectl device info processes shows MobileNotes, TestFlight, Foil iOS, and Foil Keyboard running."
        - "WDA endpoints http://192.168.1.40:8100/status and http://127.0.0.1:8100/status failed to connect."
        - "App Group snapshot Library/foil-keyboard-snapshot.json copied back with phase idle and message Ready."
        - "SwitchAudioSource reports MacBook Pro Speakers for output and system; blueutil reports AirPods address 9C:F3:AC:28:C7:62 is not connected."
      commands:
        - cmd: "git status --short --branch && git log --oneline -5 --decorate"
          status: pass
        - cmd: "node .../check-goal-state.mjs docs/goals/ios-testflight-distributed-mailbox-proof/state.yaml"
          status: pass
        - cmd: "npx goalbuddy board docs/goals/ios-testflight-distributed-mailbox-proof"
          status: pass
