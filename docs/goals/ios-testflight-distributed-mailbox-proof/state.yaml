          status: pass
        - cmd: "xcrun devicectl device copy from appGroupDataContainer group.com.neonwatty.FoilIOS Library/foil-keyboard-snapshot.json"
          status: pass
        - cmd: "WDA screenshot saved to notes/visual/testflight-build2-notes-insert-reset.png"
          status: pass
      residual_risk:
