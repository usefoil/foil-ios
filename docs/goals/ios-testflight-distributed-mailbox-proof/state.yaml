        - "Dirty state contains the new GoalBuddy board plus pre-existing untracked Xcode xcuserdata and docs/superpowers marketing plan files."
        - "GoalBuddy board registered at http://goalbuddy.localhost:41737/ios-testflight-distributed-mailbox-proof/."
