version: 2

goal:
  title: "Foil iOS v0.22 TestFlight Release Proof"
  slug: "ios-v0.22-testflight-release-proof"
  kind: existing_plan
  tranche: "Ship the next TestFlight build after v0.18-v0.21 and prove it on the preview iPhone."
  status: done
  oracle:
    signal: "A new TestFlight build containing the completed tranche is uploaded, attached, installed on iPhone-preview, confirmed by device metadata, and passes a physical live transcription plus keyboard insertion smoke."
    cadence: "after release readiness Scout, after upload, after install, after physical smoke, and at final audit"
    final_proof: "Build metadata diff, archive/export/upload receipts, App Store Connect/TestFlight state, device installed-build metadata, physical smoke receipts, secret/raw-content scan, PR link, and final audit."
  intake:
    original_request: "plan out the next 5 goalbuddy prep boards"
    interpreted_outcome: "End the next conveyor with a release-style TestFlight proof of the completed iOS tranche."
    input_shape: existing_plan
    audience: "Foil owner/developer installing and dogfooding the iPhone preview"
    authority: approved
    proof_type: demo
    completion_proof: "The preview phone runs the new TestFlight build and passes the core live smoke on that exact build."
    likely_misfire: "Uploading a build but proving a debug-installed or stale TestFlight build."
    blind_spots_considered:
      - "App Store Connect export compliance may need explicit patching."
      - "TestFlight may lag or show cached build metadata."
      - "Automatic Updates state can affect install expectations."
      - "A physical smoke can pass against stale App Group state if cleanup is weak."
      - "Credentials and provider keys must never be logged or committed."
    existing_plan_facts:
      - "Earlier TestFlight boards proved builds 2 through 10 with upload/install loops."
      - "The v0.18-v0.21 boards should produce the code/docs and receipts that make a new build worthwhile."
      - "The preview iPhone and App Store Connect API key setup have already been used successfully."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-22-testflight-release-proof/"
    command: "npx goalbuddy board docs/goals/ios-v0.22-testflight-release-proof"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Assess whether v0.18-v0.21 are ready to package and identify the exact next build number and release proof path."
    inputs:
      - "FoiliOS/project.yml"
      - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
      - "v0.18-v0.21 receipts"
      - "Existing TestFlight release docs and receipts"
    constraints:
      - "Read-only."
      - "Do not print App Store Connect credentials."
      - "Do not upload until Judge approves readiness."
    expected_output:
      - "Current build/version metadata."
      - "Completed tranche PRs and missing release blockers."
      - "Next build number recommendation."
      - "Archive/export/upload/install proof plan."
      - "Candidate Worker slice with allowed_files and verify commands."
    receipt:
      result: done
      note: "notes/T001-scout.md"
      summary: "v0.18-v0.21 are source-ready for packaging; current metadata is 0.1.0 build 10; next build should be 0.1.0 build 11; iPhone-preview is visible and WDA is merely down; App Store Connect upload is blocked until API key ID and issuer ID are restored without printing secrets."
      current_metadata:
        marketing_version: "0.1.0"
        build: "10"
      next_build: "11"
      release_readiness:
        v0_18: done
        v0_19: done
        v0_20: done
        v0_21: done
      blockers:
        - "Full TestFlight validation/upload cannot proceed because altool has no API key ID/issuer ID in the current environment or repo docs."
      candidate_worker: T003

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Decide whether to release the next TestFlight build or require one blocker fix first."
    inputs:
      - "T001 receipt"
      - "Goal oracle"
    constraints:
      - "Reject release if v0.18-v0.21 receipts do not prove their oracles."
      - "Require device-installed-build metadata for final smoke."
    expected_output:
      - "release approved | fix first | blocked"
      - "Exact Worker objective"
      - "allowed_files"
      - "verify commands"
      - "stop_if conditions"
    receipt:
      result: done
      decision: local_prep_approved
      note: "notes/T002-judge.md"
      summary: "Full release is not approved yet because App Store Connect authentication parameters are missing, but local build-11 release prep is approved as the largest safe useful slice."
      full_outcome_complete: false
      worker_task: T003
      blocked_until:
        - "Restore App Store Connect API key ID and issuer ID through a safe local source before upload."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Prepare build 11 locally: bump metadata, regenerate project, run focused tests, archive/export IPA, and prove app plus keyboard metadata before upload."
    allowed_files:
      - "FoiliOS/project.yml"
      - "FoiliOS/FoilIOS.xcodeproj/**"
      - "docs/goals/ios-v0.22-testflight-release-proof/**"
    verify:
      - "cd FoiliOS && xcodegen generate --spec project.yml"
      - "Focused simulator tests for FoilIOSTests"
      - "xcodebuild archive/export for build 11"
      - "IPA metadata inspection for app and keyboard version/build"
      - "git diff --check"
      - "Targeted secret/raw-content scan over touched files"
    stop_if:
      - "Credentials are missing or would need to be printed."
      - "Archive/export requires interactive Apple account action."
      - "IPA metadata does not show app and keyboard 0.1.0 build 11."
    receipt:
      result: done
      task_id: T003
      note: "notes/T003-worker.md"
      summary: "Bumped Foil iOS to build 11, regenerated the Xcode project, ran focused simulator tests, archived/exported the Release IPA, and proved both the containing app and keyboard extension have version 0.1.0 build 11."
      changed_files:
        - "FoiliOS/project.yml"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "docs/goals/ios-v0.22-testflight-release-proof/state.yaml"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/T003-worker.md"
      artifacts:
        archive: "/tmp/FoilIOS-v022-build11.xcarchive"
        export: "/tmp/FoilIOS-v022-build11-export"
        ipa: "/tmp/FoilIOS-v022-build11-export/Foil iOS.ipa"
        ipa_sha256: "dac9c7f904302ac3d33b8fd1788b17f11aff5ad92a5365d18018c0c081f20a55"
      metadata:
        marketing_version: "0.1.0"
        build: "11"
        app_bundle_id: "com.neonwatty.FoilIOS"
        keyboard_bundle_id: "com.neonwatty.FoilIOS.Keyboard"
      evidence:
        - "FoiliOS/project.yml changed CURRENT_PROJECT_VERSION from 10 to 11."
        - "XcodeGen regenerated the project and generated build settings show CURRENT_PROJECT_VERSION 11 / MARKETING_VERSION 0.1.0."
        - "Focused simulator tests passed: 21 tests, 0 failures."
        - "Release archive succeeded at /tmp/FoilIOS-v022-build11.xcarchive."
        - "Export succeeded to /tmp/FoilIOS-v022-build11-export/Foil iOS.ipa."
        - "IPA metadata inspection showed app and keyboard version 0.1.0 build 11."
      commands:
        - cmd: "cd FoiliOS && xcodegen generate --spec project.yml"
          status: pass
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS"
          status: pass
        - cmd: "xcodebuild archive -project FoilIOS.xcodeproj -scheme FoilIOS"
          status: pass
        - cmd: "xcodebuild -exportArchive -archivePath /tmp/FoilIOS-v022-build11.xcarchive"
          status: pass
        - cmd: "IPA metadata inspection for app and keyboard Info.plist"
          status: pass

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "After App Store Connect authentication is available, validate/upload/attach build 11, install/update it through TestFlight on iPhone-preview, and run the physical live smoke."
    allowed_files:
      - "docs/goals/ios-v0.22-testflight-release-proof/**"
    verify:
      - "altool validate/upload/build-status"
      - "App Store Connect export-compliance and beta-group attachment checks"
      - "TestFlight install/update on iPhone-preview"
      - "devicectl installed app metadata confirms build 11"
      - "Physical live transcription and exact-once insertion smoke"
      - "git diff --check"
      - "Targeted secret/raw-content scan over touched files"
    stop_if:
      - "Credentials are missing or would need to be printed."
      - "The phone needs unlock/install/user action."
      - "Build processing remains unavailable after a reasonable documented wait."
      - "The installed build metadata does not match the uploaded build."
    receipt:
      result: done
      task_id: T004
      note: "notes/T004-physical-smoke.md"
      summary: "Validated, uploaded, export-compliance-cleared, attached, installed, and physically smoke-tested build 11. iPhone-preview reports Foil iOS 0.1.0 bundle version 11; build 11 recorded/transcribed a sterile phrase, Foil Keyboard inserted it into Notes, Insert latest disabled after insertion, and App Group state returned to idle/no transcript."
      changed_files:
        - "docs/goals/ios-v0.22-testflight-release-proof/state.yaml"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/T004-physical-smoke.md"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/T999-final-audit.md"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-installed-metadata.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-status-live.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-app-group-before.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-foil-before-record.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-foil-after-record-start.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-foil-after-record-stop.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-foil-after-transcribe.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-app-group-after-transcribe.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-notes-before-insert.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-notes-after-insert.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-app-group-after-insert.json"
        - "docs/goals/ios-v0.22-testflight-release-proof/notes/receipts/build11-app-group-cleanup.json"
      completed:
        - "altool validation reported VERIFY SUCCEEDED with no errors."
        - "altool upload reported UPLOAD SUCCEEDED with no errors."
        - "altool build-status reported VALID / VALID / is-on-app-store-connect true."
        - "App Store Connect REST found build 11, patched usesNonExemptEncryption=false, and confirmed READY_FOR_BETA_TESTING / READY_FOR_BETA_SUBMISSION."
        - "App Store Connect REST attached build 11 to Foil Internal Testers and verified group membership contains build 11."
        - "TestFlight showed Foil Dictation VERSION 0.1.0 Build 11 and the operator approved replacing the existing build 10 app."
        - "devicectl installed-app metadata reported Foil iOS 0.1.0 bundle version 11."
        - "WDA live smoke recorded a sterile phrase through Foil iOS, transcribed through Groq, exposed a complete App Group transcript, inserted through Foil Keyboard in Notes, and cleared App Group state."
      app_store_connect:
        delivery_id: "12ba179e-cc4d-4685-920f-ccc3bc916fa9"
        build_id: "12ba179e-cc4d-4685-920f-ccc3bc916fa9"
        beta_group_id: "bcca568d-167d-44cb-b952-a410e9c9e10f"
        processing_state: "VALID"
        internal_build_state: "READY_FOR_BETA_TESTING"
        external_build_state: "READY_FOR_BETA_SUBMISSION"
        uses_non_exempt_encryption: false
        group_contains_build11: true
      installed_device:
        name: "iPhone-preview"
        bundle_id: "com.neonwatty.FoilIOS"
        version: "0.1.0"
        bundle_version: "11"
      physical_smoke:
        wda_url: "http://192.168.1.40:8100"
        provider: "Groq"
        target_app: "Notes"
        app_group_after_transcribe:
          phase: "complete"
          has_transcript: true
          transcript_length: 24
        notes_phrase_count_before: 3
        notes_phrase_count_after: 4
        insert_latest_after_insert_enabled: false
        app_group_after_insert:
          phase: "idle"
          has_transcript: false
      receipts:
        - "notes/receipts/build11-installed-metadata.json"
        - "notes/receipts/build11-status-live.json"
        - "notes/receipts/build11-app-group-before.json"
        - "notes/receipts/build11-foil-before-record.json"
        - "notes/receipts/build11-foil-after-record-start.json"
        - "notes/receipts/build11-foil-after-record-stop.json"
        - "notes/receipts/build11-foil-after-transcribe.json"
        - "notes/receipts/build11-app-group-after-transcribe.json"
        - "notes/receipts/build11-notes-before-insert.json"
        - "notes/receipts/build11-notes-after-insert.json"
        - "notes/receipts/build11-app-group-after-insert.json"
        - "notes/receipts/build11-app-group-cleanup.json"
      commands:
        - cmd: "xcrun devicectl device info apps --device 5320F5AD-2A71-50AC-94FE-207B544B6247"
          status: pass
        - cmd: "xcodebuild WebDriverAgentRunner-nodebug against iPhone-preview"
          status: pass
        - cmd: "scripts/ios-physical-harness.py reset-transcript"
          status: pass
        - cmd: "WDA click start-recording-button, play sterile phrase with say, click stop-recording-button, click transcribe-latest-button"
          status: pass
        - cmd: "scripts/ios-physical-harness.py app-group-summary"
          status: pass
        - cmd: "WDA element-click foil-keyboard-insert-latest"
          status: pass
        - cmd: "scripts/ios-physical-harness.py receipt for Notes pre/post insert"
          status: pass
        - cmd: "scripts/ios-physical-harness.py reset-transcript final cleanup"
          status: pass

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: try to disprove that the physical smoke ran against the new TestFlight build."
    inputs:
      - "Release receipts"
      - "Device metadata"
      - "Physical smoke receipts"
      - "Goal oracle"
    constraints:
      - "Treat stale/debug build proof as the strongest failure mode."
    expected_output:
      - "full_outcome_complete: true | false"
      - "Strongest realistic failure mode"
      - "Evidence that rules it out or exact follow-up"
    receipt:
      result: done
      task_id: T999
      decision: complete
      full_outcome_complete: true
      note: "notes/T999-final-audit.md"
      summary: "The v0.22 TestFlight release proof is complete: build 11 is uploaded, beta-ready, attached to Foil Internal Testers, installed on iPhone-preview, confirmed by device metadata, and passed the live app transcription plus Foil Keyboard insertion smoke."
      strongest_realistic_failure_mode:
        claim: "The smoke could have run against build 10, a debug install, or stale shared state rather than installed TestFlight build 11."
        evidence_that_rules_it_out:
          - "TestFlight presented Foil Dictation VERSION 0.1.0 Build 11 before install."
          - "After replacement, devicectl reported com.neonwatty.FoilIOS version 0.1.0 bundle version 11."
          - "The live smoke launched com.neonwatty.FoilIOS after the installed-build metadata check."
          - "The smoke started from App Group idle/no transcript, produced a fresh complete transcript, inserted through Foil Keyboard, and returned App Group state to idle/no transcript."
      residual_risk:
        - "This smoke proves Notes insertion only; broader host-app coverage remains in the target-app matrix boards."
