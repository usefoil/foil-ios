version: 2

goal:
  title: "Foil iOS TestFlight Readiness With Physical Gate"
  slug: "ios-testflight-readiness-physical-gate"
  kind: existing_plan
  tranche: "Run a fresh TestFlight/readiness pass using issue #39 physical proof as the release gate."
  status: done
  oracle:
    signal: "Current main can regenerate, validate, optionally upload, and account for TestFlight build 0.1.0 (13), while physical route-first proof remains valid."
    cadence: "before upload, after upload, after App Store Connect processing, and before any TestFlight-ready claim"
    final_proof: "Sanitized receipts for physical gate, archive/export metadata, altool validation/upload or exact blocker, App Store Connect build state, internal group/tester state, and preview-phone smoke or exact blocker."
  intake:
    original_request: "setup a good follow-up conveyor: a fresh TestFlight/readiness pass using this physical proof as the release gate"
    interpreted_outcome: "Create and run a measured TestFlight readiness conveyor that cannot claim release readiness unless the physical route-first onboarding proof remains valid."
    input_shape: existing_plan
    audience: "Foil owner preparing iOS build 0.1.0 (13) for internal TestFlight"
    authority: approved
    proof_type: artifact
    completion_proof: "Final Judge receipt maps every TestFlight/readiness gate to fresh evidence or exact blocker."
    likely_misfire: "Uploading or declaring TestFlight readiness from stale archive artifacts, stale App Store Connect state, or optimistic onboarding UI rather than physical proof."
    blind_spots_considered:
      - "The physical proof board could be local-only or stale relative to current main."
      - "Archive/export can silently use old version/build metadata or missing icons."
      - "App Store Connect API auth can fail or expose secrets if handled carelessly."
      - "Validation can pass while upload, processing, export compliance, or group attachment remains incomplete."
      - "Preview phone TestFlight install can require human App Store authentication."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  no_secret_printing: true
  no_upload_without_validation: true

