# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Foil iOS TestFlight Onboarding And Failure Recovery"
  slug: "ios-testflight-onboarding-failure-recovery"
  kind: specific
  tranche: "Make the iOS custom-keyboard prototype understandable and recoverable for early TestFlight testers."
  status: done
  oracle:
    signal: "Physical iPhone-preview walkthrough starts from fresh or intentionally unhealthy tester state, guides keyboard install/Full Access/microphone/provider readiness, completes real transcription and one-time insertion, and recovers/reset with App Group idle/no transcript afterward."
    cadence: "after each Worker package and at final audit"
    final_proof: "Merged PRs into codex/ios-keyboard-prototype plus receipts with physical WDA/source snippets, copied App Group state, sanitized screenshots/hashes, build/install commands, secret scan, issue/PR links, and final audit."
  intake:
    original_request: "Plan the next iOS TestFlight onboarding and failure-recovery slice with GoalBuddy prep and begin."
    interpreted_outcome: "Prepare and execute a GoalBuddy board that turns the proven iOS keyboard prototype into a tester-facing onboarding, credential, permission, and recovery experience."
    input_shape: specific
    audience: "Foil owner/developer and early TestFlight iPhone testers"
    authority: approved
    proof_type: demo
    completion_proof: "The iOS prototype branch has a verified TestFlight-grade setup/recovery flow and physical real-transcription insertion proof."
    likely_misfire: "Prototype diagnostics get rearranged into nicer UI while DEBUG-only credentials, unclear Full Access copy, and unhandled failure states remain."
    blind_spots_considered:
      - "Allow Full Access remains required and Apple's warning may scare testers."
      - "DEBUG UserDefaults key injection is not a TestFlight credential story."
      - "Microphone permission, network failures, Groq/API failures, and empty transcripts need visible recovery."
      - "Secure fields reject custom keyboards by platform design."
      - "Messages requires a safe self/test thread."
      - "Physical iPhone proof is mandatory; simulator proof is supporting evidence only."
      - "Target-app/WDA evidence must be sanitized."
      - "Raw recordings, transcript bodies, and keys must not be committed."
    existing_plan_facts:
      - "Continue from codex/ios-keyboard-prototype."
      - "PR #227 proved onboarding/full-access/real-loop basics."
      - "PR #228 marked the prior GoalBuddy board complete."
      - "Next product slice is TestFlight-grade onboarding and failure recovery."
      - "Use preview iPhone when available and unlocked."
      - "Create PRs into codex/ios-keyboard-prototype, not main."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-testflight-onboarding-failure-recovery/"
    command: "npx goalbuddy board docs/goals/ios-testflight-onboarding-failure-recovery"

