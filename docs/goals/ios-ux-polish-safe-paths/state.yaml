version: 2

goal:
  title: "Foil iOS UX Polish Safe Paths"
  slug: "ios-ux-polish-safe-paths"
  kind: open_ended
  tranche: "Audit then polish the current iOS beta UX before starting the Mac bridge conveyor."
  status: done
  oracle:
    signal: "Current iOS beta UX claims are intuitive, narrow, physically checked, and backed by tests/receipts/merged PRs."
    cadence: "after UX audit, after each implementation slice, after physical walkthrough, and before final merge/readiness claims"
    final_proof: "Final Judge audit maps UX improvements to focused tests, sanitized physical receipts, host-app matrix boundaries, PR/CI/merge evidence, and no-overclaim scans."
  intake:
    original_request: "Before we start the bridge conveyor, let's do a thorough review of the iOS UX."
    interpreted_outcome: "Run an audit-then-polish conveyor for the current iOS app, keyboard, and safe host-app experiences before Mac bridge work."
    input_shape: vague
    audience: "Foil owner and internal iOS beta testers"
    authority: approved
    proof_type: demo
    completion_proof: "Merged scoped UX polish PRs plus final sanitized physical walkthrough/audit proving the current beta path is intuitive without overclaiming unsupported apps."
    likely_misfire: "Polishing copy or UI in a way that makes unsupported host apps, stale keyboard health, missing Full Access, missing provider route, or failed insertion look complete."
    blind_spots_considered:
      - "Messages and Notes can expose private user content unless the surface is prepared as sterile."
      - "A route-choice UI can sound complete before Mac pairing exists."
      - "Full Access explanation can become too broad or too scary."
      - "Keyboard health can be fresh in the app but stale in the extension if check-in proof is not current."
      - "Exact-once insertion can regress if the UI encourages repeated taps or stale transcript reuse."
    selected_posture: "audit_then_polish_safe_paths"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_completion_without_judge_or_pm_audit: true
  no_secret_printing: true
  no_private_phone_content: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: queued
    url: "http://goalbuddy.localhost:41737/ios-ux-polish-safe-paths/"
    command: "npx goalbuddy board docs/goals/ios-ux-polish-safe-paths"

active_task: null

source_context:
  iOS_repo: "https://github.com/usefoil/foil-ios"
  recent_readiness_pr: "https://github.com/usefoil/foil-ios/pull/49"
  route_first_issue: "https://github.com/usefoil/foil-ios/issues/39"
  proven_build: "0.1.0 (13)"
  known_safe_current_path:
    - "Use an API key on this iPhone."
    - "Foil Keyboard Allow Full Access enabled."
    - "Keyboard health recent after extension check-in."
    - "Sterile Safari field insertion proof."
  future_path:
    - "Use my Mac is recommended/future-facing until bridge proof exists."

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Inventory current iOS UX surfaces, existing proof, and likely friction before touching code."
    inputs:
      - "AGENTS.md"
      - "docs/acceptance-evidence.md"
      - "docs/ios-closed-beta-tester-handoff.md"
      - "docs/ios-keyboard-host-app-matrix.md"
      - "docs/goals/ios-v0.41-closed-beta-polish-conveyor/state.yaml"
      - "docs/goals/ios-testflight-readiness-physical-gate/state.yaml"
      - "FoiliOS app and keyboard source files"
    constraints:
      - "Read-only task; do not edit product files."
      - "Do not collect or commit raw WDA trees, screenshots, recordings, transcripts, private phone content, keys, JWTs, archives, or IPAs."
      - "Use sanitized notes only."
    expected_output:
      - "A UX surface map covering app setup, route choice, provider health, recording/transcription, keyboard health, insertion, recovery, and host-app boundaries."
      - "A list of top friction points with evidence and risk."
      - "Candidate physical walkthrough script using sterile surfaces only."
      - "Recommended next Judge task inputs."
    receipt:
      result: done
      note: "docs/goals/ios-ux-polish-safe-paths/notes/T001-ux-surface-map.md"
      summary: "Mapped current Foil app, Foil Keyboard, presenter/test coverage, tester docs, host-app matrix, and prior physical receipts. Main UX risk is not missing copy but physical flow ambiguity: first-run setup sits below the dictation console, action surfaces are duplicated, keyboard labels are terse in host-app context, and Notes/Messages need fresh sterile gating before current-build claims."
      evidence:
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
        - "docs/ios-closed-beta-tester-handoff.md"
        - "docs/ios-keyboard-host-app-matrix.md"
        - "docs/goals/ios-testflight-readiness-physical-gate/state.yaml"
      next_active_task: "T002"
      privacy:
        secretsPrinted: false
        privatePhoneContentPrinted: false
        rawWdaSourceCommitted: false
        screenshotsCommitted: false

  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Run or prepare the physical safe-host-app UX walkthrough and record sanitized receipts."
    inputs:
      - "T001 UX surface map"
      - "iPhone-preview availability"
      - "Direct WDA URL if healthy, likely http://192.168.1.40:8100"
    constraints:
      - "Use only sterile phrases and operator-prepared blank/fake host surfaces."
      - "Messages must use a fake or dedicated draft surface only; do not inspect private threads or contacts."
      - "Notes must use a blank note/editor only; do not inspect existing notes."
      - "Mail remains deferred unless a sterile blank compose surface and account privacy are explicitly prepared."
      - "Secure/password fields are rejection proof only, never insertion support."
    expected_output:
      - "Sanitized pass/fail receipts for app setup, keyboard health, provider route, App Group idle/reset, Safari insertion, Notes blank editor if safe, Messages fake/dedicated draft if safe, secure-field rejection, stale-state recovery, and exact-once behavior."
      - "Exact blocker receipts for any host app that cannot be safely touched."
    receipt:
      result: done
      summary: "Resumed after preview-device/WDA recovery and collected current-main physical UX receipts. Verified route/setup readiness, Mac route not-ready behavior, iPhone API route readiness after keyboard refresh, Safari exact-once insertion, secure-field rejection, blank Notes exact-once insertion, user-prepared Messages draft exact-once insertion without sending, and App Group idle/no-transcript recovery."
      evidence:
        - "docs/goals/ios-ux-polish-safe-paths/notes/T015-healthy-preflight-after-install.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T015-current-main-route-visible-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T015-current-main-mac-route-not-ready-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T015-current-main-incomplete-setup-leads-layout.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T016-current-main-ready-after-keyboard-refresh-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T017-current-main-safari-before-insert-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T017-current-main-safari-after-insert-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T017-current-main-app-group-after-insert.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T018-current-main-secure-field-rejection-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T018-current-main-app-group-after-secure-reset.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T019-current-main-notes-before-insert-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T019-current-main-notes-after-insert-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T019-current-main-app-group-after-notes-insert.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T020-messages-healthy-preflight-rerun.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T020-current-main-messages-before-insert-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T020-current-main-messages-after-insert-receipt.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T020-current-main-app-group-after-messages-insert.json"
      commands:
        - cmd: "python3 scripts/ios-physical-harness.py preflight --strict --wda-url http://192.168.1.40:8100"
          status: pass
      next_owner: "PM"
      next_action: "Finalize the resumed audit receipts and open the evidence PR."
      privacy:
        openedHostApps: true
        printedRawWdaSource: false
        printedScreenshots: false
        printedTranscriptBodies: false

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Prioritize the first safe UX polish implementation slice."
    inputs:
      - "T001 surface map"
      - "T002 physical walkthrough receipts or blockers"
      - "Current test coverage"
    constraints:
      - "Prefer the largest reversible slice that improves real tester intuition without expanding unsupported claims."
      - "Reject fixes that require private content, broad host-app claims, or Mac bridge behavior."
    expected_output:
      - "Decision: approve first Worker slice or request more evidence."
      - "Exact Worker objective."
      - "Allowed files."
      - "Verification commands."
      - "Stop conditions."
      - "Whether the slice should become one PR or be split."
    receipt:
      result: done
      decision: "approved_first_worker_slice"
      note: "docs/goals/ios-ux-polish-safe-paths/notes/T003-first-slice-decision.md"
      summary: "Approved a bounded first UX polish slice: make route/setup readiness lead the app only when setup is not ready and no dictation/transcript flow is active. T002 physical walkthrough is blocked by device_unavailable/WDA unreachable, but source/test evidence is enough for this conservative layout improvement."
      commands:
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17' -only-testing:FoilIOSTests/FoilDictationLoopPresentationTests"
          status: pass
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17' -only-testing:FoilIOSTests/FoilKeyboardBridgeTests"
          status: pass_after_sequential_rerun
      evidence:
        - "docs/goals/ios-ux-polish-safe-paths/notes/T001-ux-surface-map.md"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T002-preflight.json"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
      next_active_task: "T004"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Make setup lead the app when setup is not ready and no dictation/transcript flow is active."
    allowed_files:
      - "FoiliOS/FoilIOSApp/ContentView.swift"
      - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
      - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
      - "docs/goals/ios-ux-polish-safe-paths/**"
    verify:
      - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17' -only-testing:FoilIOSTests/FoilDictationLoopPresentationTests"
      - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17' -only-testing:FoilIOSTests/FoilKeyboardBridgeTests"
      - "git diff --check"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-ux-polish-safe-paths/state.yaml"
      - "Run no-overclaim and privacy scans over changed docs/receipts."
      - "Open a PR, monitor CI, and merge only when fresh checks are green and mergeability is clean."
    stop_if:
      - "Need files outside allowed_files."
      - "Need private phone content, raw WDA source, screenshots of private apps, provider keys, App Store Connect keys, JWTs, archives, or IPAs."
      - "The fix would imply Mac bridge support, Mail support, arbitrary-app support, Messages delivery, secure-field insertion, or unsupported private-thread behavior."
      - "The fix hides active recording, transcription, transcript review, or recovery behind setup."
      - "Focused verification fails twice without a clear small fix."
    receipt:
      result: done
      pr: "https://github.com/usefoil/foil-ios/pull/50"
      summary: "Implemented the first UX polish slice. ContentView now leads with route/setup readiness when setup is not ready and no dictation/transcript flow is active, while preserving dictation-first ordering for setup-ready, recording, saved-recording, transcribing, processing, and transcript-ready states. Added presenter tests for the layout decision and left keyboard insertion/consume/reset logic untouched."
      changed_files:
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
        - "docs/goals/ios-ux-polish-safe-paths/state.yaml"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T001-ux-surface-map.md"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T002-preflight.json"
        - "docs/goals/ios-ux-polish-safe-paths/notes/T003-first-slice-decision.md"
      commands:
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17' -only-testing:FoilIOSTests/FoilDictationLoopPresentationTests"
          status: pass
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17' -only-testing:FoilIOSTests/FoilKeyboardBridgeTests"
          status: pass
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17'"
          status: pass
        - cmd: "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO"
          status: pass
        - cmd: "git diff --check"
          status: pass
        - cmd: "privacy/no-overclaim scan over changed files"
          status: pass
        - cmd: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.8/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/ios-ux-polish-safe-paths/state.yaml"
          status: pass
      evidence:
        - "New tests prove setup leads only when setup is incomplete and idle."
        - "Full simulator suite executed 56 tests with 0 failures."
        - "Bridge tests still prove exact-once insertion, stale transcript rejection, non-complete leftover transcript rejection, and shared-state clearing."
        - "Privacy/no-overclaim scan hits were limited to existing negative guardrails and tests asserting unsafe claims are absent."
        - "T002 preflight remains blocked, so no host apps or private surfaces were touched."
      privacy:
        openedHostApps: false
        printedRawWdaSource: false
        printedScreenshots: false
        printedTranscriptBodies: false

  - id: T005
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review the merged first polish slice and decide whether another safe polish slice is required."
    inputs:
      - "T004 PR, tests, CI, merge evidence, and physical receipts"
      - "Original T001/T002 UX findings"
    expected_output:
      - "Decision: continue with another Worker slice, collect more physical proof, or proceed to final audit."
      - "If continuing, exact next Worker objective, allowed files, verification, and stop conditions."
    receipt:
      result: done
      decision: "no_second_source_only_slice"
      note: "docs/goals/ios-ux-polish-safe-paths/notes/T005-post-merge-judge.md"
      summary: "PR #50 merged cleanly after fresh CodeQL checks. The first UX slice is accepted, but no second source-only polish slice is approved because the remaining UX uncertainty is physical host-app behavior and preview-device/WDA availability is still blocked."
      evidence:
        - "https://github.com/usefoil/foil-ios/pull/50"
        - "Merge commit ad46d1f13b56f44798b57eac0e261d764c147164"
        - "Analyze (python): pass"
        - "Analyze (swift): pass"
        - "CodeQL: pass"
        - "Strict preflight rerun classification: device_unavailable, safeToTouchHostApps false"
      next_active_task: "T999"

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Implement a second safe UX polish slice if T005 approves one."
    allowed_files:
      - "docs/goals/ios-ux-polish-safe-paths/**"
    verify: []
    stop_if:
      - "T005 did not approve this slice."
      - "Need private phone content, raw WDA source, screenshots of private apps, provider keys, App Store Connect keys, JWTs, archives, or IPAs."
      - "The change expands unsupported host-app or Mac bridge claims."
    receipt:
      result: done
      summary: "T005 did not approve a second source-only UX implementation slice. This task is complete as not applicable; the tranche proceeded through resumed physical proof instead of more source changes."
      changed_files:
        - "docs/goals/ios-ux-polish-safe-paths/state.yaml"
      commands:
        - cmd: "T005 judge decision"
          status: pass
      next_owner: "PM"
      next_action: "Use T002 resumed physical receipts and T999 final audit for completion."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: decide whether the iOS UX polish tranche is complete before the Mac bridge conveyor."
    inputs:
      - "All task receipts"
      - "Merged PRs and CI status"
      - "Sanitized physical receipts"
      - "Current dirty diff"
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "Evidence that the app does not claim setup is complete when Full Access, keyboard health, provider route, App Group state, insertion, or host-app targeting still fails."
      - "Remaining blockers or next board if not complete."
    receipt:
      result: done
      decision: "complete"
      full_outcome_complete: true
      note: "docs/goals/ios-ux-polish-safe-paths/notes/T999-resumed-final-audit.md"
      summary: "The iOS UX polish tranche is complete. PR #50 merged the setup-ordering polish, and resumed current-main physical receipts prove route/setup readiness, no Mac-route overclaim, Full Access and keyboard health readiness after extension check-in, Safari/Notes/Messages exact-once insertion, secure-field rejection, and App Group idle/no-transcript recovery."
      completed:
        - "Current UX surfaces audited."
        - "PR #50 merged after fresh green checks."
        - "Setup now leads incomplete idle first-run states without hiding active dictation or transcript flows."
        - "Presenter and bridge tests passed before merge."
        - "Current-main route/setup, readiness, Safari, Notes, Messages, secure-field, and App Group recovery receipts were collected after preview-device/WDA recovery."
        - "Messages proof used a user-prepared sterile draft and was not sent."
      missing_evidence: []
      next_owner: "PM"
      next_action: "Open and monitor the sanitized evidence PR, then start the Mac bridge conveyor."
      privacy:
        openedHostApps: true
        printedRawWdaSource: false
        printedScreenshots: false
        printedTranscriptBodies: false
