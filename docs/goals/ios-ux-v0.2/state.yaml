  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the UX v0.2 tranche is complete."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "The iOS UX v0.2 tranche is complete. Build 5 is valid and attached in TestFlight, installed on iPhone-preview, shows the guided dictation UX on-device, preserves the keyboard insertion path, and resets shared state after insertion."
      strongest_realistic_failure_modes:
        - failure_mode: "Build 5 might be valid in App Store Connect but not actually installed on the physical phone."
          ruled_out_by: "devicectl showed Foil iOS 0.1.0 bundle version 4 before install, devicectl install succeeded from the build-5 archive, and final app metadata showed Foil iOS 0.1.0 bundle version 5."
        - failure_mode: "The v0.2 guided console might only work in the simulator."
          ruled_out_by: "WDA source on iPhone-preview showed dictation-console, Ready to dictate, Start a new recording from Foil, and primary-record-dictation-button; screenshot build5-guided-dictation-device.png was captured from the physical device."
        - failure_mode: "The updated keyboard wording/UI might break the custom keyboard insertion path."
          ruled_out_by: "Foil Keyboard on iPhone-preview showed Transcript Ready and enabled foil-keyboard-insert-latest; tapping it inserted deterministic fake transcript metadata length 19 / sha256 f698b7a670a73cf9 into a fresh Notes note."
        - failure_mode: "The keyboard might appear reset while canonical App Group state still contains stale transcript data."
          ruled_out_by: "After insertion, Foil Keyboard showed Ready/No transcript/Clear disabled, and the copied canonical App Group snapshot showed phase idle and message Ready with no transcript field."
        - failure_mode: "The previous CoreDevice tunnel blocker might still make physical automation unreliable."
          ruled_out_by: "Host-side CoreDeviceService restart plus devicectl manage pair recovered WDA, devicectl install, devicectl launch, app metadata, WDA screenshots, and App Group copy-from in the same run."
      residual_risk:
        - "Build 5 was installed directly from the archive for physical proof after being uploaded and attached in TestFlight; this proves the same build metadata and extension behavior, but it is not a TestFlight-app UI update click proof."
