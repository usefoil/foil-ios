# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS UX v0.2"
  slug: "ios-ux-v0.2"
  kind: existing_plan
  tranche: "Plan and implement the next small product UX layer over the proven iOS TestFlight keyboard prototype."
  status: done
  oracle:
    signal: "A tester can use the containing app and keyboard without knowing about the mailbox test harness, and physical-device smokes prove the updated UX."
    cadence: "after Scout/Judge/Worker packages"
    final_proof: "UX diff, screenshots, physical-device insertion proof, target-app matrix note, and final audit."
  intake:
    original_request: "After build 4 update hygiene, prepare the larger iOS UX v0.2 board."
    interpreted_outcome: "Start a product UX tranche for the iOS dictation prototype."
    input_shape: existing_plan
    audience: "Foil owner/developer and early iPhone TestFlight testers"
    authority: approved
    proof_type: demo
    completion_proof: "Containing app and keyboard UX improvements are implemented and smoke-tested on TestFlight/physical iPhone."
    likely_misfire: "Polishing UI copy while leaving the real record/transcribe/insert/recovery workflow confusing or unproven."
    blind_spots_considered:
      - "Keyboard extensions cannot record directly."
      - "The proven mailbox is useful internally but should not define the user mental model."
      - "TestFlight build/update proof is now healthy through build 4."
      - "Audio can route to AirPods and create weak transcripts."
      - "Messages testing needs a sterile fixture."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-ux-v0-2/"
    command: "npx goalbuddy board docs/goals/ios-ux-v0.2"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current iOS containing-app and keyboard UX, proven physical-device flows, rough edges, and the smallest high-value v0.2 Worker slice."
    inputs:
      - "FoiliOS/FoilIOSApp"
      - "FoiliOS/FoilKeyboard"
      - "FoiliOS/Shared"
      - "Recent GoalBuddy proof boards for builds 2, 3, and 4."
      - "docs/acceptance-evidence.md"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not print secrets or private transcripts."
    expected_output:
      - "Current UX map."
      - "Known proven flows and known weak spots."
      - "Recommended first bounded Worker slice with allowed_files, verify, and stop_if."
    receipt:
      result: done
      task_id: T001
      summary: "Mapped the current containing-app, keyboard, shared bridge, and build-4 proof surface. The strongest near-term UX gap is not missing infrastructure; it is that the tester still has to infer the dictation lifecycle from generic setup/status rows and mailbox-like controls."
      evidence:
        - "Read FoiliOS/FoilIOSApp/ContentView.swift, AudioCaptureController.swift, TranscriptionController.swift, FoiliOS/FoilKeyboard/KeyboardViewController.swift, FoiliOS/Shared/FoilKeyboardBridge.swift, and build-4 GoalBuddy proof."
        - "Confirmed existing shared phases and keyboard insertion/reset behavior are already strong enough to preserve."
        - "Confirmed build-4 physical proof covers the architecture but not this v0.2 UI diff."
      current_ux_map:
        containing_app:
          - "Top section identifies Foil iOS and shows keyboard shell readiness."
          - "Setup rows cover keyboard installation, Full Access, microphone, provider key, keyboard health, and shared-state health."
          - "Dictation section exposes independent Record, Stop, and Transcribe controls plus raw-ish status rows for snapshot/audio/transcription."
          - "Handoff and Recovery sections appear from shared-state/audio/transcription conditions."
          - "Diagnostics disclosure keeps reset/fake transcript/storage/secure-field tests available."
        keyboard:
          - "Vertical UIKit keyboard surface with status, message, Insert latest, Clear latest, Start/Open Foil, and Next Keyboard."
          - "Start requests handoff, records keyboard health, and opens the containing app."
          - "Insert latest writes the transcript through textDocumentProxy, then resets shared state."
          - "Full Access off blocks insert/reset and opens the app for recovery."
        shared_bridge:
          - "Shared snapshot phases already model idle, handoffRequested, listening, processing, complete, and failed."
          - "Bridge persists canonical App Group JSON plus UserDefaults fallback/reporting, and records keyboard Full Access health."
      proven_flows:
        - "Build 4 update from TestFlight over build 3 is proven."
        - "Automatic Updates was restored to on."
        - "Physical-device audio/transcription/keyboard insertion in Notes is proven with a second clean sterile phrase."
      weak_spots:
        - "Primary app flow still looks like separate engineering controls rather than one guided dictation lifecycle."
        - "Keyboard Start is terse and can read like keyboard-local recording even though recording must happen in the containing app."
        - "The app has enough status data to drive a product flow, but it is not yet surfaced as one clear next action."
        - "Audio route can produce weak transcripts; proof must continue rejecting stale/unrelated output."
      recommended_first_slice:
        objective: "Add a guided dictation control surface in the containing app and clarify the keyboard primary action/status without changing the proven mailbox/shared-state architecture."
        allowed_files:
          - "FoiliOS/FoilIOSApp/ContentView.swift"
          - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
          - "FoiliOS/project.yml"
          - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
          - "docs/goals/ios-ux-v0.2/**"
        verify:
          - "XcodeGen regenerate if project.yml changes."
          - "XcodeBuildMCP or xcodebuild simulator build succeeds."
          - "Physical-device/devicectl smoke confirms bundle version and app launch if installed."
          - "Keyboard insertion path remains proven in Notes or is narrowly blocked with evidence."
          - "GoalBuddy state checker, git diff --check, targeted secret scan."
        stop_if:
          - "Need to redesign shared storage or transcription provider behavior."
          - "Need files outside allowed_files."
          - "Physical-device smoke cannot be run and no simulator/build proof exists."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the first safe UX v0.2 Worker package from T001 evidence."
    inputs:
      - "T001 receipt."
      - "Goal oracle."
    constraints:
      - "Read-only."
      - "Reject broad redesign or landing-page work."
      - "Prefer a vertical slice that improves a real tester workflow and can be physically smoked."
    expected_output:
      - "decision"
      - "Worker objective"
      - "allowed_files"
      - "verify commands"
      - "stop_if"
    receipt:
      result: done
      task_id: T002
      decision: "Proceed with the recommended guided dictation control surface slice."
      rationale:
        - "It improves the real tester workflow while preserving the physical-device-proven architecture."
        - "It is bounded to one SwiftUI view, one keyboard controller, build metadata, and board proof."
        - "It creates a directly smokeable v0.2 artifact: app launch, guided state, keyboard handoff wording, and insert latest still working."
      worker_objective: "Implement v0.2 guided dictation UX: a single lifecycle-focused app control surface plus clearer keyboard Start/Insert/Clear wording and accessibility identifiers."
      allowed_files:
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
        - "FoiliOS/project.yml"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "docs/goals/ios-ux-v0.2/**"
      verify:
        - "cd FoiliOS && xcodegen generate --spec project.yml"
        - "Build FoilIOS for iOS simulator with XcodeBuildMCP or xcodebuild."
        - "If build metadata is bumped, inspect project.yml/project.pbxproj for new build number."
        - "Run physical-device app/keyboard smoke when possible; otherwise record exact blocker."
        - "GoalBuddy state checker passes."
        - "git diff --check passes."
        - "Targeted secret scan finds no private material."
      stop_if:
        - "Implementation requires changing storage/provider semantics."
        - "Keyboard behavior regresses insertion/reset path."
        - "Signing or device install requires user-only action."

