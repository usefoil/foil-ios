        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "docs/goals/ios-testflight-build3-forward-proof/goal.md"
        - "docs/goals/ios-testflight-build3-forward-proof/state.yaml"
        - "docs/goals/ios-testflight-build3-forward-proof/notes/visual/build3-notes-insert-reset.png"
      pull_request:
        number: 240
        url: "https://github.com/mean-weasel/foil/pull/240"
        base: "codex/ios-keyboard-prototype"
        head: "codex/ios-testflight-build3-forward-proof"
      commands:
        - cmd: "node .../check-goal-state.mjs docs/goals/ios-testflight-build3-forward-proof/state.yaml"
          status: pass
        - cmd: "git diff --check -- FoiliOS docs/goals/ios-testflight-build3-forward-proof"
          status: pass
        - cmd: "rg targeted secret scan over FoiliOS and docs/goals/ios-testflight-build3-forward-proof"
          status: pass
        - cmd: "git commit -m 'Prove iOS TestFlight build 3 update'"
          status: pass
        - cmd: "git push -u origin codex/ios-testflight-build3-forward-proof"
          status: pass
        - cmd: "gh pr create --base codex/ios-keyboard-prototype --head codex/ios-testflight-build3-forward-proof"
          status: pass

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the build-3 forward TestFlight proof tranche is complete."
    inputs:
      - "All task receipts."
      - "Current git status and PR state."
      - "Device/TestFlight/live smoke evidence."
    constraints:
      - "Do not mark complete if the phone still reports build 2."
      - "Name the strongest realistic remaining failure mode."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "missing evidence"
      - "next task if not complete"
    receipt:
      result: done
      task_id: T999
      decision: complete
      full_outcome_complete: true
      summary: "The build-3 forward TestFlight proof tranche is complete. Build 3 was produced from project.yml, uploaded and attached to internal TestFlight, presented as the normal Update path over build 2, installed on iPhone-preview, and passed the short live mailbox/audio/keyboard insertion smoke."
      strongest_realistic_failure_mode:
        claim: "The smoke could have accidentally run against build 2 or a Debug install rather than the forward TestFlight build 3."
        evidence_that_rules_it_out:
          - "T001 changed project.yml and generated Xcode build settings to CURRENT_PROJECT_VERSION 3, then IPA metadata showed app and keyboard build 3."
          - "T001 uploaded build 3 and App Store Connect beta state reported IN_BETA_TESTING after explicit export-compliance patch and group attachment."
          - "T002 TestFlight UI showed build 3 as Update and Previous Builds as 0.1.0 (2), then devicectl polls changed from bundle version 2 to bundle version 3 and remained there."
          - "T003 launched com.neonwatty.FoilIOS after the build-3 install and rechecked devicectl metadata as bundle version 3 before the live smoke."
      additional_failure_modes:
        - claim: "Audio proof could be invalid because the Mac routed speech to AirPods instead of speakers."
          evidence_that_rules_it_out:
            - "T003 detected output/system were AirPods, disconnected them, switched output/system to MacBook Pro Speakers, and only then recorded."
        - claim: "The transcript could exist in shared state but fail to insert through Foil Keyboard."
          evidence_that_rules_it_out:
            - "T003 observed Foil Keyboard Transcript Ready with enabled Insert latest, tapped it, saw the Notes TextView contain the build-3 transcript, and copied an idle/Ready App Group snapshot after reset."
      residual_risk:
        - "Automatic Updates remained off from the prior older-build install. A follow-up should decide whether to re-enable it manually or prove the next build updates while it is off."
        - "This proves Notes insertion only; broader target-app matrix remains a separate set of smokes."
