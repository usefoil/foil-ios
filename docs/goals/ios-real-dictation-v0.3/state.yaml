      - "Provider behavior changes beyond injection/testability."
    receipt:
      result: done
      task_id: T003
      summary: "Added a FoilIOSTests target and refactored FoilTranscriptionClient behind an injectable upload transport while preserving the production URLSession.shared behavior."
      changed_files:
        - "FoiliOS/FoilIOSApp/FoilTranscriptionClient.swift"
        - "FoiliOS/FoilIOSTests/FoilTranscriptionClientTests.swift"
        - "FoiliOS/project.yml"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "docs/goals/ios-real-dictation-v0.3/state.yaml"
      red:
        - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOSTests -destination 'platform=iOS Simulator,name=iPhone 17' initially failed because the new test expected missing FoilTranscriptionUploading."
      implementation:
        - "Added FoilTranscriptionUploading protocol and URLSession conformance."
        - "Added FoilTranscriptionClient initializer with injectable transport and boundaryProvider defaults."
        - "Kept endpoint https://api.groq.com/openai/v1/audio/transcriptions and model whisper-large-v3-turbo unchanged."
        - "Made TranscriptionError Equatable for precise tests."
        - "Added FoilIOSTests with test host/module settings so app internals can be tested without changing display name or bundle id."
      evidence:
        - "Focused tests passed: xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOSTests -destination 'platform=iOS Simulator,name=iPhone 17' executed 2 tests with 0 failures."
        - "Simulator app build passed: xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17'."
      commands:
        - cmd: "cd FoiliOS && xcodegen generate --spec project.yml"
          status: pass
        - cmd: "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOSTests -destination 'platform=iOS Simulator,name=iPhone 17'"
          status: pass
        - cmd: "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=iPhone 17'"
          status: pass
      strongest_failure_modes:
        - "Malformed multipart upload would pass build but fail live Groq: ruled down by testTranscribeUploadsMultipartAudioToGroqAndTrimsResponse asserting endpoint, method, Authorization, Content-Type boundary, model part, file part, audio bytes, terminator, and trimmed transcript."
        - "Provider error could leak response body/secrets: ruled down by testTranscribeThrowsHTTPStatusWithoutLeakingResponseBody asserting HTTP 401 error without body fragments."
        - "Adding the test target could break app/keyboard build: ruled down by FoilIOS simulator build success."

  - id: T004
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review T003 implementation and evidence; decide whether to proceed to physical device proof, request fixes, or narrow the goal."
    inputs:
      - "T003 receipt."
      - "git diff."
      - "test/build output."
    constraints:
      - "Read-only unless recording the board receipt."
      - "Do not accept simulator-only proof as final."
    expected_output:
      - "decision"
      - "remaining risks"
      - "next task activation"
    receipt:
      result: done
      task_id: T004
      decision: "Proceed to T005 physical iPhone proof before any broader implementation."
      rationale:
        - "T003 gives deterministic provider request proof, but the goal oracle is a real recorded phrase inserted through the keyboard."
        - "The containing app already exposes the real flow, so another code slice would be speculative until live device proof identifies an actual gap."
        - "The fake transcript path remains intact and can be used as fallback/control evidence, but it cannot complete v0.3."
      remaining_risks:
        - "Physical device may not have microphone permission or a configured Groq key."
        - "Mac speaker audio may not be captured clearly enough by the phone microphone."
        - "WDA/CoreDevice tunnel may need the same recovery used in v0.2."
        - "Keyboard insertion can work while App Group canonical state remains stale unless copied back and inspected."
