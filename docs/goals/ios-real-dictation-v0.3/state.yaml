# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS Real Dictation v0.3"
  slug: "ios-real-dictation-v0.3"
  kind: existing_plan
  tranche: "Implement and prove the first real iPhone dictation loop over the v0.2 keyboard shell."
  status: done
  oracle:
    signal: "A known spoken phrase records in the containing app, transcribes through Groq, becomes Insert latest in Foil Keyboard, inserts into Notes on physical iPhone, and clears from App Group state."
    cadence: "after Scout/Judge/Worker packages"
    final_proof: "Focused tests, simulator build/UI proof, physical-device insertion proof, App Group reset inspection, and final audit."
  intake:
    original_request: "Do the next iOS build step: real dictation instead of fake transcript."
    interpreted_outcome: "Implement the v0.3 record/transcribe/insert loop for Foil iOS."
    input_shape: existing_plan
    audience: "Foil owner/developer and early iPhone TestFlight testers"
    authority: approved
    proof_type: demo
    completion_proof: "A real spoken phrase is recorded, transcribed, inserted from the keyboard, and cleared on the physical iPhone."
    likely_misfire: "Building UI or network plumbing that appears ready but only proves fake transcript insertion or untested provider code."
    blind_spots_considered:
      - "Keyboard extensions cannot record directly; recording must remain in the containing app."
      - "Provider calls may fail because of key, network, audio format, or privacy/logging mistakes."
      - "Physical keyboard insertion can pass while App Group transcript state remains stale."
      - "Simulator proof is weaker than device proof for microphone, keyboard, and App Group behavior."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: queued
    url: "http://goalbuddy.localhost:41737/ios-real-dictation-v0-3/"
    command: "npx goalbuddy board docs/goals/ios-real-dictation-v0.3"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current iOS recording, transcription, credential, App Group, keyboard, and test surfaces; identify the smallest safe v0.3 real-dictation Worker slice."
    inputs:
      - "FoiliOS/FoilIOSApp"
      - "FoiliOS/FoilKeyboard"
      - "FoiliOS/Shared"
      - "FoiliOS/project.yml"
      - "docs/goals/ios-ux-v0.2/state.yaml"
      - "docs/acceptance-evidence.md"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Do not print secrets, raw private transcripts, JWTs, or private accessibility trees."
    expected_output:
      - "Current architecture map."
      - "Existing fake/real provider gaps."
      - "Recommended first bounded Worker slice with allowed_files, tests, verify, and stop_if."
    receipt:
      result: done
      task_id: T001
      summary: "Mapped the current iOS real-dictation surfaces. The app already has a nominal real path: AudioCaptureController records m4a, TranscriptionController calls FoilTranscriptionClient, the client posts multipart audio to Groq, and FoilKeyboardBridge completes a transcript for keyboard insertion. The gap is proof and testability, not missing architecture."
      evidence:
        - "Read FoiliOS/FoilIOSApp/AudioCaptureController.swift."
        - "Read FoiliOS/FoilIOSApp/FoilTranscriptionClient.swift."
        - "Read FoiliOS/FoilIOSApp/TranscriptionController.swift."
        - "Read FoiliOS/FoilIOSApp/ContentView.swift."
        - "Read FoiliOS/FoilKeyboard/KeyboardViewController.swift."
        - "Read FoiliOS/Shared/FoilKeyboardBridge.swift."
        - "Read FoiliOS/project.yml and confirmed no existing iOS unit-test target."
      current_architecture:
        recording:
          - "AudioCaptureController requests microphone permission, starts AVAudioRecorder with AAC m4a, marks App Group state listening, and saves the recording URL."
          - "stopRecording saves phase processing with message Recording saved. Tap Transcribe in Foil."
        transcription:
          - "TranscriptionController loads Groq key from environment, keychain, or DEBUG UserDefaults; it marks processing, calls FoilTranscriptionClient, completes non-empty transcript, and fails empty/error cases."
          - "FoilTranscriptionClient posts multipart/form-data to https://api.groq.com/openai/v1/audio/transcriptions with model whisper-large-v3-turbo."
        keyboard:
          - "KeyboardViewController reads shared snapshot, enables Insert latest for complete transcript, inserts text via textDocumentProxy, then resets bridge state."
        fixtures:
          - "Fake transcript URL/diagnostic path remains available through bridge.completeFakeTranscript and foilios://complete."
      gaps:
        - "No FoilIOS unit-test target exists, so provider/client regressions are only caught by build or live manual proof."
        - "FoilTranscriptionClient is pinned to URLSession.shared and has private multipart construction, making deterministic provider tests impossible without a small seam."
        - "The real path has not yet been disproven on simulator/device in this board; v0.2 proof only covered fake transcript insertion."
      recommended_first_slice:
        objective: "Add FoilIOSTests and a small injectable transport seam for FoilTranscriptionClient, then prove multipart request construction, success trimming, HTTP error handling, and no accidental secret/body leakage in errors."
        allowed_files:
          - "FoiliOS/FoilIOSApp/FoilTranscriptionClient.swift"
          - "FoiliOS/project.yml"
          - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
          - "FoiliOS/FoilIOSTests/**"
          - "docs/goals/ios-real-dictation-v0.3/**"
        failing_tests:
          - "FoilTranscriptionClientTests.testTranscribeUploadsMultipartAudioToGroqAndTrimsResponse"
          - "FoilTranscriptionClientTests.testTranscribeThrowsHTTPStatusWithoutLeakingResponseBody"
        verify:
          - "cd FoiliOS && xcodegen generate --spec project.yml"
          - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOSTests -destination 'platform=iOS Simulator,name=<available iPhone>'"
          - "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=<available iPhone>'"
          - "GoalBuddy state checker, git diff --check, targeted secret scan."
        stop_if:
          - "Adding the test target requires signing/provisioning changes outside project.yml."
          - "The transport seam changes production request semantics beyond testability."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the first safe v0.3 Worker package from T001 evidence and the goal oracle."
    inputs:
      - "T001 receipt."
      - "Goal oracle."
    constraints:
      - "Read-only."
      - "Prefer a vertical slice that can be proven without committing secrets."
      - "Reject work that only improves fake-transcript UI."
    expected_output:
      - "decision"
      - "Worker objective"
      - "allowed_files"
      - "failing tests to write first"
      - "verify commands"
      - "stop_if"
    receipt:
      result: done
      task_id: T002
      decision: "Proceed with the Scout-recommended testability slice before physical proof."
      rationale:
        - "The runtime real-dictation path already exists, so broad implementation would risk churn without improving proof."
        - "A deterministic provider seam is the smallest reversible change that lets us disprove malformed upload, untrimmed transcript, and unsafe error-body leakage before live Groq/device testing."
        - "Keeping fake transcript fixtures intact preserves the v0.2 insertion proof path."
      worker_objective: "Add a FoilIOSTests target and refactor FoilTranscriptionClient to support injected upload transport while preserving production URLSession behavior."
      allowed_files:
        - "FoiliOS/FoilIOSApp/FoilTranscriptionClient.swift"
        - "FoiliOS/project.yml"
        - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
        - "FoiliOS/FoilIOSTests/**"
        - "docs/goals/ios-real-dictation-v0.3/**"
      failing_tests:
        - "FoilTranscriptionClientTests.testTranscribeUploadsMultipartAudioToGroqAndTrimsResponse"
        - "FoilTranscriptionClientTests.testTranscribeThrowsHTTPStatusWithoutLeakingResponseBody"
      verify:
        - "cd FoiliOS && xcodegen generate --spec project.yml"
        - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOSTests -destination 'platform=iOS Simulator,name=<available iPhone>'"
        - "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=<available iPhone>'"
        - "GoalBuddy state checker passes."
        - "git diff --check passes."
        - "Targeted secret scan finds no private material."
      stop_if:
        - "Project generation removes required signing/app-extension settings."
        - "Provider behavior changes beyond injection/testability."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Implement the chosen first real-dictation vertical slice after writing failing tests."
    allowed_files:
      - "FoiliOS/FoilIOSApp/FoilTranscriptionClient.swift"
      - "FoiliOS/project.yml"
      - "FoiliOS/FoilIOS.xcodeproj/project.pbxproj"
      - "FoiliOS/FoilIOSTests/**"
      - "docs/goals/ios-real-dictation-v0.3/**"
    verify:
      - "cd FoiliOS && xcodegen generate --spec project.yml"
      - "xcodebuild test -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOSTests -destination 'platform=iOS Simulator,name=<available iPhone>'"
      - "xcodebuild build -project FoiliOS/FoilIOS.xcodeproj -scheme FoilIOS -destination 'platform=iOS Simulator,name=<available iPhone>'"
      - "GoalBuddy state checker passes."
      - "git diff --check passes."
      - "Targeted secret scan finds no private material."
    stop_if:
