    reasoning_hint: medium
    objective: "Map the repo, Xcode/project shape, available iOS tooling, preview-iPhone availability, API-key environment, and prior issue evidence before implementation."
    inputs:
      - "README.md"
      - "Foil.xcodeproj or discovered Xcode/SwiftPM project files"
      - "docs/acceptance-evidence.md"
      - "GitHub issue #216"
      - "User-provided Whisperflow iOS keyboard screen recording, filename omitted in the split repo."
      - "Local environment variables and shell config names only; never print secret values."
      - "xcrun simctl and xcodebuild discovery output"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not print or persist API key values."
      - "Preserve unrelated worktree changes."
    expected_output:
      - "Repo and iOS target strategy."
      - "Simulator availability and candidate device."
      - "Preview-iPhone availability or blocker."
      - "Secret-safe API key discovery result."
      - "Risk-ranked implementation phases."
      - "Candidate PR plan targeting codex/ios-keyboard-prototype."
