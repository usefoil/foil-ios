version: 2

goal:
  title: "Foil iOS Hard Hygiene Gates"
  slug: "foil-ios-hard-hygiene-gates"
  kind: existing_plan
  tranche: "Shrink temporary max-lines allowlist, preserve honest hosted CI, and promote hard hygiene gates only after evidence supports them."
  status: active
  oracle:
    signal: "`scripts/source-line-ratchet.py` reports no allowlist baselines and no violations; required GitHub CI passes `Hosted simulator sanity` and `Repo hygiene ratchet` on main; physical-device proof remains receipt-based and separate."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final audit receipt maps file splits, verification commands, CI status, and privacy/physical-boundary checks to full_outcome_complete: true."
  intake:
    original_request: "Create and drive the next GoalBuddy board for Foil iOS hard hygiene gates."
    interpreted_outcome: "Foil iOS enforces a hard max-lines-per-file gate without temporary oversized allowlist entries, with any extra Swift hygiene gates evaluated carefully before becoming required."
    input_shape: existing_plan
    audience: "Foil iOS maintainers and merge-queue contributors"
    authority: approved
    proof_type: test
    completion_proof: "Required CI proves the hard max-lines rule and simulator sanity checks on main; final receipt proves no hosted physical-device overclaim."
    likely_misfire: "Adding process, docs, or noisy lint gates while leaving the oversized allowlist in place, or requiring Periphery/SwiftLint before false positives are understood."
    blind_spots_considered:
      - "SwiftUI and presenter file splits can preserve compilation while subtly changing behavior."
      - "Large tests may need fixture/helper extraction without weakening coverage."
      - "The physical harness contains privacy-sensitive receipt logic and must not upload private artifacts."
      - "Periphery can false-positive on SwiftUI, tests, extension entry points, and XcodeGen-generated projects."
      - "Merge-queue runtime should stay acceptable after adding checks."
    existing_plan_facts:
      - "PR #60 merged `iOS Simulator Sanity (non-physical)` through the merge queue."
      - "The active `main-protection` ruleset requires `Hosted simulator sanity` and `Repo hygiene ratchet`."
      - "Board 1 introduced `scripts/source-line-ratchet.py` with MAX_LINES=500."
      - "Temporary oversized baselines are `ContentView.swift`: 967, `FoilDictationLoopPresentationTests.swift`: 928, `FoilDictationLoopPresenter.swift`: 830, and `scripts/ios-physical-harness.py`: 699."
      - "The intended end state is a hard max-lines-per-file rule, not a permanent allowlist."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  exact_human_approval_can_terminal_wait: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/foil-ios-hard-hygiene-gates/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal /Users/neonwatty/Desktop/Foil Project/foil-ios/docs/goals/foil-ios-hard-hygiene-gates"

active_task: T009

