      - "docs/acceptance-evidence.md"
      - "AGENTS.md"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer concrete file-path and symbol evidence over generic refactor advice."
      - "Call out privacy-sensitive physical-harness code separately."
    expected_output:
      - "Current line counts and allowlist baselines."
      - "Responsibility map for each oversized file."
      - "Recommended extraction boundaries and risk notes."
      - "Verification commands for each proposed Worker package."
      - "Any blockers or files that should not be split yet."
