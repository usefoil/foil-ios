# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS v0.7 GoalBuddy Conveyor"
  slug: "ios-v0.7-conveyor"
  kind: existing_plan
  tranche: "Coordinate the next several iOS GoalBuddy boards through physical proof, useful dictation, insertion coverage, and TestFlight feedback readiness."
  status: done
  oracle:
    signal: "Each child board either lands a verified PR into codex/ios-keyboard-prototype or records an exact blocker with the next safe task queued."
    cadence: "after each child-board closeout"
    final_proof: "Child board receipts, PR/merge links, simulator/device evidence, secret scans, and final conveyor audit."
  intake:
    original_request: "Plan out the next several goalbuddy prep boards and manage yourself through them."
    interpreted_outcome: "Create a sequenced iOS v0.7 GoalBuddy conveyor and start executing it."
    input_shape: existing_plan
    audience: "Foil owner/developer and early TestFlight testers"
    authority: approved
    proof_type: demo
    completion_proof: "The v0.7 conveyor boards are created, registered, and progressed in order with receipts."
    likely_misfire: "Creating a stack of nice-looking plans without actually advancing the iPhone proof loop."
    blind_spots_considered:
      - "Build 7 is TestFlight-ready but not physically installed/proven on iPhone-preview."
      - "WDA recently failed with Timed out while enabling automation mode."
      - "Earlier real audio proof showed provider plumbing but produced punctuation-only text."
      - "Only a limited insertion matrix is proven; secure fields and safe Messages coverage need care."
      - "Board sprawl can hide the actual next task unless one conductor owns sequencing."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-7-conveyor/"
    command: "npx goalbuddy board docs/goals/ios-v0.7-conveyor"

active_task: null

tasks:
  - id: T001
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Create and register the child boards for physical build-7 smoke, useful dictation quality, target-app insertion matrix, and TestFlight feedback readiness."
    inputs:
      - "docs/goals/ios-ux-v0.6-product-loop/state.yaml"
      - "docs/goals/ios-preview-device-smoke/state.yaml"
      - "docs/ios-physical-automation-runbook.md"
    constraints:
      - "Do not edit product code in this task."
      - "Use exact blockers and proof surfaces from existing receipts."
      - "Register each board with the local GoalBuddy board hub."
    expected_output:
      - "Four child board goal/state files."
      - "Clickable local board URLs."
      - "Next active board selected."
    receipt:
      result: done
      task_id: T001
      summary: "Created and registered the iOS v0.7 conveyor plus four child boards, sequenced around the known proof gaps: build 7 physical smoke, useful dictation quality, target-app insertion matrix, and TestFlight feedback readiness."
      boards:
        - slug: "ios-build7-physical-smoke"
          url: "http://goalbuddy.localhost:41737/ios-build7-physical-smoke/"
          role: "first active execution board; prove or block build 7 on iPhone-preview."
        - slug: "ios-useful-dictation-quality-proof"
          url: "http://goalbuddy.localhost:41737/ios-useful-dictation-quality-proof/"
          role: "second execution board; prove known-phrase useful dictation and weak-output recovery."
        - slug: "ios-target-app-insertion-matrix-v0.7"
          url: "http://goalbuddy.localhost:41737/ios-target-app-insertion-matrix-v0-7/"
          role: "third execution board; expand sanitized target-app insertion coverage."
        - slug: "ios-testflight-feedback-readiness-v0.7"
          url: "http://goalbuddy.localhost:41737/ios-testflight-feedback-readiness-v0-7/"
          role: "fourth execution board; prepare truthful tester handoff/build decision."
      validation:
        - "ruby YAML load succeeded for all five new state.yaml files."
        - "npx goalbuddy board registered all five boards with the local hub."
      next_active_board: "docs/goals/ios-build7-physical-smoke/goal.md"

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run docs/goals/ios-build7-physical-smoke first and record whether build 7 can be installed/proven physically."
    inputs:
      - "docs/goals/ios-build7-physical-smoke/goal.md"
    constraints:
      - "Do not skip exact WDA blocker evidence."
      - "Do not claim physical proof without an installed build-7 app or equivalent TestFlight/device proof."
    expected_output:
      - "Merged PR or blocker receipt from the physical smoke board."
    receipt:
      result: done_with_delegation
      task_id: T002
      summary: "Ran the build-7 physical-smoke child board. It cleared the WDA/install/app-proof blocker: iPhone-preview now has Foil iOS 0.1.0 build 7 installed; WDA is reachable; physical app UI shows the v0.6 Record in Foil loop; App Group snapshot is idle/no transcript. Live keyboard insertion is delegated to the target-app matrix board."
      child_board: "docs/goals/ios-build7-physical-smoke/goal.md"
      evidence:
        - "WDA status ready true at http://192.168.1.40:8100/status."
        - "devicectl installed apps shows Foil iOS 0.1.0 bundle version 7."
        - "WDA source found Record in Foil, primary-record-dictation-button, and the Return to your keyboard detail."
        - "App Group snapshot sanitized state: phase idle, message Ready, hasTranscript false."
      residual_risk:
        - "Keyboard insertion remains queued in docs/goals/ios-target-app-insertion-matrix-v0.7."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run docs/goals/ios-useful-dictation-quality-proof after physical automation is available or a blocker is recorded."
    inputs:
      - "docs/goals/ios-useful-dictation-quality-proof/goal.md"
    constraints:
      - "Do not treat punctuation-only transcripts as useful dictation."
      - "Do not commit transcript content from private contexts."
    expected_output:
      - "Useful dictation proof PR/receipt or exact blocker."
    receipt:
      result: done
      task_id: T003
      summary: "Ran the useful-dictation child board. Build 7 physically recorded a sterile phrase via iPhone-preview microphone, Groq returned useful text, and the App Group snapshot is complete with a transcript containing violet, cactus, and number one."
      child_board: "docs/goals/ios-useful-dictation-quality-proof/goal.md"
      evidence:
        - "Physical WDA flow: Record in Foil -> macOS say played known phrase -> Finish recording -> Transcribe."
        - "WDA source found Ready for keyboard, Insert latest, Groq transcript ready, and Transcription complete."
        - "App Group snapshot transcript metadata: length 51, body redacted; normalized markers contained violet, cactus, and number one."
      residual_risk:
        - "No target-app insertion claim yet; transcript remains staged for docs/goals/ios-target-app-insertion-matrix-v0.7."

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Run docs/goals/ios-target-app-insertion-matrix-v0.7 for sanitized cross-app insertion coverage."
    inputs:
      - "docs/goals/ios-target-app-insertion-matrix-v0.7/goal.md"
    constraints:
      - "Messages only with a safe self/test thread."
      - "Secure fields must prove custom keyboard absence or no insertion."
    expected_output:
      - "Matrix receipt with sanitized physical evidence."
    receipt:
      result: done_partial_with_blocker
      task_id: T004
      summary: "Closed the v0.7 target-app insertion matrix child board with an honest partial result. Fresh v0.7 evidence proves sterile Safari/local fixture insertion and secure-field expected rejection. Messages is exactly blocked because no safe self/test thread exists. Notes/Reminders retain prior physical proof from earlier boards but were not rerun in v0.7."
      child_board: "docs/goals/ios-target-app-insertion-matrix-v0.7/goal.md"
      pr: "https://github.com/mean-weasel/foil/pull/251"
      evidence:
        - "T002 Safari/local fixture receipt: Foil Keyboard insert button appeared, Insert latest mutated the sterile field, and App Group reset to idle/no transcript."
        - "T003 secure-field receipt: native secure keyboard appeared, no Foil Keyboard insert control existed, and the staged transcript remained pending."
        - "T004 Messages receipt: no safe self/test thread exists; Messages was not launched or inspected."
        - "T999 audit note: docs/goals/ios-target-app-insertion-matrix-v0.7/notes/T999-matrix-audit.md."
      residual_risk:
        - "Do not claim Messages support until a sterile thread is created and approved."
        - "Do not claim fresh v0.7 Notes/Reminders reruns; cite prior physical matrix proof only."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Run docs/goals/ios-testflight-feedback-readiness-v0.7 to prepare the next external-tester loop."
    inputs:
      - "docs/goals/ios-testflight-feedback-readiness-v0.7/goal.md"
    constraints:
      - "Do not ship another TestFlight build unless release notes, proof, and blocker status are truthful."
    expected_output:
      - "Release/feedback readiness receipt and PR."
    receipt:
      result: done
      task_id: T005
      summary: "Ran the TestFlight feedback readiness child board. Build 7 is valid in App Store Connect, attached to Foil Internal Testers, and the tester handoff now states exactly what is proven, what is clunky, how to recover, and what privacy-safe feedback to send."
      child_board: "docs/goals/ios-testflight-feedback-readiness-v0.7/goal.md"
      artifact: "docs/ios-testflight-feedback-v0.7.md"
      evidence:
        - "ASC build list: builds 1-7 valid, not expired, export compliance false."
        - "Foil Internal Testers build relationship includes build 7."
        - "Foil Internal Testers has one tester in INSTALLED state."
        - "Handoff blocks Messages/arbitrary-app claims and secure-field support claims."
      pr: "https://github.com/mean-weasel/foil/pull/252"

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final conveyor audit against board sprawl, missing proof, unmerged PRs, and residual blockers."
    inputs:
      - "All child board receipts"
      - "git status"
      - "PR/merge links"
    constraints:
      - "Reject completion if any child board is active without a receipt."
      - "Reject completion if a physical proof claim is simulator-only."
    expected_output:
      - "Conveyor complete | blocked with exact next action."
    receipt:
      result: done
      task_id: T999
      summary: "Final v0.7 conveyor audit passed. Each child board now has receipt-backed proof or an exact blocker, and all PR-backed slices are merged or represented in this final feedback PR. The remaining blocker is intentional and privacy-based: Messages needs a sterile self/test thread before testing."
      child_boards:
        - board: "ios-build7-physical-smoke"
          result: "done"
          proof: "iPhone-preview reports Foil iOS 0.1.0 build 7 and app/WDA/App Group proof passed."
        - board: "ios-useful-dictation-quality-proof"
          result: "done"
          proof: "Known sterile phrase recorded/transcribed and made keyboard-ready."
        - board: "ios-target-app-insertion-matrix-v0.7"
          result: "partial_with_blocker"
          proof: "Safari fixture insertion and secure-field rejection freshly proven; Messages blocked without sterile thread."
        - board: "ios-testflight-feedback-readiness-v0.7"
          result: "done"
          proof: "Build 7 ASC/internal tester state collected and handoff artifact created."
      strongest_failure_mode:
        claim: "The conveyor could complete while hiding a queued child board or unmerged PR."
        ruled_out_by:
          - "All child board tasks are marked done with receipts."
          - "Parent conveyor has active_task null and T999 done."
          - "PR #251 is merged for the matrix closeout; PR #252 carries feedback readiness and conveyor audit."
      residual_blockers:
        - "Messages support remains unproven until a sterile self/test thread exists."
      next_safe_options:
        - "Create a Messages sterile-thread board."
        - "Start a polish board for keyboard refresh/full-access onboarding friction."
