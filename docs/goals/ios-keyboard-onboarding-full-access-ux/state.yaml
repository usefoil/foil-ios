# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Foil iOS Keyboard Onboarding And Full Access UX"
  slug: "ios-keyboard-onboarding-full-access-ux"
  kind: specific
  tranche: "Make the custom keyboard prototype understandable, configurable, recoverable, and proven with a real transcript loop on iPhone-preview."
  status: done
  oracle:
    signal: "Physical iPhone-preview walkthrough starts from unconfigured or unhealthy keyboard state, guides/blocks appropriately around Full Access, completes a real transcript insertion, and copied App Group state is idle/no transcript afterward."
    cadence: "after each Worker package and at final audit"
    final_proof: "Merged PR into codex/ios-keyboard-prototype plus receipts with WDA/source snippets, copied App Group state, sanitized screenshots, build/install commands, secret scan, issue/PR links, and final audit."
  intake:
    original_request: "Plan out the next iOS build slice around keyboard onboarding and Full Access UX."
    interpreted_outcome: "Prepare a GoalBuddy board for onboarding, health/recovery, and real-loop proof around the Foil iOS custom keyboard."
    input_shape: specific
    audience: "Foil owner/developer and future iPhone prototype testers"
    authority: approved
    proof_type: demo
    completion_proof: "The iOS prototype branch has a verified onboarding/recovery flow and physical real-transcription insertion proof."
    likely_misfire: "Screens explain setup but the app cannot detect or recover Full Access/stale state, or only seeded transcripts are proved."
    blind_spots_considered:
      - "Allow Full Access is mandatory for the current shared-state architecture."
      - "iOS Settings navigation may not be directly deep-linkable or automatable in a stable way."
      - "The keyboard extension can know hasFullAccess, but the containing app may need indirect health signals."
      - "Real transcription introduces microphone, network, API, timing, and privacy failure modes."
      - "Secure fields reject custom keyboards by platform design."
      - "Messages requires a safe operator-provided test thread."
      - "Diagnostics must not leak transcript text or API keys."
      - "Prototype debug UI should be intentionally kept, hidden, or removed."
    existing_plan_facts:
      - "Continue from codex/ios-keyboard-prototype."
      - "Prior PR #226 proved reset persistence and target matrix with Full Access enabled."
      - "Next product slice should make Full Access onboarding first-class."
      - "Use the preview iPhone when available and unlocked."
      - "Use the local Groq/Grok key only if live transcription is needed; do not print or commit it."
      - "Create PRs into codex/ios-keyboard-prototype, not main."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-keyboard-onboarding-full-access-ux/"
    command: "npx goalbuddy board docs/goals/ios-keyboard-onboarding-full-access-ux"

active_task: null

