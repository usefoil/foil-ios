version: 2
goal:
  title: "Foil iOS v0.51 Evidence Hygiene Audit"
  slug: "ios-v0.51-evidence-hygiene-audit"
  kind: audit
  tranche: "Privacy, credential, and claim hygiene before beta widening."
  status: active
  oracle:
    signal: "Tracked evidence is safe and claims match receipts."
    cadence: "after host-app, audio, feedback, and TestFlight evidence changes"
    final_proof: "Scan receipt plus strongest-failure-mode audit note."
  intake:
    completion_proof: "Merged PR or audit receipt with clean scans for private content, secrets, raw WDA source, stale build claims, and unsupported beta claims."
rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_completion_without_judge_or_pm_audit: true
agents:
  scout: installed
  worker: installed
  judge: installed
active_task: T001
tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: active
    objective: "Scan tracked docs/receipts/artifacts for private content and unsafe claims."
    acceptance_criteria:
      - "Receipt lists exact commands and any findings with owner/action."
  - id: T002
    type: worker
    assignee: Worker
    status: queued
    objective: "Fix safe docs/receipt hygiene issues discovered by the audit."
    acceptance_criteria:
      - "Only safe, non-destructive redactions or claim corrections are made."
  - id: T003
    type: judge
    assignee: Judge
    status: queued
    objective: "Re-run hygiene scan and issue pass/block decision."
    acceptance_criteria:
      - "No tracked private content, secrets, raw WDA source, stale current build claim, or unsupported host-app claim remains."
