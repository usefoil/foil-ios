version: 2
goal:
  title: "Foil iOS v0.52 TestFlight Beta Launch Rehearsal"
  slug: "ios-v0.52-testflight-beta-launch-rehearsal"
  kind: specific
  tranche: "Closed-beta candidate TestFlight release proof."
  status: blocked
  oracle:
    signal: "Candidate build is available, installed, and minimally smoked or exactly blocked."
    cadence: "before upload, after upload, after install, after smoke"
    final_proof: "Sanitized App Store Connect/TestFlight/CoreDevice/WDA receipts plus scoped release notes."
  intake:
    completion_proof: "Merged PR with sanitized upload, TestFlight availability, preview-iPhone install/update, post-update smoke, and scoped release-note receipts, or exact Apple-state blocker."
rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_completion_without_judge_or_pm_audit: true
agents:
  scout: installed
  worker: installed
  judge: installed
active_task: null
tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: "Preflight signing, build metadata, release notes, and TestFlight state."
    acceptance_criteria:
      - "Receipt proves upload is safe to attempt or names exact Apple/signing blocker."
    receipt:
      result: done
      summary: "Local build/signing tooling is present and build 13 prep is safe, but App Store Connect validation/upload requires API key/issuer or Apple ID app-password/provider inputs not safely discoverable from repo/env."
      evidence:
        - "docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/notes/T001-preflight-receipt.md"
  - id: T002
    type: worker
    assignee: Worker
    status: blocked
    objective: "Archive/upload candidate build and attach internal beta state."
    acceptance_criteria:
      - "Upload, processing, export compliance, and internal group state are verified or exactly blocked."
    receipt:
      result: archive_export_done_upload_blocked
      summary: "Build 0.1.0 (13) archives/exports locally with app and keyboard metadata verified, but upload is blocked on App Store Connect authentication command inputs."
      evidence:
        - "docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/notes/T002-candidate-build-receipt.md"
      next_owner: "operator"
      next_action: "Provide App Store Connect API key ID plus issuer ID, or Apple ID app-password/provider details, through a safe channel."
  - id: T003
    type: worker
    assignee: Worker
    status: blocked
    objective: "Install/update candidate build and run minimal physical smoke."
    acceptance_criteria:
      - "Preview iPhone runs candidate build and proves onboarding plus one safe insertion path."
    receipt:
      result: blocked
      summary: "Build 13 is not uploaded to TestFlight and physical WDA preflight is not healthy, so install/update and post-update smoke were not attempted."
      evidence:
        - "docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/notes/T003-install-smoke-blocker.md"
      next_owner: "operator"
      next_action: "After upload succeeds, make preview iPhone available/unlocked and restore WDA for minimal post-update smoke."
  - id: T004
    type: judge
    assignee: Judge
    status: done
    objective: "Verify release proof and scoped claims."
    acceptance_criteria:
      - "Release notes and docs claim only the behaviors proven by the candidate build."
    receipt:
      result: done
      decision: blocked_before_upload
      summary: "Final audit limits the claim to local build-13 archive/export readiness and explicitly rejects uploaded/available/installed/smoked claims."
      evidence:
        - "docs/goals/ios-v0.52-testflight-beta-launch-rehearsal/notes/T004-final-audit.md"
