# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS Build 7 Physical Smoke"
  slug: "ios-build7-physical-smoke"
  kind: recovery
  tranche: "Restore physical automation and prove build 7 on iPhone-preview."
  status: done
  oracle:
    signal: "iPhone-preview reports/launches Foil iOS build 7 and sterile WDA/App Group evidence proves the app-keyboard loop, or the blocker is exact and reproducible."
    cadence: "after WDA readiness, after install, and at final audit"
    final_proof: "Device readiness, WDA status, install/update evidence, sanitized app/keyboard proof, App Group state, cleanup, secret scan, and PR/issue receipt."
  intake:
    original_request: "Next iOS boards; manage yourself through them."
    interpreted_outcome: "First unblock the physical proof gap left by v0.6 build 7."
    input_shape: recovery
    audience: "Foil owner/developer and early TestFlight testers"
    authority: approved
    proof_type: demo
    completion_proof: "Build 7 is installed/proven on iPhone-preview or WDA/TestFlight/device state is exactly blocked."
    likely_misfire: "Treating App Store Connect readiness or simulator proof as physical iPhone proof."
    blind_spots_considered:
      - "The latest receipt says iPhone-preview still showed build 6."
      - "Two WDA launches timed out while enabling automation mode."
      - "Manual TestFlight install may succeed even if WDA remains unavailable."
      - "Physical screenshots can expose private content if the target is not sterile."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-build7-physical-smoke/"
    command: "npx goalbuddy board docs/goals/ios-build7-physical-smoke"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Map current physical-device, TestFlight, WDA, tunnel, and installed Foil build state before attempting changes."
    inputs:
      - "docs/ios-physical-automation-runbook.md"
      - "docs/goals/ios-ux-v0.6-product-loop/state.yaml"
      - "Connected iPhone-preview"
    constraints:
      - "Read-only except safe status probes."
      - "Do not print private phone content."
      - "Do not start WDA until the current process/status baseline is recorded."
    expected_output:
      - "Device connected/locked state."
      - "Installed Foil build/version."
      - "WDA/tunnel/process status."
      - "Whether TestFlight build 7 appears installed or requires manual update."
      - "Exact next Worker path."
    receipt:
      result: done
      task_id: T001
      summary: "Baseline physical state matches the v0.6 blocker: iPhone-preview is available/unlocked, WDA is not running/reachable, and installed Foil iOS is still 0.1.0 build 6. TestFlight was not visible in the installed-app listing. iPhone-prod was not used as a fallback because its app-info probe timed out."
      device:
        name: "iPhone-preview"
        core_device_id: "5320F5AD-2A71-50AC-94FE-207B544B6247"
        hardware_udid_for_wda: "00008030-001A0C980A33C02E"
        devicectl_state: "available (paired)"
        lock_state:
          passcodeRequired: false
          unlockedSinceBoot: true
      installed_app_state:
        foil:
          bundle_id: "com.neonwatty.FoilIOS"
          version: "0.1.0"
          bundle_version: "6"
        testflight_visible_in_filtered_app_listing: false
      wda_baseline:
        localhost_8100_status: "curl failed to connect"
        matching_processes: "none"
        project_exists: true
        iproxy_path: "/opt/homebrew/bin/iproxy"
      fallback_probe:
        device: "iPhone-prod"
        result: "not used; devicectl app-info probe timed out with CoreDevice connection invalidated / Network.NWError 60."
      commands:
        - cmd: "xcrun devicectl list devices"
          status: pass
        - cmd: "xcrun devicectl device info lockState --device 5320F5AD-2A71-50AC-94FE-207B544B6247"
          status: pass
        - cmd: "xcrun devicectl device info apps --device 5320F5AD-2A71-50AC-94FE-207B544B6247 | rg -i 'Foil|TestFlight|com.neonwatty.FoilIOS' -C 4"
          status: pass
        - cmd: "curl -sS --max-time 2 http://127.0.0.1:8100/status"
          status: blocked_not_running
        - cmd: "pgrep -af 'WebDriverAgent.xcodeproj.*WebDriverAgentRunner-nodebug|xcodebuild.*WebDriverAgent|iproxy.*8100|appium'"
          status: pass_no_matches
        - cmd: "ls -d /Users/neonwatty/.appium/node_modules/appium-xcuitest-driver/node_modules/appium-webdriveragent/WebDriverAgent.xcodeproj"
          status: pass
        - cmd: "command -v iproxy"
          status: pass
      next_worker: "T002 should attempt WDA recovery on iPhone-preview and either expose http://127.0.0.1:8100/status or record the exact automation-mode blocker plus cleanup."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Recover WDA or record the exact automation-mode blocker with cleanup and fallback instructions."
    inputs:
      - "T001 receipt"
      - "docs/ios-physical-automation-runbook.md"
    constraints:
      - "Start only the WDA process this task owns."
      - "Capture exact command, logs, endpoint response, and cleanup."
      - "Do not leave WDA/test servers running at handoff."
    expected_output:
      - "WDA reachable at localhost:8100 or exact blocker."
    receipt:
      result: done
      task_id: T002
      summary: "Recovered WDA on iPhone-preview. The same runbook command that previously timed out now built/signed/launched WebDriverAgentRunner, printed ServerURLHere for http://192.168.1.40:8100, and the /status endpoint reported ready=true."
      command: "xcodebuild -project /Users/neonwatty/.appium/node_modules/appium-xcuitest-driver/node_modules/appium-webdriveragent/WebDriverAgent.xcodeproj -scheme WebDriverAgentRunner-nodebug -destination 'id=00008030-001A0C980A33C02E' -configuration Debug DEVELOPMENT_TEAM=B3A6AN2HA4 CODE_SIGN_STYLE=Automatic PRODUCT_BUNDLE_IDENTIFIER=com.neonwatty.WebDriverAgentRunner -allowProvisioningUpdates test"
      owned_session:
        codex_session_id: 59193
        xcodebuild_pid: 51498
        status: "running for T003 physical UI proof"
      evidence:
        - "WDA xcodebuild output reached Testing started and printed ServerURLHere->http://192.168.1.40:8100<-ServerURLHere."
        - "curl -sS --max-time 5 http://192.168.1.40:8100/status returned state success, ready true, message WebDriverAgent is ready to accept commands."
        - "WDA status reported device iphone, iOS 26.4.2, sdkVersion 26.4."
      localhost_note: "127.0.0.1:8100 was not reachable before adding a forward; use device URL http://192.168.1.40:8100 for T003 unless a localhost tunnel is explicitly needed."
      cleanup_required_before_handoff: true

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Install/update build 7 on iPhone-preview, launch Foil, and prove the v0.6 product loop in sterile app/keyboard contexts."
    inputs:
      - "T001/T002 receipts"
      - "Build 7 TestFlight/App Store Connect evidence"
    constraints:
      - "If TestFlight manual install is required, record that as operator step and keep doing CLI-verifiable checks."
      - "Screenshots only from sterile app/Notes/local fixture contexts."
      - "No private transcript bodies."
    expected_output:
      - "Device build 7 proof."
      - "Sterile app and keyboard state proof."
      - "App Group snapshot proof after insert/reset."
    receipt:
      result: done_with_keyboard_matrix_delegated
      task_id: T003
      summary: "Built and installed Foil iOS 0.1.0 build 7 on iPhone-preview, launched it, proved the v0.6 product-loop app UI through WDA source and a sterile screenshot, and copied sanitized App Group snapshot state. Live custom-keyboard target-app insertion is intentionally delegated to the v0.7 insertion-matrix board."
      build:
        command: "xcodebuild -project FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' -derivedDataPath /tmp/foil-ios-build7-physical -allowProvisioningUpdates build"
        result: "BUILD SUCCEEDED"
        app_path: "/tmp/foil-ios-build7-physical/Build/Products/Debug-iphoneos/Foil iOS.app"
      metadata:
        app:
          bundle_id: "com.neonwatty.FoilIOS"
          version: "0.1.0"
          build: "7"
        keyboard:
          bundle_id: "com.neonwatty.FoilIOS.Keyboard"
          version: "0.1.0"
          build: "7"
          requests_open_access: true
      entitlements:
        app_group_app: "group.com.neonwatty.FoilIOS"
        app_group_keyboard: "group.com.neonwatty.FoilIOS"
      install:
        command: "xcrun devicectl device install app --device 5320F5AD-2A71-50AC-94FE-207B544B6247 '/tmp/foil-ios-build7-physical/Build/Products/Debug-iphoneos/Foil iOS.app'"
        result: "App installed: bundleID com.neonwatty.FoilIOS"
      installed_device_state:
        app: "Foil iOS"
        bundle_id: "com.neonwatty.FoilIOS"
        version: "0.1.0"
        bundle_version: "7"
      app_launch:
        command: "xcrun devicectl device process launch --device 5320F5AD-2A71-50AC-94FE-207B544B6247 com.neonwatty.FoilIOS"
        result: "Launched application with com.neonwatty.FoilIOS bundle identifier."
      wda_app_evidence:
        source_matches:
          - "Foil iOS"
          - "Record in Foil"
          - "Record here. Return to your keyboard when the transcript is ready."
          - "dictation-stage-detail"
          - "primary-record-dictation-button"
          - "Allow Full Access"
        screenshot: "docs/goals/ios-build7-physical-smoke/notes/visual/build7-physical-foil-app.png"
      app_group_snapshot:
        copy_command: "xcrun devicectl device copy from --device 5320F5AD-2A71-50AC-94FE-207B544B6247 --domain-type appGroupDataContainer --domain-identifier group.com.neonwatty.FoilIOS --source Library/foil-keyboard-snapshot.json --destination /tmp/foil-build7-keyboard-snapshot.json"
        sanitized_state:
          phase: "idle"
          message: "Ready"
          hasTranscript: false
          transcriptLength: 0
      residual_risk:
        - "This board proves build 7 physical install, app launch, product-loop app UI, and clean shared state. It does not prove live custom-keyboard insertion into a target app; that is queued in docs/goals/ios-target-app-insertion-matrix-v0.7."
        - "The device uses very large text, so the app is readable but visually cramped."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether build 7 physical smoke is proven or exactly blocked."
    inputs:
      - "All task receipts"
      - "git diff"
      - "device/WDA logs"
    constraints:
      - "Reject simulator-only physical proof."
      - "Reject build 6 evidence as build 7 proof."
    expected_output:
      - "complete | blocked"
      - "strongest failure mode and proof"
      - "next board decision"
    receipt:
      result: done_with_delegated_keyboard_matrix
      task_id: T999
      claim: "The build-7 physical-smoke blocker is cleared for install/app/WDA proof: iPhone-preview now has Foil iOS 0.1.0 build 7 installed, WDA is reachable, the physical app shows the v0.6 Record in Foil loop, and shared App Group state is idle/no transcript."
      strongest_failure_modes:
        - failure_mode: "The phone might still be on build 6 while we rely on App Store Connect or simulator proof."
          ruled_out_by:
            - "After install, devicectl apps output showed Foil iOS com.neonwatty.FoilIOS version 0.1.0 bundle version 7."
        - failure_mode: "WDA might still be unavailable, making physical UI proof impossible."
          ruled_out_by:
            - "curl http://192.168.1.40:8100/status returned state success, ready true, and WebDriverAgent is ready to accept commands."
        - failure_mode: "The installed app might not include the keyboard extension/App Group needed for shared state."
          ruled_out_by:
            - "Built app metadata showed app and keyboard extension build 7; keyboard RequestsOpenAccess true."
            - "codesign entitlement inspection showed app and keyboard extension both include group.com.neonwatty.FoilIOS."
            - "devicectl copied Library/foil-keyboard-snapshot.json from the App Group container."
        - failure_mode: "The physical app might not show the new product-loop copy."
          ruled_out_by:
            - "WDA source found Record in Foil, primary-record-dictation-button, and Record here. Return to your keyboard when the transcript is ready."
            - "Sterile screenshot saved at docs/goals/ios-build7-physical-smoke/notes/visual/build7-physical-foil-app.png."
      residual_risk:
        - "Live keyboard insertion is not claimed here; continue with docs/goals/ios-target-app-insertion-matrix-v0.7 for target-app keyboard proof."
        - "WDA process/session was intentionally left running for the next board and must be cleaned up before final handoff."
