    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Execute the first safe hygiene-gate Worker package selected by Judge."
    allowed_files:
      - ".github/workflows/ios-simulator-sanity.yml"
      - "docs/ci-workflow-development-plan.md"
      - "docs/ios-simulator-sanity-runbook.md"
      - "docs/goals/foil-ios-hygiene-gates-analog/state.yaml"
    verify:
      - "bash -n scripts/ios-simulator-sanity.sh"
      - "scripts/source-whitespace-check.py"
      - "scripts/source-whitespace-check.py --self-test"
      - "scripts/source-line-ratchet.py --json"
      - "scripts/source-line-ratchet.py --self-test"
      - "python3 -m py_compile scripts/ios-physical-harness.py scripts/ios_physical_harness/*.py scripts/ios-physical-wda-evidence.py scripts/ios_physical_wda_evidence_core.py scripts/source-whitespace-check.py scripts/source-line-ratchet.py"
      - "ruby -e 'require \"yaml\"; YAML.load_file(ARGV.fetch(0)); puts \"workflow yaml ok\"' .github/workflows/ios-simulator-sanity.yml"
      - "git diff --check"
      - "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.9/skills/goalbuddy/scripts/check-goal-state.mjs docs/goals/foil-ios-hygiene-gates-analog/state.yaml"
    stop_if:
      - "Need files outside Judge-approved `allowed_files`."
      - "The candidate gate is noisy or non-deterministic."
      - "The candidate gate requires physical-device/TestFlight/WDA proof."
      - "Hosted CI feasibility is ambiguous."
      - "Verification fails twice for the same reason."
    receipt:
      result: done
      changed_files:
        - ".github/workflows/ios-simulator-sanity.yml"
        - "docs/ci-workflow-development-plan.md"
        - "docs/ios-simulator-sanity-runbook.md"
        - "docs/goals/foil-ios-hygiene-gates-analog/state.yaml"
      summary: "Added a required `bash -n scripts/ios-simulator-sanity.sh` shell syntax check to the existing `Repo hygiene ratchet` job, documented it as the first safe script-hygiene analog, and kept shellcheck, swift-format, and Periphery as advisory/deferred until pinning and false-positive evidence are stronger."
      strongest_failure_mode: "The new gate could be cosmetic only, fail to run in the required job, or weaken the existing 350-line/repo-hygiene coverage."
      disproof:
        - "`.github/workflows/ios-simulator-sanity.yml` now runs `Check shell syntax` inside the existing required `Repo hygiene ratchet` job, not as a new unrequired context."
        - "`bash -n scripts/ios-simulator-sanity.sh`: pass."
        - "`scripts/source-line-ratchet.py --json`: `max_lines` 350, empty allowlist, 51 counted files, no violations; workflow is 193 lines."
        - "`scripts/source-whitespace-check.py` and both hygiene script self-tests passed."
        - "Python script compilation and workflow YAML parse checks passed."
      commands:
        - cmd: "bash -n scripts/ios-simulator-sanity.sh"
          status: pass
        - cmd: "scripts/source-whitespace-check.py"
          status: pass
        - cmd: "scripts/source-whitespace-check.py --self-test"
          status: pass
        - cmd: "scripts/source-line-ratchet.py --json"
          status: pass
        - cmd: "scripts/source-line-ratchet.py --self-test"
          status: pass
        - cmd: "python3 -m py_compile scripts/ios-physical-harness.py scripts/ios_physical_harness/*.py scripts/ios-physical-wda-evidence.py scripts/ios_physical_wda_evidence_core.py scripts/source-whitespace-check.py scripts/source-line-ratchet.py"
          status: pass
        - cmd: "ruby -e 'require \"yaml\"; YAML.load_file(ARGV.fetch(0)); puts \"workflow yaml ok\"' .github/workflows/ios-simulator-sanity.yml"
          status: pass
