# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Foil iOS v0.8 Keyboard Friction"
  slug: "ios-v0.8-keyboard-friction"
  kind: specific
  tranche: "Reduce keyboard refresh, Full Access, and stale-state friction before the next tester loop."
  status: done
  oracle:
    signal: "App and keyboard state/copy/tests prove testers get actionable recovery guidance for Full Access, stale keyboard health, pending transcripts, and reset paths."
    cadence: "after each implementation slice"
    final_proof: "Focused tests, simulator/device build where feasible, sanitized board receipts, secret scan, and merged PRs."
  intake:
    original_request: "ok continue - plan this out with goalbuddy prep and implement"
    interpreted_outcome: "Create and execute the next iOS board focused on tester friction after v0.7."
    input_shape: specific
    audience: "Foil owner/developer and internal TestFlight testers"
    authority: approved
    proof_type: test
    completion_proof: "A merged PR improves keyboard/full-access/stale-state guidance with tests and a receipt, and queues any larger follow-up."
    likely_misfire: "Jumping to Messages or visual polish while testers still cannot understand stale keyboard and Full Access states."
    blind_spots_considered:
      - "Keyboard health can be unverified or stale if the extension was never opened or was unloaded."
      - "Full Access off makes App Group clearing unreliable for this architecture."
      - "A stale complete transcript can look ready even if the target app/keyboard needs a refresh."
      - "Overexplaining inside compact keyboard UI can make controls harder to use."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-8-keyboard-friction/"
    command: "npx goalbuddy board docs/goals/ios-v0.8-keyboard-friction"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current app/keyboard health, Full Access, stale-state, and recovery surfaces before implementation."
    inputs:
      - "docs/ios-testflight-feedback-v0.7.md"
      - "FoiliOS/FoilIOSApp/ContentView.swift"
      - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
      - "FoiliOS/Shared/FoilKeyboardBridge.swift"
      - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
      - "FoiliOS/FoilIOSTests"
    constraints:
      - "Read-only."
      - "Do not inspect private device app content."
    expected_output:
      - "Current friction map."
      - "Smallest testable implementation slice."
    receipt:
      result: done
      task_id: T001
      summary: "Mapped the current v0.8 friction surface. The app shows keyboard setup, Full Access, keyboard health, shared state, and recovery rows; the keyboard reports health every refresh and blocks insert when Full Access is off; the presenter has deterministic app/keyboard copy tests. The missing testable seam is a pure presenter for keyboard health freshness/staleness and actionable app recovery copy."
      findings:
        - "ContentView.keyboardHealthSummary is private UI logic, so stale/Full Access copy is not directly unit-tested."
        - "FoilKeyboardHealthReport records updatedAt but no production code treats old health as stale."
        - "KeyboardViewController records Full Access every 0.75s while visible and sends a disabled report when Full Access is off."
        - "FoilDictationLoopPresenter already owns app/keyboard loop copy and has focused tests."
      selected_slice: "Add a testable keyboard-health presentation seam, wire ContentView setup/recovery copy to it, and slightly sharpen keyboard Full Access-off copy."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: medium
    objective: "Choose the first product-quality slice that improves tester recovery without overbuilding."
    inputs:
      - "T001 receipt"
    constraints:
      - "Prefer deterministic tests before physical proof."
      - "Do not change build/upload metadata in this slice."
    expected_output:
      - "Approved Worker package with allowed files and verification commands."
    receipt:
      result: approved
      task_id: T002
      approved_worker_package:
        summary: "Implement keyboard health freshness/staleness presentation and app recovery wiring."
        allowed_files:
          - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
          - "FoiliOS/FoilIOSApp/ContentView.swift"
          - "FoiliOS/FoilKeyboard/KeyboardViewController.swift"
          - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
          - "docs/goals/ios-v0.8-keyboard-friction/state.yaml"
        verify:
          - "Focused FoilIOSTests for presentation behavior."
          - "iOS simulator test/build via XcodeBuildMCP or xcodebuild fallback."
          - "YAML parse, GoalBuddy board registration, diff check, secret scan."
        stop_if:
          - "The change requires physical Messages/private app inspection."
          - "Xcode signing/provisioning changes become necessary."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement the approved keyboard/full-access/stale-state recovery slice with focused tests."
    inputs:
      - "T002 receipt"
    constraints:
      - "Keep copy concise enough for app and keyboard surfaces."
      - "No TestFlight upload in this task."
    expected_output:
      - "Code/tests/docs updated."
      - "Verification evidence."
      - "PR into codex/ios-keyboard-prototype."
    receipt:
      result: done
      task_id: T003
      summary: "Implemented a testable keyboard-health presentation seam and wired the app recovery copy to it. Full Access off now tells testers to enable Full Access and reopen/cycle back to Foil Keyboard; unverified and stale keyboard-health states produce actionable recovery messages; fresh enabled states stay quiet."
      changed_files:
        - "FoiliOS/Shared/FoilDictationLoopPresenter.swift"
        - "FoiliOS/FoilIOSApp/ContentView.swift"
        - "FoiliOS/FoilIOSTests/FoilDictationLoopPresentationTests.swift"
      behavior:
        - "Added FoilKeyboardHealthPresentation with detail and optional recoveryMessage."
        - "Added stale keyboard-health detection using updatedAt with a default 120 second stale threshold."
        - "ContentView now surfaces Full Access off before transcript-waiting recovery because insertion cannot work with Full Access off."
        - "Keyboard Full Access-off copy now says to cycle back to Foil Keyboard after enabling access."
      verification:
        - "XcodeBuildMCP focused tests: -only-testing:FoilIOSTests/FoilDictationLoopPresentationTests passed 10/10."
        - "XcodeBuildMCP full simulator tests passed 14/14."
        - "XcodeBuildMCP simulator build/install/launch passed for com.neonwatty.FoilIOS with no warnings/errors."
      pr: "https://github.com/mean-weasel/foil/pull/253"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Run simulator and, if practical without operator action, physical smoke for the changed states."
    inputs:
      - "T003 receipt"
    constraints:
      - "Do not stop on physical proof if simulator/unit proof covers the code-only slice and WDA/device requires human action."
      - "Record exact blocker if physical smoke cannot run."
    expected_output:
      - "Simulator/device proof or exact blocker."
    receipt:
      result: done_simulator_only
      task_id: T004
      summary: "Ran simulator proof through XcodeBuildMCP. Physical device proof was not required for this first v0.8 slice because the claim is deterministic app/keyboard copy/state presentation, covered by unit tests plus simulator launch, not target-app insertion or microphone behavior."
      simulator_evidence:
        focused_tests:
          command: "XcodeBuildMCP test_sim -only-testing:FoilIOSTests/FoilDictationLoopPresentationTests"
          result: "passed 10/10"
          xcresult: "/Users/neonwatty/Library/Developer/XcodeBuildMCP/workspaces/foil-fc4876127f01/result-bundles/test_sim_2026-06-06T01-02-49-763Z_pid55641_815ea958.xcresult"
        full_tests:
          command: "XcodeBuildMCP test_sim"
          result: "passed 14/14"
          xcresult: "/Users/neonwatty/Library/Developer/XcodeBuildMCP/workspaces/foil-fc4876127f01/result-bundles/test_sim_2026-06-06T01-03-05-902Z_pid55641_270b6a57.xcresult"
        launch_smoke:
          command: "XcodeBuildMCP build_run_sim"
          result: "succeeded"
          appPath: "/Users/neonwatty/Library/Developer/XcodeBuildMCP/workspaces/foil-fc4876127f01/DerivedData/FoilIOS-dadbcdc5bb02/Build/Products/Debug-iphonesimulator/Foil iOS.app"
      physical_device_decision:
        status: "not run"
        rationale: "No physical-only behavior changed; next physical proof should happen after a TestFlight build bump or when testing keyboard lifecycle in real target apps."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit against the v0.8 oracle and acceptance evidence burden of proof."
    inputs:
      - "All receipts"
      - "verification commands"
      - "git/PR state"
    constraints:
      - "Reject completion if the slice only changes copy without a test or direct inspection proving the state."
      - "Reject completion if Messages support is implied."
    expected_output:
      - "complete | blocked"
      - "next v0.8 follow-up recommendation"
    receipt:
      result: done
      task_id: T999
      summary: "Final audit passed for the first v0.8 keyboard-friction slice. The implementation improves tester guidance for Full Access off, unverified keyboard, and stale keyboard check-in states without claiming Messages support or touching physical/private app surfaces."
      strongest_failure_mode:
        claim: "The UI copy could change without proving the actual state decisions, or it could annoy testers by showing stale warnings during fresh healthy states."
        ruled_out_by:
          - "Unit tests prove unverified, Full Access off, stale enabled, and fresh enabled presentation branches."
          - "Full simulator test target passed 14/14, covering adjacent transcription quality/client tests as well."
          - "Simulator launch smoke passed with no build warnings/errors."
      residual_risk:
        - "Physical keyboard lifecycle behavior still needs a later build/device smoke after more lifecycle polish or a build bump."
        - "Messages remains out of scope until a sterile self/test thread exists."
      next_v0_8_follow_up:
        - "Add an explicit in-app keyboard refresh checklist or one-tap deep link to Keyboard settings if we want stronger tester onboarding."
        - "Then prepare a deliberate TestFlight build bump/upload board if product code changes should reach testers."
