<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foil v0.21 Keyboard Recovery Fixture</title>
  <style>
    body {
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
    }
    label {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    input {
      border: 2px solid #2563eb;
      border-radius: 8px;
      box-sizing: border-box;
      font: inherit;
      min-height: 52px;
      padding: 12px;
      width: 100%;
    }
    output {
      display: block;
      font-size: 15px;
      margin-top: 14px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <label for="foil-v021-recovery-target">Foil v0.21 recovery target</label>
  <input
    id="foil-v021-recovery-target"
    aria-label="Foil v0.21 recovery target"
    autocomplete="off"
    autocapitalize="off"
    spellcheck="false"
    type="text"
    autofocus>
  <output id="foil-v021-output">recovery length: 0</output>
  <script>
    const target = document.getElementById("foil-v021-recovery-target");
    const output = document.getElementById("foil-v021-output");
    const update = () => {
      output.textContent = `recovery length: ${target.value.length}`;
    };
    target.addEventListener("input", update);
    target.focus();
    update();
  </script>
</body>
</html>
