      rationale: "The physical-device evidence supports the Whisperflow-style custom-keyboard architecture for the next prototype. The key platform constraint is not insertion itself; Notes, Safari, and Reminders accepted insertion after Full Access was enabled. The critical product requirement is to treat Allow Full Access as mandatory because without it the keyboard can display stale shared state but cannot reliably clear the shared store. Secure text fields correctly reject the custom keyboard and should be documented as expected platform behavior."
      recommended_next_product_slice: "Add first-run keyboard onboarding and a recovery/debug surface: show how to enable Foil Keyboard and Allow Full Access, detect hasFullAccess in the keyboard, block stale inserts when it is off, and offer an app-side state reset/health check."
