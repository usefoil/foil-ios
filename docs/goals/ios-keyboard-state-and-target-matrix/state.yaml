# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Foil iOS Keyboard State And Target Matrix"
  slug: "ios-keyboard-state-and-target-matrix"
  kind: specific
  tranche: "Fix keyboard reset persistence, prove state agreement on iPhone-preview, and expand the privacy-safe host-app insertion/rejection matrix."
  status: done
  oracle:
    signal: "After one physical-device insertion through Foil Keyboard, host text changes exactly once and keyboard UI, UserDefaults-derived app state, and canonical App Group file all show idle/no transcript; then target-app matrix rows are recorded without private content."
    cadence: "after each Worker package and at final audit"
    final_proof: "Merged PR into codex/ios-keyboard-prototype plus receipts with WDA source snippets, devicectl App Group file copies, screenshots, build/install commands, secret scan, issue update, and final audit."
  intake:
    original_request: "Make a detailed plan using GoalBuddy prep for the next iOS build work."
    interpreted_outcome: "Prepare a GoalBuddy board to fix the iOS keyboard state divergence and continue physical target-app testing."
    input_shape: specific
    audience: "Foil owner/developer"
    authority: approved
    proof_type: demo
    completion_proof: "The iOS prototype branch has a verified reset-persistence fix and a privacy-safe physical-device insertion/rejection matrix."
    likely_misfire: "Visible keyboard reset is treated as done while a stale canonical App Group file can still resurrect a consumed transcript."
    blind_spots_considered:
      - "Keyboard extension file writes can differ from containing-app writes."
      - "UserDefaults and file-backed App Group snapshots can diverge."
      - "Running extension processes may cache old code/state until killed."
      - "Safari, Reminders, Messages, and Settings can expose private accessibility content."
      - "Secure fields rejecting custom keyboards are expected platform behavior."
      - "Large Dynamic Type can hide controls or make screenshots misleading."
      - "API keys and transcript content must not leak."
      - "Previous iOS smoke evidence should be reused as baseline rather than rerun from scratch."
    existing_plan_facts:
      - "Continue from codex/ios-keyboard-prototype."
      - "Start with App Group state cleanup."
      - "Then run Notes, Safari blank search/address, Reminders blank item, and secure-field rejection rows."
      - "Use the preview iPhone when available and unlocked."
      - "Use the local Groq/Grok key only if live transcription is needed; do not print or commit it."
      - "Create PRs into codex/ios-keyboard-prototype, not main."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/ios-keyboard-state-and-target-matrix/"
    command: "npx goalbuddy board docs/goals/ios-keyboard-state-and-target-matrix"

active_task: null

