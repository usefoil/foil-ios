        - "Canonical Library/foil-keyboard-snapshot.json parent directory is created before writes."
        - "Canonical snapshot is overwritten directly, with FileHandle truncate/write fallback."
        - "Fallback snapshot paths are removed on every persist."
        - "A transcript-free FoilKeyboardStorageReport records operation, canonical file write result, verification phase, transcript presence boolean, and defaults write attempt."
        - "The containing app shows a safe storage summary for physical-device proof."
        - "Foil Keyboard checks hasFullAccess and disables Insert latest when Allow Full Access is off."
      evidence:
        - "Build/install passed: cd FoiliOS && xcodegen generate --spec project.yml; xcodebuild -project FoilIOS.xcodeproj -scheme FoilIOS -destination 'id=00008030-001A0C980A33C02E' -derivedDataPath /tmp/foil-ios-state-derived -allowProvisioningUpdates build; devicectl install app succeeded to /private/var/containers/Bundle/Application/3916391B-69C6-4E0A-9869-977B3A052D10/Foil iOS.app/."
        - "Full Access off proof: Settings showed Allow Full Access value 0; Notes/Foil keyboard source showed keyboard_status=Transcript Ready, keyboard_message=Allow Full Access required, insert_label=Insert latest (full access off), insert_enabled=false."
        - "Full Access enabled through Settings; Settings source showed Allow Full Access switch value 1 after the iOS Allow confirmation."
        - "Final setup canonical copy before insert was phase complete, message Fake transcript ready, transcript Foil keyboard shell, updatedAt 802290054.444778."
        - "Final Notes/Foil source before insert showed keyboard_status=Transcript Ready, keyboard_message=Fake transcript ready, insert_label=Insert latest, insert_enabled=true."
        - "Final Notes/Foil source after insert showed host note suffix ending in a single additional Foil keyboard shell, keyboard_status=Ready, keyboard_message=Ready, insert_label=Insert latest (no transcript), insert_enabled=false."
        - "Final canonical App Group copy from Library/foil-keyboard-snapshot.json showed message Ready, phase idle, updatedAt 802290086.409129, and no transcript key."
        - "Final App Group preferences copy contained foil.keyboard.snapshot.v1 and foil.keyboard.storageReport.v1 data after reset."
        - "Containing app WDA source showed Ready and Storage reset: file ok, defaults written, verified Ready no transcript."
        - "WDA screenshot captured at /tmp/foil-device-screens/state-reset-fullaccess-proof.png and visually inspected."
