      task_id: T003
      summary: "Implemented robust canonical snapshot overwrite/reset plus a no-transcript storage report, then proved on iPhone-preview that Full Access is the required permission gate. With Allow Full Access off, the keyboard saw a stale Transcript Ready snapshot but could not update the shared store, so Insert latest is now disabled and the keyboard says Allow Full Access required. After enabling Allow Full Access in Settings, the same app-created transcript inserted once in Notes and reset persisted across the visible keyboard, canonical App Group JSON, App Group defaults, and containing app state."
      implementation:
