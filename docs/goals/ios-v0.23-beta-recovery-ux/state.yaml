version: 2

goal:
  title: "Foil iOS v0.23 Beta Recovery UX"
  slug: "ios-v0.23-beta-recovery-ux"
  kind: existing_plan
  tranche: "Fix or triage small beta UX/recovery blockers discovered during physical rehearsal."
  status: active
  oracle:
    signal: "Every beta-blocking friction item discovered by v0.23 rehearsal has a merged/proven fix, exact external blocker, or explicit closed-beta deferral."
    cadence: "after matrix audit, after each fix PR, and before final readiness audit"
    final_proof: "Issue ledger, PR links, simulator tests, physical regression receipts, secret/private-content scan, and risk-labeled deferrals."
  intake:
    original_request: "Allow small beta UX fixes."
    interpreted_outcome: "Permit evidence-backed small fixes that unblock closed-beta rehearsal."
    input_shape: existing_plan
    audience: "Foil owner/developer and closed-beta testers"
    authority: approved
    proof_type: demo
    completion_proof: "All rehearsal-discovered beta blockers are handled without broad feature creep."
    likely_misfire: "Using the rehearsal as a reason to start broad polish instead of closing beta blockers."
    blind_spots_considered:
      - "Keyboard refresh friction may need clearer state or a recovery affordance."
      - "Insert latest state may be confusing after exact-once insertion."
      - "Provider/key/microphone errors can look like transcription failure without enough UX."
      - "Fixes must be physically regressed in the app/keyboard path they affect."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-v0-23-beta-recovery-ux/"
    command: "npx goalbuddy board docs/goals/ios-v0.23-beta-recovery-ux"

active_task: T001

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: active
    reasoning_hint: medium
    objective: "Build a beta-friction ledger from the v0.23 preflight, TestFlight rehearsal, and Apple app matrix receipts."
    inputs:
      - "docs/goals/ios-v0.23-beta-preflight/state.yaml"
      - "docs/goals/ios-v0.23-testflight-rehearsal/state.yaml"
      - "docs/goals/ios-v0.23-apple-app-matrix/state.yaml"
    constraints:
      - "Read-only except this board's notes."
      - "Do not invent issues not backed by receipts."
      - "Classify external/operator blockers separately from product UX blockers."
    expected_output:
      - "notes/T001-beta-friction-ledger.md"
      - "List of issues with source receipt, user impact, severity, recommended disposition, and candidate allowed_files if fixable."
    acceptance_criteria:
      - "Every issue maps to a concrete receipt from a child board."
      - "Each issue is labeled blocker | important | defer, and product_fix | operator_action | external_blocker | acceptable_risk."
      - "The ledger identifies the single highest-value safe fix slice, if any."

  - id: T002
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Approve the largest safe beta UX/recovery fix slice or decide no fix is needed."
    inputs:
      - "T001 friction ledger"
      - "Goal oracle"
    constraints:
      - "Approve only evidence-backed fixes."
      - "Keep allowed_files narrow."
      - "Require physical regression proof for keyboard, insertion, provider, or permission UX changes."
    expected_output:
      - "decision: fix_slice_approved | no_product_fix_needed | external_blocked"
      - "If approved: Worker objective, allowed_files, verify commands, stop_if conditions."
    acceptance_criteria:
      - "Decision explains why the selected slice is beta-blocking or why no product fix is required."
      - "If a fix is approved, the verification plan includes simulator checks and the relevant physical regression."

  - id: T003
    type: worker
    assignee: Worker
    status: queued
    reasoning_hint: high
    objective: "Implement the approved small beta UX/recovery fix slice, if one is approved."
    allowed_files:
      - "FoiliOS/**"
      - "docs/goals/ios-v0.23-beta-recovery-ux/**"
    verify:
      - "Relevant unit/UI/simulator tests"
      - "xcodebuild build or test for FoilIOS"
      - "Focused physical regression receipt for changed behavior"
      - "git diff --check"
      - "Targeted secret/private-content scan over touched files"
    stop_if:
      - "The fix requires broad redesign or third-party app scope."
      - "The fix needs credentials or private content exposure."
      - "Physical regression requires operator device action."
    expected_output:
      - "Small PR or exact blocked receipt."
      - "notes/T003-worker.md"
    acceptance_criteria:
      - "Code changes are limited to the approved slice."
      - "Tests/build proof passes."
      - "Physical regression proves the original beta blocker no longer reproduces, or the issue is honestly still blocked."

  - id: T999
    type: judge
    assignee: Judge
    status: queued
    reasoning_hint: high
    objective: "Close the beta recovery board with a resolved/deferred ledger."
    inputs:
      - "T001-T003 receipts"
    constraints:
      - "Do not hide open beta blockers."
    expected_output:
      - "notes/T999-final-audit.md"
    acceptance_criteria:
      - "Every ledger issue has final disposition."
      - "Open product blockers have either a PR link, external owner, or explicit closed-beta risk acceptance."
      - "GoalBuddy state checker passes."
